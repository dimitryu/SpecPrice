async function handlePriorityFile(file){
  const body=document.getElementById('pi-modal-body');
  const foot=document.querySelector('#modal-bg .modal-foot');
  body.innerHTML=`<div class="ai-status"><div class="ring"></div><span id="pi-msg">Reading file…</span></div>`;
  foot.innerHTML='';

  try{
    if(!window.XLSX) throw new Error('Excel library not loaded — please reload the page and try again.');
    const ab=await file.arrayBuffer();
    const wb=XLSX.read(ab,{type:'array'});
    if(!wb.SheetNames.length) throw new Error('No sheets found in this file.');

    // Parse EVERY sheet and score it, so multi-sheet workbooks (Priority ERP exports commonly
    // bundle a PivotTable summary sheet — useless here, just "Row Labels" — alongside a
    // "DataSheet" with the real Part Number / Price / Currency columns) default to whichever
    // sheet actually looks like tabular data, instead of blindly using the first sheet.
    const sheetsData = wb.SheetNames.map(name=>{
      const {rows, headers} = _priorityParseSheet(wb.Sheets[name]);
      return {name, rows, headers, score:_priorityScoreSheet(headers)};
    }).filter(s=>s.rows.length>0);
    if(!sheetsData.length) throw new Error('The file appears to be empty.');
    sheetsData.sort((a,b)=>b.score-a.score);

    renderPrioritySheetMapping(sheetsData, sheetsData[0].name, body, foot);
  }catch(e){
    body.innerHTML+=`<p style="color:red;margin-top:12px">Error: ${e.message}</p>`;
    foot.innerHTML=`<button class="btn btn-ghost" onclick="closeModal()">Close</button>`;
  }
}

// Suggest which column is Part Number (מק"ט), which is Priority Price (מחיר ליחידה), and
// (optionally) which column holds the currency code — Priority ERP exports often keep the
// amount as a bare number with the currency in its own column (e.g. "מטבע שורה": EUR/GBP/ש).
// Also lets the user switch sheets when the workbook has more than one. All pre-selected from
// header detection, but always confirmed by the user before parsing.
function renderPrioritySheetMapping(sheetsData, activeSheetName, body, foot){
  const active = sheetsData.find(s=>s.name===activeSheetName) || sheetsData[0];
  const {rows, headers} = active;

  let pnCol=_priorityFindCol(headers,_PN_HEADER_HINTS);
  let prCol=_priorityFindCol(headers,_PRICE_HEADER_HINTS);
  let curCol=_priorityFindCol(headers,_CURRENCY_HEADER_HINTS);
  const headerDetected = pnCol>=0 || prCol>=0;
  if(pnCol<0) pnCol=0;
  if(prCol<0) prCol=(pnCol===1?0:1);
  if(prCol===pnCol) prCol=(pnCol===0 && headers.length>1)?1:(pnCol>0?0:1);

  const colLabel=(h,i)=>{ const t=String(h||'').trim(); return t?esc(t):`(Column ${i+1})`; };
  const colOpts=(selected)=>headers.map((h,i)=>`<option value="${i}" ${i===selected?'selected':''}>${colLabel(h,i)}</option>`).join('');
  const curOpts=(selected)=>`<option value="-1" ${selected<0?'selected':''}>— None (detect from price text, default USD) —</option>`+
    headers.map((h,i)=>`<option value="${i}" ${i===selected?'selected':''}>${colLabel(h,i)}</option>`).join('');
  const sampleRows=(headerDetected?rows.slice(1):rows).slice(0,3);

  body.innerHTML=`
    <p style="font-size:12px;color:var(--muted);margin-bottom:12px">We suggest the following column mapping — confirm or change before importing:</p>
    ${sheetsData.length>1?`<div class="form-field">
      <label>Sheet</label>
      <select class="form-input" id="pi-sheet-sel">
        ${sheetsData.map(s=>`<option value="${esc(s.name)}" ${s.name===active.name?'selected':''}>${esc(s.name)} (${s.rows.length} rows, ${s.headers.length} cols)</option>`).join('')}
      </select>
    </div>`:''}
    <div class="form-field" style="margin-top:10px">
      <label>Part Number column (מק"ט)</label>
      <select class="form-input" id="pi-pn-col">${colOpts(pnCol)}</select>
    </div>
    <div class="form-field" style="margin-top:10px">
      <label>Priority Price column (מחיר ליחידה)</label>
      <select class="form-input" id="pi-price-col">${colOpts(prCol)}</select>
    </div>
    <div class="form-field" style="margin-top:10px">
      <label>Currency column (optional)</label>
      <select class="form-input" id="pi-cur-col">${curOpts(curCol)}</select>
    </div>
    <div class="form-field" style="margin-top:10px">
      <label style="display:flex;align-items:center;gap:6px;text-transform:none;font-weight:400;font-size:12px">
        <input type="checkbox" id="pi-has-header" ${headerDetected?'checked':''} style="width:auto">
        First row is a header row (skip it)
      </label>
    </div>
    ${sampleRows.length?`<div style="margin-top:12px">
      <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Preview:</div>
      <div class="table-wrap"><table style="font-size:11px">
        <tbody>${sampleRows.map(r=>`<tr>${headers.map((_,i)=>`<td>${esc(String(r[i]??''))}</td>`).join('')}</tr>`).join('')}</tbody>
      </table></div>
    </div>`:''}`;

  foot.innerHTML=`
    <button class="btn btn-ghost" id="pi-map-cancel">Cancel</button>
    <button class="btn btn-green" id="pi-map-continue">Continue →</button>`;

  document.getElementById('pi-sheet-sel')?.addEventListener('change',e=>{
    renderPrioritySheetMapping(sheetsData, e.target.value, body, foot);
  });
  document.getElementById('pi-map-cancel').addEventListener('click',closeModal);
  document.getElementById('pi-map-continue').addEventListener('click', async()=>{
    const pnColSel=parseInt(document.getElementById('pi-pn-col').value);
    const prColSel=parseInt(document.getElementById('pi-price-col').value);
    const curColSel=parseInt(document.getElementById('pi-cur-col').value);
    const skipHeader=document.getElementById('pi-has-header').checked;
    if(pnColSel===prColSel){ toast('Part Number and Price columns must be different','error'); return; }

    const btn=document.getElementById('pi-map-continue');
    btn.disabled=true; btn.textContent='Converting…';

    const dataRows=skipHeader?rows.slice(1):rows;
    const parsed=[];
    for(const r of dataRows){
      const pn=String(r[pnColSel]||'').trim();
      const rawPrice=r[prColSel];
      if(!pn || rawPrice===''||rawPrice===undefined||rawPrice===null) continue;
      const rawCur = curColSel>=0 ? r[curColSel] : '';
      const usd=await _convertToUSD(rawPrice, rawCur);
      if(usd===null) continue;
      parsed.push({part_number:pn, priority_price:usd, _raw:String(rawPrice)});
    }

    if(!parsed.length){
      body.innerHTML=`<p style="color:var(--muted);margin-top:10px">No valid Part Number + Price rows were detected with this mapping.</p>`;
      foot.innerHTML=`<button class="btn btn-ghost" onclick="closeModal()">Close</button>`;
      return;
    }

    showPriorityPreview(parsed, body, foot);
  });
}

function showPriorityPreview(rows, body, foot){
  const modalEl=body.closest('.modal');
  if(modalEl){ modalEl.style.width='min(94vw,700px)'; modalEl.style.maxWidth='700px'; }

  const tBody=rows.map((r,i)=>`<tr data-i="${i}">
    <td contenteditable="true" data-k="part_number" data-i="${i}" style="min-width:140px">${esc(r.part_number)}</td>
    <td contenteditable="true" data-k="priority_price" data-i="${i}" style="min-width:90px">${esc(String(r.priority_price))}</td>
    <td><button class="btn btn-red btn-sm" onclick="this.closest('tr').remove()">✕</button></td>
  </tr>`).join('');

  body.innerHTML=`
    <div class="ai-status" style="margin-bottom:10px">
      <div style="width:16px;height:16px;border-radius:50%;background:#1B6B3A;border:none;animation:none;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;line-height:1">✓</div>
      <span>${rows.length} rows parsed (prices converted to $) — click any cell to edit before saving</span>
    </div>
    <div class="table-wrap" style="max-height:calc(85vh - 175px);overflow:auto"><table>
      <thead><tr><th>Part Number</th><th>Priority Price ($)</th><th></th></tr></thead>
      <tbody id="pi-preview-tbody">${tBody}</tbody>
    </table></div>`;

  foot.innerHTML=`
    <button class="btn btn-ghost" id="pi-cancel">Cancel</button>
    <button class="btn btn-green" id="pi-save">💾 Save to Part Stock (${rows.length} rows)</button>`;

  document.getElementById('pi-cancel').addEventListener('click',closeModal);
  document.getElementById('pi-save').addEventListener('click', async()=>{
    const finalRows=[];
    document.querySelectorAll('#pi-preview-tbody tr').forEach(tr=>{
      const pn=tr.querySelector('[data-k="part_number"]')?.textContent.trim()||'';
      const pr=parseFloat(tr.querySelector('[data-k="priority_price"]')?.textContent.trim())||0;
      if(pn) finalRows.push({part_number:pn, priority_price:pr});
    });
    if(!finalRows.length){ toast('No rows to save','error'); return; }
    const btn=document.getElementById('pi-save');
    btn.disabled=true; btn.textContent='Saving…';
    try{
      const {updated, created}=await savePriorityImport(finalRows);
      toast(`Priority Import: ${updated} updated, ${created} created`,'success');
      closeModal();
      allParts=[]; renderPartStock();
    }catch(e){ toast('Save error: '+e.message,'error'); btn.disabled=false; btn.textContent=`💾 Save to Part Stock (${finalRows.length} rows)`; }
  });
}

// Upsert priority prices into parts_cache. Existing part_number → update priority_price;
// unknown part_number → create a new row with just part_number + priority_price.
async function savePriorityImport(rows){
  await loadParts();
  let updated=0, created=0;
  for(const r of rows){
    const pn=r.part_number.trim();
    if(!pn) continue;
    const existing=allParts.find(p=>String(p.part_number||'').toLowerCase()===pn.toLowerCase());
    try{
      if(existing){
        await updateDoc(doc(db,'companies',companyId,'parts_cache',existing._id),{
          priority_price:r.priority_price, updatedAt:serverTimestamp()
        });
        existing.priority_price=r.priority_price;
        updated++;
      } else {
        const key=pn.replace(/[\/\\#\[\]*?]/g,'_').slice(0,500);
        await setDoc(doc(db,'companies',companyId,'parts_cache',key),{
          part_number:pn, description:'', drawing_number:'', manufacturer:'',
          unit:'', atlantium_pn:'', price:'', distributor:'', stock:'', price_description:'',
          priority_price:r.priority_price, updatedAt:serverTimestamp()
        },{merge:true});
        allParts.push({_id:key, part_number:pn, priority_price:r.priority_price});
        created++;
      }
    }catch(e){ console.warn('[PriorityImport] save error:',pn,e.message); }
  }
  return {updated, created};
}

let _routings=[];
let _routingsLoaded=false;
async function loadRoutings(force=false){
  if(_routingsLoaded && !force) return _routings;
  try{
    const snap=await getDocs(collection(db,'companies',companyId,'routings'));
    _routings=snap.docs.map(d=>({_id:d.id,...d.data()}));
  }catch(e){ console.warn('[Routings] load error:',e.message); _routings=[]; }
  _routingsLoaded=true;
  return _routings;
}
// Replaces the whole routings collection with `rows` (mirrors the Windows app's
// delete-all-then-rewrite _save_firebase behavior).
async function saveRoutingsAll(rows){
  try{
    const snap=await getDocs(collection(db,'companies',companyId,'routings'));
    await Promise.all(snap.docs.map(d=>deleteDoc(d.ref)));
  }catch(e){ console.warn('[Routings] delete error:',e.message); }
  let i=0;
  for(const row of rows){
    const key=(String(row.operation_code||'').trim()||`row_${i}`).replace(/[\/\\#\[\]*?]/g,'_').slice(0,300)||`row_${i}`;
    try{
      await setDoc(doc(db,'companies',companyId,'routings',key),{
        operation_code: row.operation_code||'',
        operation_name: row.operation_name||'',
        operation_duration: row.operation_duration||'',
        description_options: row.description_options||'',
      });
    }catch(e){ console.warn('[Routings] save error:',key,e.message); }
    i++;
  }
  _routings=rows.map((r,idx)=>({_id:String(r.operation_code||`row_${idx}`),...r}));
  _routingsLoaded=true;
}
// Auto-fills an empty description_options on routing rows whose operation_name matches
// one of the known Hebrew/English substrings above (first match wins per row).
function _autoFillRoutingDescriptions(rows){
  let filled=0;
  for(const [kwStr,opSubs] of _ROUTING_AUTO_FILL_MAP){
    for(const r of rows){
      if(String(r.description_options||'').trim()) continue;
      const opLower=String(r.operation_name||'').toLowerCase();
      if(opSubs.some(s=>opLower.includes(s.toLowerCase()))){ r.description_options=kwStr; filled++; }
    }
  }
  return filled;
}

// Given a BOM description, returns a labor-time string in minutes (or '' if no match).
function _matchLaborTime(description, routings){
  if(!description || !routings || !routings.length) return '';
  const descLower=String(description).toLowerCase();

  // 0. User-defined Description Options on routing rows — sum ALL matches (multi-step)
  const matchedDurations=[];
  for(const rt of routings){
    const opts=String(rt.description_options||'').trim();
    if(!opts) continue;
    const keywords=opts.split(',').map(k=>k.trim().toLowerCase()).filter(Boolean);
    if(keywords.some(kw=>descLower.includes(kw))){
      const dur=parseFloat(String(rt.operation_duration||'').trim());
      if(!isNaN(dur)) matchedDurations.push(dur);
    }
  }
  if(matchedDurations.length){
    const total=matchedDurations.reduce((a,b)=>a+b,0);
    return Number.isInteger(total)?String(total):total.toFixed(1);
  }

  // 1. Rule-based pass
  for(const [descKws,opKws] of _LABOR_RULES){
    if(descKws.some(kw=>descLower.includes(kw))){
      for(const rt of routings){
        const op=String(rt.operation_name||'').toLowerCase();
        if(opKws.some(ok=>op.includes(ok.toLowerCase()))){
          const dur=String(rt.operation_duration||'').trim();
          if(dur) return dur;
        }
      }
      break; // matched a description category but no routing covers it — stop here
    }
  }

  // 2. Word-overlap fallback
  let best=null, bestScore=0;
  const descWords=new Set(descLower.split(/\s+/).filter(Boolean));
  for(const rt of routings){
    const op=String(rt.operation_name||'').toLowerCase();
    if(!op) continue;
    const opWords=op.split(/\s+/).filter(Boolean);
    let score=0;
    for(const w of opWords) if(descWords.has(w)) score++;
    if(score===0 && (descLower.includes(op)||op.includes(descLower))) score=1;
    if(score>bestScore){ bestScore=score; best=rt; }
  }
  if(best && bestScore>0) return String(best.operation_duration||'').trim();
  return '';
}

// One batched AI call to match whatever rows steps 0-2 above couldn't resolve.
// rowsToMatch: [{idx, description}]. Returns {idx: durationString}.
async function _aiMatchLaborBatch(rowsToMatch, routings){
  if(!rowsToMatch.length || !routings.length || (!anthKey && !geminiKey)) return {};
  const routingsList=routings.filter(r=>r.operation_name).slice(0,150)
    .map(r=>`- "${r.operation_name}" (${r.operation_duration||'?'} min)`).join('\n');
  const rowsList=rowsToMatch.map(r=>`${r.idx}: ${r.description}`).join('\n');
  const prompt=`You are matching cable/connector BOM line-item descriptions to the closest manufacturing routing operation.

Available operations (name, duration in minutes):
${routingsList}

For each numbered BOM description below, pick the SINGLE best-matching operation from the list above and return its duration in minutes. If nothing plausibly matches, use "".

BOM descriptions:
${rowsList}

Return ONLY a valid JSON object mapping the row number (as a string) to the duration (as a string), e.g. {"0":"5","1":"","2":"12.5"}`;
  try{
    let raw='';
    if(anthKey){
      const resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'x-api-key':anthKey,'anthropic-version':'2023-06-01',
                 'anthropic-dangerous-allow-browser':'true','content-type':'application/json'},
        body:JSON.stringify({model:'claude-haiku-4-5-20251001', max_tokens:1024,
          messages:[{role:'user',content:prompt}]})
      });
      if(resp.ok){ const data=await resp.json(); raw=data.content[0].text.trim(); }
    } else if(geminiKey){
      const resp=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiKey}`,
        {method:'POST',headers:{'content-type':'application/json'},
         body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{thinkingConfig:{thinkingBudget:0}}})});
      if(resp.ok){ const data=await resp.json();
        raw=(data.candidates?.[0]?.content?.parts||[]).filter(p=>!p.thought).map(p=>p.text||'').join(''); }
    }
    const m=raw.match(/\{[\s\S]*\}/);
    if(!m) return {};
    return JSON.parse(m[0]);
  }catch(e){ console.warn('[Labor AI] match error:',e.message); return {}; }
}

        'description':'operation_name','desc':'operation_name',

        'time (min)':'operation_duration','cycle time':'operation_duration','lead time':'operation_duration',
        'minutes':'operation_duration','min':'operation_duration'};

      for(let ri=0; ri<Math.min(30,data.length); ri++){
        const mapping={};
        data[ri].forEach((cell,ci)=>{ const v=String(cell||'').trim().toLowerCase(); if(EXCEL_MAP[v]) mapping[ci]=EXCEL_MAP[v]; });
        if(Object.keys(mapping).length>=1){ headerRowIdx=ri; colMap=mapping; break; }
      }
      if(headerRowIdx<0){ toast('No matching columns detected (need Operation Code / Name / Duration headers)','error'); return; }
      const imported=[];
      for(let ri=headerRowIdx+1; ri<data.length; ri++){
        const row=data[ri]; const rd={};
        for(const ci in colMap) rd[colMap[ci]]=String(row[ci]??'').trim();
        if(Object.values(rd).some(v=>v)) imported.push({operation_code:rd.operation_code||'',operation_name:rd.operation_name||'',
          operation_duration:rd.operation_duration||'',description_options:''});
      }
      if(!imported.length){ toast('No rows found in the file','error'); return; }
      rows=imported;
      renderRows();
      toast(`Imported ${imported.length} rows from Excel`,'success');
    }catch(err){ toast('Import error: '+err.message,'error'); }
    e.target.value='';
  });
  document.getElementById('rt-save').addEventListener('click',async()=>{
    document.querySelectorAll('#rt-tbody td[contenteditable]').forEach(td=>{
      const i=+td.dataset.i, k=td.dataset.k;
      if(rows[i]) rows[i][k]=td.textContent.trim();
    });
    const btn=document.getElementById('rt-save');
    btn.disabled=true; btn.textContent='Saving…';
    try{
      await saveRoutingsAll(rows.filter(r=>Object.values(r).some(v=>v)));
      toast(`Saved ${rows.length} routings`,'success');
      closeModal();
    }catch(e){ toast('Save error: '+e.message,'error'); btn.disabled=false; btn.textContent='💾 Save'; }
  });
}

const _SD_DEFAULT_COLS=[
  {k:'part_number',    l:'Part #',          w:'110px'},
  {k:'drawing_number', l:'Drawing #',       w:'100px'},
  {k:'description',    l:'Description',     w:'190px',wrap:true},
  {k:'qty',            l:'QTY',             w:'75px'},
  {k:'unit',           l:'Units',           w:'55px'},
  {k:'price',          l:'FC Price',        w:'85px'},
  {k:'priority_price', l:'Priority Price',  w:'95px'},
  {k:'total',          l:'Part Cost',       w:'85px'},
  {k:'labor_time',     l:'Labor Time',      w:'85px'},
  {k:'labor_total',    l:'Labor Total',     w:'90px'},
];
// Part Cost uses the LOWER of FC/Priority price when both exist (mirrors the
// Windows app's _update_row_total), not just "whichever is present".
function _sdEffectivePrice(r){
  const fc=parseFloat(r.price)||0, pr=parseFloat(r.priority_price)||0;
  if(fc>0 && pr>0) return Math.min(fc,pr);
  return fc||pr||0;
}
function _sdRecalcTotal(r){ r.total=_sdEffectivePrice(r)*(parseFloat(r.qty)||1); return r.total; }
// Labor Total = labor_time(min) × qty_for_labor. QTY ending in mm/cm (or a Units
// column of mm/cm) is converted to whole meters first — matches the Windows rule.
function _sdLaborQtyMultiplier(r){
  const qtyRaw=String(r.qty??'').trim().toLowerCase();
  const unit=String(r.unit||'').trim().toLowerCase();
  const qtyNum=parseFloat(r.qty)||0;
  if(qtyRaw.endsWith('mm')||unit==='mm'){
    const num=parseFloat(qtyRaw.replace(/[^\d.]/g,''))||qtyNum||0;
    return Math.max(1, Math.ceil(num/1000));
  }
  if(qtyRaw.endsWith('cm')||unit==='cm'){
    const num=parseFloat(qtyRaw.replace(/[^\d.]/g,''))||qtyNum||0;
    return Math.max(1, Math.ceil(num/100));
  }
  return qtyNum>0 ? qtyNum : 1;
}
function _sdRecalcLaborTotal(r){
  const lt=parseFloat(r.labor_time)||0;
  r.labor_total = lt>0 ? lt*_sdLaborQtyMultiplier(r) : 0;
  return r.labor_total;
}
function _sdRecalcRow(r){ _sdRecalcTotal(r); _sdRecalcLaborTotal(r); return r; }
function _sdCellHTML(k,r,i){
  const fcPrice=parseFloat(r.price)||0, prPrice=parseFloat(r.priority_price)||0;
  let fcC='',prC='';
  if(fcPrice&&prPrice){fcC=fcPrice<=prPrice?'price-green':'price-red';prC=prPrice<=fcPrice?'price-green':'price-red';}
  switch(k){
    case 'qty': return `<input type="number" class="sd-qty" data-i="${i}" value="${r.qty??''}" min="0.001" step="any"
           style="width:60px;padding:2px 5px;border:1px solid var(--border);border-radius:4px;font-size:12px">`;
    case 'price': return fcPrice?`<span class="${fcC}">${fmtPrice(fcPrice)}</span>`:'';
    case 'priority_price': return prPrice?`<span class="${prC}">${fmtPrice(prPrice)}</span>`:'';
    case 'total': return `<strong>$${(r.total||0).toFixed(2)}</strong>`;
    case 'labor_time': return `<input type="number" class="sd-labor-time" data-i="${i}" value="${r.labor_time??''}" min="0" step="any"
           placeholder="min" style="width:60px;padding:2px 5px;border:1px solid var(--border);border-radius:4px;font-size:12px">`;
    case 'labor_total': return r.labor_total?`${r.labor_total.toFixed(2)} min`:'';
    default: return esc(r[k]);
  }
}
// Fills labor_time on any sdItems rows missing it: rules-based match first (offline,
// instant), then a single batched AI call for whatever is still unresolved.
async function _sdAutoMatchLabor(){
  await loadRoutings();
  if(!_routings.length) return;
  const stillUnmatched=[];
  sdItems.forEach((r,i)=>{
    if(String(r.labor_time||'').trim()) return;
    const desc=String(r.description||'').trim();
    if(!desc) return;
    const dur=_matchLaborTime(desc,_routings);
    if(dur){ r.labor_time=dur; _sdRecalcLaborTotal(r); }
    else stillUnmatched.push({idx:i,description:desc});
  });
  if(stillUnmatched.length){
    const mapping=await _aiMatchLaborBatch(stillUnmatched,_routings);
    for(const idxStr in mapping){
      const idx=parseInt(idxStr), dur=mapping[idxStr];
      if(dur && sdItems[idx]){ sdItems[idx].labor_time=dur; _sdRecalcLaborTotal(sdItems[idx]); }
    }
  }
}
let _sdFilterQ='';
let _sdProfitPct=40;
let _sdLaborRateMin=0.5; // USD/minute — user-editable in Settings; mirrors Windows' $0.50/min default
function _sdLaborRatePerMin(){ return parseFloat(_sdLaborRateMin)||0; }

function _sdComputeSummary(){
  let partsTotal=0, laborMinutes=0;
  for(const r of sdItems){ partsTotal+=r.total||0; laborMinutes+=r.labor_total||0; }
  const laborCost=laborMinutes*_sdLaborRatePerMin();
  const subtotal=partsTotal+laborCost;
  const final=subtotal*(1+_sdProfitPct/100);
  return {partsTotal, laborCost, subtotal, final};
}

// Full-featured Part Stock picker for Sales Desk — mirrors the Windows app's
// ui/sales_desk_dialog.py _PartPickerDialog: filter by Drawing Number / Drawing
// Name dropdown plus free-text boolean search, multi-select rows (checkboxes),
// an optional QTY-per-part override, and "Add Selected" (or, if nothing is
// checked, every currently-visible row is added — same as Windows).
// onAdd(parts, qtyOverride, hadSelection) is called once, after the modal closes.
function openPartPickerModal(onAdd){
  showModal(`<div class="modal" style="width:min(96vw,1100px)">
    <div class="modal-head"><h3>📦 Select from Part Stock</h3><button class="close-modal" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="toolbar" style="margin-bottom:8px">
        <label style="font-size:12px;color:var(--muted);white-space:nowrap">Filter by:</label>
        <select id="pp-field" class="search-box" style="flex:0 0 auto;width:150px">
          <option value="drawing_number">Drawing Number</option>
          <option value="drawing_name">Drawing Name</option>
        </select>
        <select id="pp-value" class="search-box" style="flex:0 0 auto;min-width:220px">
          <option value="">All</option>
        </select>
        <input class="search-box" id="pp-search" placeholder='Search part number / description — AND/OR/NOT/"phrase"'>
      </div>
      <div class="table-wrap" style="max-height:50vh" id="pp-table-wrap">
        <table id="pp-table">
          <thead><tr>
            <th style="width:28px"><input type="checkbox" id="pp-check-all"></th>
            <th>Part #</th><th>Drawing #</th><th>Drawing Name</th><th>Description</th>
            <th>QTY</th><th>Units</th><th>FC Price</th><th>Priority Price</th>
          </tr></thead>
          <tbody id="pp-tbody"></tbody>
        </table>
      </div>
      <div style="margin-top:10px;display:flex;align-items:center;gap:8px">
        <label style="font-size:12px;color:var(--muted)">QTY per selected part:</label>
        <input type="number" id="pp-qty" class="form-input" style="width:90px" value="1" min="0.001" step="any">
        <span style="font-size:11px;color:var(--muted)">(only used for rows you check — unchecked "Add All" keeps each part's own QTY)</span>
        <span class="count-badge" id="pp-count" style="margin-left:auto"></span>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-green" id="pp-add">＋ Add Selected</button>
    </div>
  </div>`);

  let visibleParts=[];
  const fieldSel=document.getElementById('pp-field');
  const valueSel=document.getElementById('pp-value');
  const searchInp=document.getElementById('pp-search');

  const reloadValueOptions=()=>{
    const field=fieldSel.value;
    const values=[...new Set(allParts.map(p=>p[field]).filter(Boolean).map(v=>String(v).trim()).filter(Boolean))]
      .sort((a,b)=>a.localeCompare(b));
    valueSel.innerHTML=`<option value="">All (${values.length})</option>`+
      values.map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join('');
    filterRows();
  };

  const filterRows=()=>{
    const field=fieldSel.value;
    const val=valueSel.value;
    const predicate=parseBoolQuery(searchInp.value);
    visibleParts=allParts.filter(p=>{
      if(val && String(p[field]||'').trim()!==val) return false;
      if(searchInp.value.trim()){
        const haystack=[p.part_number,p.description,p.manufacturer,p.drawing_number,p.drawing_name]
          .map(v=>String(v||'')).join(' | ').toLowerCase();
        if(!predicate(haystack)) return false;
      }
      return true;
    });
    const tb=document.getElementById('pp-tbody');
    tb.innerHTML=visibleParts.map(p=>{
      const fc=parseFloat(p.price)||0, pr=parseFloat(p.priority_price)||0;
      let fcC='',prC='';
      if(fc&&pr){fcC=fc<=pr?'price-green':'price-red';prC=pr<=fc?'price-green':'price-red';}
      return `<tr data-id="${esc(p._id)}">
        <td style="text-align:center"><input type="checkbox" class="pp-check" data-id="${esc(p._id)}"></td>
        <td>${esc(p.part_number)}</td><td>${esc(p.drawing_number)}</td><td>${esc(p.drawing_name)}</td>
        <td class="wrap">${esc(p.description)}</td><td>${esc(p.qty)}</td><td>${esc(p.unit||p.units)}</td>
        <td>${fc?`<span class="${fcC}">${fmtPrice(fc)}</span>`:''}</td>
        <td>${pr?`<span class="${prC}">${fmtPrice(pr)}</span>`:''}</td>
      </tr>`;
    }).join('')||`<tr class="empty-row"><td colspan="9">No parts match this filter</td></tr>`;
    document.getElementById('pp-count').textContent=`${visibleParts.length} parts`;
  };

  fieldSel.addEventListener('change',reloadValueOptions);
  valueSel.addEventListener('change',filterRows);
  searchInp.addEventListener('input',debounce(filterRows,220));
  document.getElementById('pp-check-all').addEventListener('change',e=>{
    document.querySelectorAll('.pp-check').forEach(cb=>cb.checked=e.target.checked);
  });
  reloadValueOptions();

  document.getElementById('pp-add').addEventListener('click',()=>{
    const checked=[...document.querySelectorAll('.pp-check:checked')].map(cb=>cb.dataset.id);
    const qtyOverride=parseFloat(document.getElementById('pp-qty').value)||1;
    const hadSelection=checked.length>0;
    const selected = hadSelection ? allParts.filter(p=>checked.includes(p._id)) : visibleParts;
    if(!selected.length){ toast('No parts to add','error'); return; }
    closeModal();
    onAdd(selected, qtyOverride, hadSelection);
  });
}

function openSDFileModal(){
  showModal(`<div class="modal">
    <div class="modal-head"><h3>Import BOM from File</h3><button class="close-modal" onclick="closeModal()">✕</button></div>
    <div class="modal-body" id="sd-modal-body">
      <div class="drop-zone" id="sd-drop-zone" tabindex="0">

      </div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button></div>
  </div>`);

  const dz=document.getElementById('sd-drop-zone');
  const fi=document.getElementById('sd-file-input');
  dz.addEventListener('click',()=>fi.click());
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dragover');});

  });
}

// Extracts BOM rows from ALL selected files, then shows one combined preview
// before adding everything to the Sales Desk in a single confirmation step.
async function handleSDFiles(files){
  if(!files || !files.length) return;
  const body=document.getElementById('sd-modal-body');
  const foot=document.querySelector('#modal-bg .modal-foot');
  const allRows=[];
  const errors=[];

  for(let fidx=0; fidx<files.length; fidx++){
    const file=files[fidx];
    const isPDF=file.type==='application/pdf'||file.name.toLowerCase().endsWith('.pdf');
    const isImg=file.type.startsWith('image/');
    if(!isPDF&&!isImg){ errors.push(`"${file.name}" — not a PDF or image, skipped`); continue; }

    const filePrefix = files.length>1 ? `File ${fidx+1}/${files.length}: ${esc(file.name)} — ` : '';
    body.innerHTML=`<div class="ai-status"><div class="ring"></div><span id="sd-ai-msg">${filePrefix}${isPDF?'Extracting PDF text…':'Reading image…'}</span></div>
      <div class="progress-bar"><div class="progress-fill" id="sd-prog"></div></div>`;
    foot.innerHTML='';
    const setM=(m,p)=>{
      const e=document.getElementById('sd-ai-msg');if(e)e.textContent=filePrefix+m;
      const b=document.getElementById('sd-prog');if(b)b.style.width=p+'%';
    };

    try {
      let extractedRows=[];
      let _pdfText='', _pdfTextLen=0, _pdfImages=[];

      if(isPDF){
        setM('Reading PDF pages…',15);
        const {pageTexts,pageImages}=await extractPDFPages(file);
        _pdfImages=pageImages;
        _pdfText=pageTexts.map((t,i)=>`=== PAGE ${i+1} ===\n${t}`).join('\n\n');
        _pdfTextLen=pageTexts.join('').trim().length;

        if(_pdfTextLen>50){
          setM('Sending text to AI…',45);
          extractedRows=await aiExtractBOM(_pdfText,false,null,file.name);
        }
        if(!extractedRows.length&&(anthKey||geminiKey)){
          setM('Text extraction found nothing — trying page vision…',60);
          for(let pi=0;pi<_pdfImages.length;pi++){
            const b64=_pdfImages[pi];
            if(!b64) continue;
            setM(`Vision analysis: page ${pi+1}/${_pdfImages.length}…`,60+Math.round(35*pi/_pdfImages.length));
            const rows2=await aiExtractBOM('',true,{b64,mimeType:'image/png'},file.name);
            if(rows2.length){extractedRows=rows2;break;}
          }
        }
      } else {
        setM('Encoding image…',20);
        const {b64,mimeType}=await encodeImage(file);
        setM('Sending to AI (vision)…',50);
        extractedRows=await aiExtractBOM('',true,{b64,mimeType},file.name);
      }

      _normalizeBOMRows(extractedRows);
      // Parse filename: "303-49-00251-00 REV 01 _approved.pdf"
      // → drawingName="303-49-00251-00", revision="REV 01 _approved"
      const _fileBase=file.name.replace(/\.[^.]+$/,'');
      const _spaceIdx=_fileBase.indexOf(' ');
      const effectiveDwgName=_spaceIdx>0 ? _fileBase.slice(0,_spaceIdx) : _fileBase;
      const fileRevision=_spaceIdx>0 ? _fileBase.slice(_spaceIdx+1).trim() : '';
      extractedRows.forEach(r=>{
        if(!r.drawing_number) r.drawing_number=effectiveDwgName;
        if(!r.drawing_name) r.drawing_name=effectiveDwgName;
        if(!r.revision) r.revision=fileRevision;
      });

      if(!extractedRows.length){
        errors.push(`"${file.name}" — no BOM rows detected`);
      } else {
        allRows.push(...extractedRows);
      }
    } catch(e){
      errors.push(`"${file.name}" — ${e.message}`);
    }
  }

  if(errors.length) errors.forEach(msg=>toast(msg,'error'));

  const _ringEl=body.querySelector('.ring');
  if(_ringEl){_ringEl.style.cssText='width:16px;height:16px;border-radius:50%;background:#1B6B3A;border:none;animation:none;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;line-height:1';
    _ringEl.textContent='✓';}

  if(!allRows.length){
    body.innerHTML=`<p style="color:var(--muted);margin-top:10px">No BOM rows were detected in ${files.length>1?`any of the ${files.length} files`:'this file'}.</p>`;
    foot.innerHTML=`<button class="btn btn-ghost" onclick="closeModal()">Close</button>`;
    return;
  }

  // Show editable preview — on Save: save to Part Stock + add to Sales Desk
  showBOMPreview(allRows, body, foot,
    `💾 Save to Part Stock + Sales Desk (${allRows.length} rows${files.length>1?` from ${files.length} files`:''})`,
    async(updatedRows)=>{
      await saveBOMToPartStock(updatedRows);
      await loadRoutings();
      let added=0;
      for(const r of updatedRows){
        const pn=(r.part_number||'').trim().toLowerCase();
        const match=pn?allParts.find(p=>String(p.part_number||'').toLowerCase()===pn):null;
        const qty=parseFloat(r.qty)||1;
        const item={
          part_number:r.part_number||r.item||'', description:r.description||'',
          drawing_number:r.drawing_number||match?.drawing_number||match?.drawing_name||'',
          qty, unit:r.unit||match?.unit||match?.units||'pcs',
          price:match?parseFloat(match.price)||0:0, priority_price:match?parseFloat(match.priority_price)||0:0, total:0,
          labor_time:'', labor_total:0
        };
        const m=_matchLaborTime(item.description,_routings);
        if(m) item.labor_time=m;
        _sdRecalcRow(item);
        sdItems.push(item);
        added++;
      }
      toast(`Added ${added} parts to Sales Desk`,'success');
      closeModal();
      document.getElementById('sd-tbody')&&renderSalesDesk();
      await _sdAutoMatchLabor();
      document.getElementById('sd-tbody')&&renderSalesDesk();
    }
  );
}

// ── Sales Desk → Excel quote export (client-side via SheetJS) ─────────────────
// Replaces the old Print/Save-PDF button. Mirrors the layout/columns/summary rows
// of the Windows app's ui/sales_desk_dialog.py _generate_quote_xlsx (item, drawing#,
// part#, drawing name, customer PN, description, qty, unit, manufacturer, FC price,
// priority price, part cost, labor time, labor total, then a summary block).
function exportSalesDeskExcel(){
  if(!sdItems.length){ toast('No items to export','error'); return; }
  if(!window.XLSX){ toast('Excel library not loaded — please reload the page','error'); return; }

  const {partsTotal,laborCost,subtotal,final}=_sdComputeSummary();
  const headers=['Item','Drawing #','Part Number','Description','QTY','Units',
    'FC Price','Priority Price','Part Cost','Labor Time (min)','Labor Total (min)'];
  const aoa=[['SALES DESK — PRICE QUOTATION'],
    ['Generated', new Date().toLocaleString()],
    [],
    headers];
  sdItems.forEach((r,i)=>{
    aoa.push([i+1, r.drawing_number||'', r.part_number||'', r.description||'',
      parseFloat(r.qty)||0, r.unit||'',
      parseFloat(r.price)||'', parseFloat(r.priority_price)||'',
      +(r.total||0).toFixed(2), r.labor_time||'', +(r.labor_total||0).toFixed(2)]);
  });
  aoa.push([]);
  aoa.push(['','','','','','','','','Parts Total', +partsTotal.toFixed(2)]);
  aoa.push(['','','','','','','','','Labor Cost', +laborCost.toFixed(2)]);
  aoa.push(['','','','','','','','','Subtotal', +subtotal.toFixed(2)]);
  aoa.push(['','','','','','','','',`Profit (${_sdProfitPct}%)`, +(final-subtotal).toFixed(2)]);
  aoa.push(['','','','','','','','','FINAL PRICE', +final.toFixed(2)]);

  const ws=XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols']=[{wch:6},{wch:16},{wch:20},{wch:38},{wch:8},{wch:8},{wch:12},{wch:14},{wch:12},{wch:14},{wch:14}];
  ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:10}}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Quote');
  const fname=`SalesDesk_Quote_${new Date().toISOString().slice(0,10)}.xlsx`;
  XLSX.writeFile(wb,fname);
  toast('Excel quote downloaded','success');
}

          </div>
          <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0;align-self:flex-start">
            <button class="btn btn-ghost btn-sm edit-cust" data-id="${c._id}">✏️ Edit</button>
            <button class="btn btn-red btn-sm del-cust" data-id="${c._id}" data-name="${esc(c.name)}">✕</button>
          </div>
        </div>
        ${custRfqs.length?`<div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border)">
          <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">RFQs (${custRfqs.length})</div>
          ${custRfqs.map(p=>`<div class="cust-rfq-link" data-id="${esc(p._id)}" data-name="${esc(p.name||p._id)}" style="font-size:11px;color:var(--blue-mid);cursor:pointer;padding:2px 0">📋 ${esc(p.name||p._id)}</div>`).join('')}
        </div>`:''}
      </div>`;
    }).join('')}
    </div>`);

  document.querySelectorAll('.edit-cust').forEach(btn=>btn.addEventListener('click',()=>{
    const c=customers.find(x=>x._id===btn.dataset.id); if(c) openCustomerModal(c);
  }));
  document.querySelectorAll('.del-cust').forEach(btn=>btn.addEventListener('click',()=>
    deleteCustomer(btn.dataset.id,btn.dataset.name)));
  document.querySelectorAll('.cust-rfq-link').forEach(el=>el.addEventListener('click',()=>{
    renderRFQDetail(el.dataset.id, el.dataset.name);
  }));
}

function openCustomerModal(cust={}){
  const isEdit=!!cust._id;
  const contacts=(cust.contacts||[{name:'',email:'',phone:''}]);

  function contactRow(c={},i){
    return `<tr>
      <td><input class="form-input" style="padding:4px 7px;font-size:12px" placeholder="Full name" value="${esc(c.name||'')}" data-f="name" data-ci="${i}"></td>
      <td><input class="form-input" style="padding:4px 7px;font-size:12px" placeholder="email@…" value="${esc(c.email||'')}" data-f="email" data-ci="${i}"></td>
      <td><input class="form-input" style="padding:4px 7px;font-size:12px" placeholder="+972…" value="${esc(c.phone||'')}" data-f="phone" data-ci="${i}"></td>
      <td><button class="btn btn-red btn-sm del-contact" style="padding:3px 6px">✕</button></td>
    </tr>`;
  }

  showModal(`<div class="modal">
    <div class="modal-head"><h3>${isEdit?'Edit':'New'} Customer</h3><button class="close-modal" id="modal-close">✕</button></div>
    <div class="modal-body">
      <div class="form-field">
        <label>Customer Name</label>
        <input class="form-input" id="cust-name-inp" placeholder="e.g. Elbit Systems" value="${esc(cust.name||'')}">

      </div>
      <div class="form-field">
        <label>Customer Icon</label>
        <div style="display:flex;align-items:center;gap:10px">
          <div id="cust-icon-preview" style="width:48px;height:48px;border-radius:8px;background:var(--blue-light);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0">
            ${cust.icon_b64?`<img src="${cust.icon_b64}" style="width:100%;height:100%;object-fit:cover">`:`<span style="font-size:22px">🏢</span>`}
          </div>
          <input type="file" id="cust-icon-inp" accept="image/*" style="font-size:12px">
          ${cust.icon_b64?`<button type="button" class="btn btn-ghost btn-sm" id="cust-icon-clear">Remove</button>`:''}
        </div>
      </div>
      <div style="margin-top:16px">
        <label style="font-size:12px;font-weight:600;color:var(--blue-dark)">Contacts</label>
        <table style="width:100%;margin-top:8px;font-size:12px">
          <thead><tr style="color:var(--muted)">
            <th style="padding:4px 6px;text-align:left">Name</th>
            <th style="padding:4px 6px;text-align:left">Email</th>
            <th style="padding:4px 6px;text-align:left">Phone</th>
            <th style="width:30px"></th>
          </tr></thead>
          <tbody id="contacts-tbody">
            ${contacts.map((c,i)=>contactRow(c,i)).join('')}
          </tbody>
        </table>
        <button class="btn btn-ghost btn-sm" id="btn-add-contact" style="margin-top:8px">＋ Add Contact</button>
      </div>
    </div>
    <div class="modal-foot" id="modal-foot-cust">
      <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
      ${isEdit?`<button class="btn btn-red btn-sm" id="btn-del-cust">Delete</button>`:''}
      <button class="btn btn-green" id="btn-save-cust">${isEdit?'Save Changes':'Create Customer'}</button>
    </div>
  </div>`);

  document.getElementById('modal-close').addEventListener('click',closeModal);
  document.getElementById('modal-cancel').addEventListener('click',closeModal);

  let contactCount=contacts.length;
  let _custIconB64=cust.icon_b64||'';

  document.getElementById('cust-icon-inp').addEventListener('change',()=>{
    const f=document.getElementById('cust-icon-inp').files[0];
    if(!f) return;
    const reader=new FileReader();
    reader.onload=e=>{
      _custIconB64=e.target.result;
      const prev=document.getElementById('cust-icon-preview');
      if(prev) prev.innerHTML=`<img src="${_custIconB64}" style="width:100%;height:100%;object-fit:cover">`;
    };
    reader.readAsDataURL(f);
  });
  document.getElementById('cust-icon-clear')?.addEventListener('click',()=>{
    _custIconB64='';
    const prev=document.getElementById('cust-icon-preview');
    if(prev) prev.innerHTML=`<span style="font-size:22px">🏢</span>`;
  });

  document.getElementById('btn-add-contact').addEventListener('click',()=>{
    const tb=document.getElementById('contacts-tbody');
    const row=document.createElement('tr');
    row.innerHTML=contactRow({},contactCount++).replace(/^<tr>/,'').replace(/<\/tr>$/,'');
    const tr=document.createElement('tr');
    tr.innerHTML=contactRow({name:'',email:'',phone:''},contactCount-1);
    tb.appendChild(tr);
    tr.querySelector('.del-contact').addEventListener('click',()=>tr.remove());
  });

  document.querySelectorAll('.del-contact').forEach(btn=>
    btn.addEventListener('click',()=>btn.closest('tr').remove()));

  document.getElementById('btn-save-cust').addEventListener('click',async()=>{
    const name=document.getElementById('cust-name-inp').value.trim();
    if(!name){ toast('Customer name is required','error'); return; }
    const rows=[...document.querySelectorAll('#contacts-tbody tr')];
    const custContacts=rows.map(tr=>({
      name:(tr.querySelector('[data-f="name"]')?.value||'').trim(),
      email:(tr.querySelector('[data-f="email"]')?.value||'').trim(),
      phone:(tr.querySelector('[data-f="phone"]')?.value||'').trim()
    })).filter(c=>c.name||c.email||c.phone);
    const btn=document.getElementById('btn-save-cust');
    btn.disabled=true; btn.textContent='Saving…';
    try{
      const col=collection(db,'companies',companyId,'customers');
      if(isEdit){
        await updateDoc(doc(col,cust._id),{name,contacts:custContacts,icon_b64:_custIconB64,updatedAt:serverTimestamp()});
      } else {
        await addDoc(col,{name,contacts:custContacts,icon_b64:_custIconB64,createdAt:serverTimestamp(),updatedAt:serverTimestamp()});
      }
      toast(isEdit?`Updated "${name}"`:`Customer "${name}" created`,'success');
      closeModal(); renderCustomers();
    }catch(e){ toast('Error: '+e.message,'error'); btn.disabled=false; btn.textContent=isEdit?'Save Changes':'Create Customer'; }
  });

  if(isEdit){
    document.getElementById('btn-del-cust')?.addEventListener('click',()=>{
      closeModal(); deleteCustomer(cust._id,cust.name);
    });
  }
}

async function deleteCustomer(id,name){
  if(!confirm(`Delete customer "${name}"?`)) return;
  try{
    await deleteDoc(doc(db,'companies',companyId,'customers',id));
    toast(`Deleted "${name}"`,'success'); renderCustomers();
  }catch(e){ toast('Error: '+e.message,'error'); }
}

// ══════════════════════════════════════════════════════════════════════════════
// SETTINGS MODAL
// ══════════════════════════════════════════════════════════════════════════════
function showSettingsModal(onSaved){
  showModal(`<div class="modal modal-sm">
    <div class="modal-head"><h3>⚙️ Settings</h3><button class="close-modal" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="form-field">
        <label>Anthropic API Key</label>
        <input class="form-input" id="inp-anth-key" type="password" placeholder="sk-ant-…" value="${esc(anthKey)}">
      </div>
      <div class="form-field" style="margin-top:12px">
        <label>Gemini API Key</label>
        <input class="form-input" id="inp-gem-key" type="password" placeholder="AIza…" value="${esc(geminiKey)}">
      </div>
      <p style="font-size:11px;color:var(--muted);margin-top:10px">Keys are stored in your browser (localStorage) and never sent to our servers.</p>
      <div style="border-top:1px solid var(--border);margin:16px 0 14px"></div>
      <div class="form-field">
        <label>Labor Rate ($ / minute)</label>
        <input class="form-input" id="inp-labor-rate" type="number" min="0" step="any"
          placeholder="0.5" value="${esc(_sdLaborRateMin)}">
        <p style="font-size:11px;color:var(--muted);margin-top:5px">Used to calculate Labor Cost in Sales Desk (Labor Total minutes × this rate). Shared across the company.</p>
      </div>
      <div class="form-field" style="margin-top:14px">
        <label>Manufacturing Routings</label>
        <button class="btn btn-ghost" id="btn-open-routings" style="width:100%;justify-content:center" type="button">⚙️ Manage Routings</button>
        <p style="font-size:11px;color:var(--muted);margin-top:5px">Operations used to auto-calculate Labor Time on Sales Desk BOM rows.</p>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-green" id="btn-save-settings">Save</button>
    </div>
  </div>`);

  document.getElementById('btn-open-routings').addEventListener('click',()=>openRoutingsModal());

  document.getElementById('btn-save-settings').addEventListener('click',async()=>{
    anthKey=document.getElementById('inp-anth-key').value.trim();
    geminiKey=document.getElementById('inp-gem-key').value.trim();
    _sdLaborRateMin=parseFloat(document.getElementById('inp-labor-rate').value)||0;
    localStorage.setItem('anth_key',anthKey);
    localStorage.setItem('gem_key',geminiKey);
    const btn=document.getElementById('btn-save-settings');
    btn.disabled=true; btn.textContent='Saving…';
    try{
      if(companyId) await setDoc(doc(db,'companies',companyId),{labor_rate_min:_sdLaborRateMin},{merge:true});
      toast('Settings saved','success');
      closeModal();
      if(onSaved) onSaved();
    }catch(e){ toast('Error saving: '+e.message,'error'); btn.disabled=false; btn.textContent='Save'; }
  });
}

</script>
