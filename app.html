<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpecPrice</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" async></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sidebar-w: 220px;
      --topbar-h: 52px;
      --blue-dark:  #1F3A5F;
      --blue-mid:   #2E75B6;
      --blue-light: #EBF3FB;
      --text:       #1A202C;
      --muted:      #718096;
      --border:     #CBD5E0;
      --green:      #1B6B3A;
      --green-bg:   #D4EDDA;
      --red:        #9B1C1C;
      --red-bg:     #FDE8E8;
      --row-alt:    #F0F6FB;
    }
    html, body { height: 100%; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    /* ── Splash ── */
    #splash { position:fixed; inset:0; background:var(--blue-dark); display:flex; align-items:center;
              justify-content:center; flex-direction:column; gap:16px; z-index:999; }
    #splash h1 { color:#fff; font-size:22px; font-weight:700; }
    .ring { width:34px; height:34px; border:3px solid rgba(255,255,255,.2); border-top-color:#fff;
            border-radius:50%; animation:spin .8s linear infinite; }

    /* ── Shell ── */
    #shell { display:flex; height:100vh; }
    aside { width:var(--sidebar-w); background:var(--blue-dark); color:#CBD5E0;
            display:flex; flex-direction:column; flex-shrink:0; overflow:hidden; }
    .sb-brand { padding:18px 16px 10px; font-size:17px; font-weight:700; color:#fff;
                border-bottom:1px solid rgba(255,255,255,.08); }
    .sb-company { padding:7px 16px 10px; font-size:11px; color:#90A4AE;
                  border-bottom:1px solid rgba(255,255,255,.08);
                  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    nav { flex:1; padding:6px 0; overflow-y:auto; }
    .nav-item { display:flex; align-items:center; gap:9px; padding:9px 18px; cursor:pointer;
                font-size:13px; color:#B0BEC5; transition:background .12s, color .12s;
                user-select:none; border-left:3px solid transparent; }
    .nav-item:hover { background:rgba(255,255,255,.07); color:#fff; }
    .nav-item.active { background:rgba(46,117,182,.3); color:#fff; border-left-color:var(--blue-mid); }
    .nav-item .icon { font-size:15px; width:20px; text-align:center; }
    .sb-foot { padding:10px 14px; border-top:1px solid rgba(255,255,255,.08); font-size:11px; color:#90A4AE; }
    #user-email-sb { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:7px; }
    .btn-signout { width:100%; padding:5px; background:rgba(255,255,255,.08);
                   border:1px solid rgba(255,255,255,.12); border-radius:5px;
                   color:#B0BEC5; font-size:11px; cursor:pointer; }
    .btn-signout:hover { background:rgba(255,255,255,.15); color:#fff; }

    /* ── Main ── */
    .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    .topbar { height:var(--topbar-h); background:#fff; border-bottom:1px solid var(--border);
              display:flex; align-items:center; padding:0 18px; gap:10px; flex-shrink:0; }
    .topbar h2 { font-size:15px; font-weight:700; color:var(--blue-dark); flex:1; }
    #content { flex:1; overflow:auto; padding:18px; background:#F7FAFC; }

    /* ── Buttons ── */
    .btn { display:inline-flex; align-items:center; gap:6px; padding:7px 13px; border:none;
           border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; transition:opacity .12s; }
    .btn:hover:not(:disabled) { opacity:.85; }
    .btn:disabled { opacity:.5; cursor:not-allowed; }
    .btn-blue   { background:var(--blue-mid); color:#fff; }
    .btn-green  { background:#1F8B4C; color:#fff; }
    .btn-red    { background:#E53E3E; color:#fff; }
    .btn-ghost  { background:var(--blue-light); color:var(--blue-dark); }
    .btn-sm     { padding:4px 9px; font-size:11px; }

    /* ── Toolbar ── */
    .toolbar { display:flex; align-items:center; gap:9px; margin-bottom:13px; flex-wrap:wrap; }
    .search-box { flex:1; min-width:200px; padding:7px 11px; border:1.5px solid var(--border);
                  border-radius:7px; font-size:13px; outline:none; color:var(--text); }
    .search-box:focus { border-color:var(--blue-mid); box-shadow:0 0 0 3px rgba(46,117,182,.1); }
    .count-badge { font-size:11px; color:var(--muted); white-space:nowrap; }

    /* ── Tables ── */
    .table-wrap { overflow:auto; border-radius:8px; border:1px solid var(--border); background:#fff; }
    table { width:100%; border-collapse:collapse; font-size:12.5px; }
    thead th { position:sticky; top:0; z-index:2; background:var(--blue-mid); color:#fff;
               font-weight:600; padding:7px 9px; text-align:left; white-space:nowrap;
               cursor:pointer; user-select:none; border-right:1px solid rgba(255,255,255,.25); }
    thead th:last-child { border-right:none; }
    thead th:hover { background:#1F5B92; }
    tbody tr:nth-child(odd)  { background:#FFFFFF; }
    tbody tr:nth-child(even) { background:var(--row-alt); }
    tbody tr:hover { background:#D6EAF8 !important; }
    td { padding:5px 9px; border-bottom:1px solid #EDF2F7; border-right:1px solid #E2E8F0;
         white-space:nowrap; vertical-align:middle; }
    td:last-child { border-right:none; }
    td.wrap { white-space:normal; max-width:240px; line-height:1.3; }
    td[contenteditable="true"] { outline:2px solid var(--blue-mid); outline-offset:-2px;
                                  background:#FFFDE7 !important; min-width:60px; }
    .price-green { color:var(--green); background:var(--green-bg); font-weight:600;
                   border-radius:4px; padding:1px 6px; }
    .price-red   { color:var(--red);   background:var(--red-bg);   font-weight:600;
                   border-radius:4px; padding:1px 6px; }
    .empty-row td { text-align:center; padding:40px; color:var(--muted); border-right:none; }

    /* ── Cards ── */
    .card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:12px; }
    .rfq-card { background:#fff; border:1px solid var(--border); border-radius:9px;
                padding:14px 16px; cursor:pointer; transition:box-shadow .12s, border-color .12s;
                animation:fadeIn .2s; display:flex; align-items:flex-start; gap:12px; }
    .rfq-card:hover { box-shadow:0 4px 16px rgba(0,0,0,.1); border-color:var(--blue-mid); }
    .rfq-card-body { flex:1; min-width:0; }
    .rfq-card h3 { font-size:13px; font-weight:700; color:var(--blue-dark);
                   white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .rfq-card p  { font-size:11px; color:var(--muted); margin-top:3px; }
    .rfq-card-icon { font-size:24px; flex-shrink:0; }

    /* ── Back / Breadcrumb ── */
    .breadcrumb { display:flex; align-items:center; gap:6px; margin-bottom:13px; font-size:12px; }
    .breadcrumb a { color:var(--blue-mid); cursor:pointer; }
    .breadcrumb a:hover { text-decoration:underline; }
    .breadcrumb span { color:var(--muted); }

    /* ── Drop zone ── */
    .drop-zone { border:2px dashed var(--border); border-radius:10px; padding:40px 20px;
                 text-align:center; cursor:pointer; transition:border-color .15s, background .15s; }
    .drop-zone:hover, .drop-zone.dragover { border-color:var(--blue-mid); background:var(--blue-light); }
    .drop-zone p { color:var(--muted); font-size:13px; margin-top:8px; }
    .drop-zone .icon-big { font-size:40px; display:block; margin-bottom:8px; }

    /* ── Modal ── */
    .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.5); display:flex;
                align-items:center; justify-content:center; z-index:200;
                animation:fadeIn .15s; }
    .modal { background:#fff; border-radius:12px; width:min(94vw,860px);
             max-height:90vh; display:flex; flex-direction:column;
             box-shadow:0 24px 64px rgba(0,0,0,.3); overflow:hidden; }
    .modal-sm { width:min(94vw,420px); }
    .modal-head { padding:16px 20px; border-bottom:1px solid var(--border);
                  display:flex; align-items:center; gap:10px; flex-shrink:0; }
    .modal-head h3 { font-size:15px; font-weight:700; color:var(--blue-dark); flex:1; }
    .modal-body { padding:20px; overflow-y:auto; flex:1; }
    .modal-foot { padding:12px 20px; border-top:1px solid var(--border);
                  display:flex; gap:8px; justify-content:flex-end; flex-shrink:0; }
    .close-modal { background:none; border:none; font-size:18px; cursor:pointer;
                   color:var(--muted); line-height:1; padding:2px 4px; }
    .close-modal:hover { color:var(--text); }

    /* ── Form ── */
    .form-field { margin-bottom:14px; }
    .form-field label { display:block; font-size:11px; font-weight:700; color:var(--muted);
                        text-transform:uppercase; letter-spacing:.5px; margin-bottom:5px; }
    .form-input { width:100%; padding:8px 11px; border:1.5px solid var(--border);
                  border-radius:7px; font-size:13px; outline:none; }
    .form-input:focus { border-color:var(--blue-mid); }

    /* ── Sales Desk ── */
    .sd-split { display:grid; grid-template-columns:1fr 300px; gap:14px; height:calc(100vh - 110px); }
    .sd-panel { background:#fff; border:1px solid var(--border); border-radius:9px;
                display:flex; flex-direction:column; overflow:hidden; }
    .sd-panel-title { padding:9px 13px; font-size:12px; font-weight:700;
                      color:var(--blue-dark); background:var(--blue-light);
                      border-bottom:1px solid var(--border); flex-shrink:0; }
    .sd-scroll { flex:1; overflow:auto; }
    .summary-row { display:flex; justify-content:space-between; padding:7px 13px;
                   font-size:12px; border-bottom:1px solid #EDF2F7; }
    .summary-total { background:var(--blue-dark); color:#fff; padding:11px 13px;
                     display:flex; justify-content:space-between; font-weight:700; font-size:13px; }

    /* ── Suggest dropdown ── */
    .suggest-wrap { position:relative; flex:1; }
    .suggest-list { position:absolute; top:100%; left:0; right:0; background:#fff;
                    border:1px solid var(--border); border-radius:7px;
                    box-shadow:0 8px 24px rgba(0,0,0,.12); z-index:50; max-height:260px;
                    overflow-y:auto; animation:fadeIn .1s; }
    .suggest-item { padding:8px 12px; cursor:pointer; border-bottom:1px solid #EDF2F7;
                    font-size:12px; }
    .suggest-item:hover { background:var(--blue-light); }
    .suggest-item:last-child { border-bottom:none; }
    .suggest-item strong { color:var(--blue-dark); }

    /* ── Toast ── */
    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
             padding:10px 20px; border-radius:8px; font-size:13px; font-weight:600;
             z-index:900; animation:fadeIn .2s; white-space:nowrap; }
    .toast-info    { background:var(--blue-dark); color:#fff; }
    .toast-success { background:#1F8B4C; color:#fff; }
    .toast-error   { background:#C0392B; color:#fff; }

    /* ── Progress bar ── */
    .progress-bar { height:4px; background:var(--blue-light); border-radius:2px; overflow:hidden; margin-top:8px; }
    .progress-fill { height:100%; background:var(--blue-mid); width:0%;
                     transition:width .3s; border-radius:2px; }

    /* ── AI status ── */
    .ai-status { display:flex; align-items:center; gap:8px; padding:10px 14px;
                 background:var(--blue-light); border-radius:7px; margin-bottom:12px; font-size:12px; }
    .ai-status .ring { width:16px; height:16px; border-width:2px; flex-shrink:0; }
    .ai-status .ring.done { border-color:var(--green); border-top-color:var(--green);
                             animation:none; }

    /* ── Column resizer ── */
    .col-resizer { position:absolute; right:0; top:0; bottom:0; width:5px; cursor:col-resize;
                   user-select:none; z-index:3; border-radius:0 3px 3px 0; }
    .col-resizer:hover, .col-resizer:active { background:rgba(255,255,255,.45); }

    @media print {
      aside, .topbar, .toolbar { display:none !important; }
      #content { padding:0 !important; background:#fff !important; overflow:visible !important; }
      #shell { display:block; height:auto; }
      .main { overflow:visible; }
      table { font-size:11px; }
    }
  </style>
</head>
<body>

<div id="splash"><h1>⚡ SpecPrice</h1><div class="ring" id="splash-ring"></div><p id="splash-msg" style="color:#90A4AE;font-size:12px;margin-top:12px;text-align:center;max-width:320px;line-height:1.5">Connecting…</p></div>

<div id="shell" style="display:none">
  <aside>
    <div class="sb-brand">⚡ SpecPrice</div>
    <div class="sb-company" id="sb-company">—</div>
    <nav>
      <div class="nav-item active" data-view="part-stock"><span class="icon">📦</span>Part Stock</div>
      <div class="nav-item" data-view="rfq"><span class="icon">📋</span>RFQ</div>
      <div class="nav-item" data-view="sales-desk"><span class="icon">💰</span>Sales Desk</div>
      <div class="nav-item" data-view="customers"><span class="icon">👥</span>Customers</div>
      <div class="nav-item" data-view="settings"><span class="icon">⚙️</span>Settings</div>
    </nav>
    <div class="sb-foot">
      <div id="user-email-sb"></div>
      <button class="btn-signout" id="logout-btn">Sign Out</button>
      <div style="margin-top:6px;font-size:10px;color:#607D8B;text-align:right">v1.6.5</div>
    </div>
  </aside>
  <div class="main">
    <div class="topbar">
      <h2 id="page-title">Part Stock</h2>
      <div id="topbar-actions" style="display:flex;gap:8px"></div>
    </div>
    <div id="content"></div>
  </div>
</div>

<div id="toast-el" class="toast toast-info" style="display:none"></div>

<script type="module">
import { initializeApp }       from 'https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js';
import { getAuth, onAuthStateChanged, signOut }
                               from 'https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js';
import { getFirestore, doc, getDoc, getDocs, setDoc, addDoc,
         updateDoc, deleteDoc, collection, query, orderBy, serverTimestamp }
                               from 'https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js';

// ── Firebase ──────────────────────────────────────────────────────────────────
const FB = initializeApp({
  apiKey:"AIzaSyCyRRnbEE_h7KC5RieXiNcVAZv_aaiqNK4",
  authDomain:"specprice-236a2.firebaseapp.com",
  projectId:"specprice-236a2",
  storageBucket:"specprice-236a2.firebasestorage.app",
  messagingSenderId:"294680326166",
  appId:"1:294680326166:web:d3ef0602f2103c87b30537"
});
const auth = getAuth(FB);
const db   = getFirestore(FB);

// ── State ─────────────────────────────────────────────────────────────────────
let companyId   = '';
let companyName = '';
let allParts    = [];
let anthKey     = '';
let currentView = 'part-stock';
let sortCol     = 'part_number';
let sortAsc     = true;
let sdItems     = [];
let geminiKey   = '';
const APP_VER   = '1.6.5';

// ── PDF.js ────────────────────────────────────────────────────────────────────
if (window.pdfjsLib) pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── Auth ──────────────────────────────────────────────────────────────────────
// Show error on splash
function splashErr(msg) {
  const el = document.getElementById('splash-msg');
  if (el) { el.textContent = msg; el.style.color = '#E53E3E'; }
  const ring = document.getElementById('splash-ring');
  if (ring) ring.style.display = 'none';
}
function splashMsg(msg) {
  const el = document.getElementById('splash-msg');
  if (el) el.textContent = msg;
}

// Catch uncaught errors and show on splash
window.addEventListener('unhandledrejection', e => splashErr('Error: ' + String(e.reason)));
window.addEventListener('error', e => splashErr('Error: ' + e.message));

// Timeout if Firebase never responds (likely: domain not authorized)
const _authTimeout = setTimeout(() => {
  splashErr('Could not connect.\n\nIf this is your first time: go to Firebase Console → Authentication → Settings → Authorized Domains → Add "dimitryu.github.io"');
}, 8000);

onAuthStateChanged(auth, async user => {
  clearTimeout(_authTimeout);
  if (!user) { location.href = 'index.html'; return; }
  splashMsg('Loading company data…');
  document.getElementById('user-email-sb').textContent = user.email;
  try {
    await initCompany(user);
  } catch(e) { splashErr('Company load error: ' + e.message); return; }
  document.getElementById('splash').style.display = 'none';
  document.getElementById('shell').style.display = 'flex';
  route('part-stock');
});
document.getElementById('logout-btn').addEventListener('click',
  () => signOut(auth).then(() => location.href = 'index.html'));

// ── Company ───────────────────────────────────────────────────────────────────
async function initCompany(user) {
  try {
    const uSnap = await getDoc(doc(db,'users',user.uid));
    companyId = (uSnap.data()||{}).company_id || '';
    if (!companyId) {
      const snap = await getDocs(collection(db,'companies'));
      if (snap.size === 1) companyId = snap.docs[0].id;
      else if (snap.size > 1) companyId = await pickCompany(snap.docs);
    }
    if (companyId) {
      const cSnap = await getDoc(doc(db,'companies',companyId));
      const cData = cSnap.data() || {};
      companyName = cData.name || companyId;
      anthKey   = cData.anthropic_key || '';
      geminiKey = cData.gemini_key || '';
      document.getElementById('sb-company').textContent = companyName;
    }
  } catch(e) { console.error('initCompany', e); }
}
function pickCompany(docs) {
  return new Promise(resolve => {
    const bg = mkEl('div','modal-bg');
    bg.innerHTML = `<div class="modal modal-sm"><div class="modal-head"><h3>Select Company</h3></div>
      <div class="modal-body">${docs.map(d=>`<div class="rfq-card" data-id="${d.id}" style="margin-bottom:8px">
        <div class="rfq-card-icon">🏢</div><div class="rfq-card-body"><h3>${esc(d.data().name||d.id)}</h3></div>
      </div>`).join('')}</div></div>`;
    bg.querySelectorAll('.rfq-card').forEach(el=>el.addEventListener('click',()=>{
      document.body.removeChild(bg); resolve(el.dataset.id);
    }));
    document.body.appendChild(bg);
  });
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function mkEl(tag,cls='',html=''){const e=document.createElement(tag);if(cls)e.className=cls;if(html)e.innerHTML=html;return e;}
function fmtPrice(v){const n=parseFloat(v);return isNaN(n)||n===0?'':'$'+n.toFixed(4);}
function fmtDate(v){if(!v)return'';try{const d=v.toDate?v.toDate():new Date(v);return d.toLocaleDateString('en-GB');}catch{return String(v);}}
function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};}
function nowISO(){return new Date().toISOString();}

let toastTimer;
function toast(msg,type='info'){
  const el=document.getElementById('toast-el');
  el.textContent=msg; el.className=`toast toast-${type}`; el.style.display='block';
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.style.display='none',3500);
}

function showModal(html){
  closeModal();
  const bg=mkEl('div','modal-bg'); bg.id='modal-bg';
  bg.innerHTML=html; document.body.appendChild(bg);
  bg.addEventListener('click',e=>{if(e.target===bg)closeModal();});
  return bg;
}
function closeModal(){const m=document.getElementById('modal-bg');if(m)m.remove();}
window.closeModal=closeModal;

function setContent(html){document.getElementById('content').innerHTML=html;}
function setActions(html){document.getElementById('topbar-actions').innerHTML=html;}

// ── Router ────────────────────────────────────────────────────────────────────
function route(v){
  currentView=v||'part-stock';
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.view===currentView));
  const TITLES={'part-stock':'📦 Part Stock','rfq':'📋 RFQ','sales-desk':'💰 Sales Desk','customers':'👥 Customers','settings':'⚙️ Settings'};
  document.getElementById('page-title').textContent=TITLES[currentView]||'';
  setActions('');
  if(currentView==='part-stock') renderPartStock();
  else if(currentView==='rfq') renderRFQList();
  else if(currentView==='sales-desk') renderSalesDesk();
  else if(currentView==='customers') renderCustomers();
  else if(currentView==='settings'){ setContent(''); showSettingsModal(); }
}
document.querySelectorAll('.nav-item').forEach(el=>el.addEventListener('click',()=>route(el.dataset.view)));

// ══════════════════════════════════════════════════════════════════════════════
// PART STOCK
// ══════════════════════════════════════════════════════════════════════════════
// ── Resizable columns ──────────────────────────────────────────────────────
function makeTableResizable(table){
  if(!table) return;
  table.querySelectorAll('thead th').forEach((th,ci)=>{
    if(th.querySelector('.col-resizer')) return;
    const r=document.createElement('div');
    r.className='col-resizer';
    th.appendChild(r);
    r.addEventListener('click',e=>{e.stopPropagation();e.preventDefault();});
    let x0=0,w0=0,dragged=false;
    r.addEventListener('mousedown',e=>{
      x0=e.clientX; w0=th.getBoundingClientRect().width; dragged=false;
      const move=ev=>{
        dragged=true;
        const w=Math.max(40,w0+ev.clientX-x0);
        th.style.minWidth=w+'px'; th.style.width=w+'px';
      };
      const up=()=>{
        document.removeEventListener('mousemove',move);
        document.removeEventListener('mouseup',up);
        if(dragged){
          const finalW=th.offsetWidth;
          table.querySelectorAll(`tbody tr > *:nth-child(${ci+1})`).forEach(td=>{
            td.style.whiteSpace='normal';
            td.style.maxWidth=finalW+'px';
            td.style.lineHeight='1.35';
          });
          // The mouseup that ends a drag almost never lands back on the thin
          // resizer strip — it lands on the header cell itself, so the browser
          // fires a native "click" on the th right after this handler returns,
          // which would otherwise trigger a column sort and wipe the resize on
          // re-render. Swallow that one trailing click.
          const suppressClick=ce=>{
            ce.stopPropagation(); ce.preventDefault();
            document.removeEventListener('click',suppressClick,true);
          };
          document.addEventListener('click',suppressClick,true);
          setTimeout(()=>document.removeEventListener('click',suppressClick,true),0);
        }
      };
      document.addEventListener('mousemove',move);
      document.addEventListener('mouseup',up);
      e.preventDefault(); e.stopPropagation();
    });
  });
}

async function renderPartStock(filter=''){
  setContent(`<div style="text-align:center;padding:60px;color:var(--muted)"><div class="ring" style="margin:0 auto 12px"></div>Loading parts…</div>`);
  setActions('');
  try { await loadParts(); } catch(e){ setContent(`<p style="color:red;padding:20px">${e.message}</p>`); return; }

  const q=(filter||'').toLowerCase().trim();
  const filtered=q
    ? allParts.filter(p=>[p.part_number,p.drawing_number,p.drawing_name,p.description,p.manufacturer,p.atlantium_pn]
        .some(v=>String(v||'').toLowerCase().includes(q)))
    : allParts;

  const sorted=[...filtered].sort((a,b)=>{
    let va=String(a[sortCol]||'').toLowerCase(), vb=String(b[sortCol]||'').toLowerCase();
    if(['price','priority_price'].includes(sortCol)){va=parseFloat(a[sortCol])||0;vb=parseFloat(b[sortCol])||0;}
    return sortAsc?(va<vb?-1:va>vb?1:0):(va<vb?1:va>vb?-1:0);
  });

  const COLS=[
    {k:'part_number',   l:'Part Number',    w:'120px'},
    {k:'drawing_number',l:'Drawing #',       w:'100px'},
    {k:'drawing_name',  l:'Drawing Name',    w:'130px'},
    {k:'atlantium_pn',  l:'Customer PN',     w:'100px'},
    {k:'description',   l:'Description',     w:'200px',wrap:true},
    {k:'manufacturer',  l:'Manufacturer',    w:'110px'},
    {k:'price',         l:'FC Price',         w:'85px'},
    {k:'distributor',   l:'Distributor',      w:'110px'},
    {k:'priority_price',l:'Priority Price',   w:'95px'},
    {k:'qty',           l:'QTY',              w:'55px'},
    {k:'unit',          l:'Units',            w:'55px'},
    {k:'updatedAt',     l:'Updated',          w:'90px'},
    {k:'_fc',           l:'FindChips',        w:'80px'},
  ];
  const arrow=k=>k===sortCol?(sortAsc?' ▲':' ▼'):'';
  const rows=sorted.slice(0,2000).map(p=>{
    const fcPrice=parseFloat(p.price)||0, prPrice=parseFloat(p.priority_price)||0;
    let fcC='',prC='';
    if(fcPrice&&prPrice){fcC=fcPrice<=prPrice?'price-green':'price-red';prC=prPrice<=fcPrice?'price-green':'price-red';}
    const unit=esc(p.unit||p.units||'');
    const fcUrl=p.findchips_url||`https://www.findchips.com/search/${encodeURIComponent(p.part_number||'')}`;
    return`<tr data-id="${esc(p._id)}">
      <td style="text-align:center"><input type="checkbox" class="ps-check" data-id="${esc(p._id)}"></td>
      <td>${esc(p.part_number)}</td><td>${esc(p.drawing_number)}</td>
      <td>${esc(p.drawing_name)}</td><td>${esc(p.atlantium_pn)}</td>
      <td class="wrap">${esc(p.description)}</td><td>${esc(p.manufacturer)}</td>
      <td>${fcPrice?`<span class="${fcC}">${fmtPrice(fcPrice)}</span>`:''}</td>
      <td>${esc(p.distributor)}</td>
      <td>${prPrice?`<span class="${prC}">${fmtPrice(prPrice)}</span>`:''}</td>
      <td>${esc(p.qty)}</td><td>${unit}</td><td>${fmtDate(p.updatedAt)}</td>
      <td>${p.part_number?`<a href="${fcUrl}" target="_blank" rel="noopener" class="btn btn-ghost btn-sm" style="text-decoration:none;font-size:11px">🔍 FC</a>`:''}</td>
    </tr>`;
  }).join('');

  setContent(`
    <div class="toolbar">
      <input class="search-box" id="ps-search" placeholder="Search part number, description, manufacturer…" value="${esc(filter)}">
      <button class="btn btn-blue" id="btn-ps-fc" style="white-space:nowrap;flex-shrink:0">🔍 Check FindChips</button>
      <button class="btn btn-ghost" id="btn-ps-priority" style="white-space:nowrap;flex-shrink:0">📥 Priority Import</button>
      <span class="count-badge">${filtered.length} parts${filtered.length>2000?' (showing 2000)':''}</span>
    </div>
    <div class="table-wrap"><table id="ps-table">
      <thead><tr>
        <th style="width:28px"><input type="checkbox" id="ps-check-all" title="Select all"></th>
        ${COLS.map(c=>`<th data-col="${c.k}" style="min-width:${c.w}">${c.l}${arrow(c.k)}</th>`).join('')}
      </tr></thead>
      <tbody>${rows||'<tr class="empty-row"><td colspan="14">No parts found</td></tr>'}</tbody>
    </table></div>`);

  makeTableResizable(document.querySelector('.table-wrap table'));
  const inp=document.getElementById('ps-search');
  inp.addEventListener('input',debounce(()=>{
    const v=inp.value, s=inp.selectionStart;
    renderPartStock(v).then(()=>{
      const ni=document.getElementById('ps-search');
      if(ni){ni.focus();ni.setSelectionRange(s,s);}
    });
  },260));
  inp.focus();
  document.querySelectorAll('thead th[data-col]').forEach(th=>th.addEventListener('click',()=>{
    const k=th.dataset.col;
    if(sortCol===k)sortAsc=!sortAsc;else{sortCol=k;sortAsc=true;}
    renderPartStock(inp.value);
  }));

  // Check-all toggle
  document.getElementById('ps-check-all')?.addEventListener('change',e=>{
    document.querySelectorAll('.ps-check').forEach(cb=>cb.checked=e.target.checked);
  });

  // FindChips button — check selected rows (or all if none selected)
  document.getElementById('btn-ps-fc')?.addEventListener('click',()=>{
    const checked=[...document.querySelectorAll('.ps-check:checked')].map(cb=>cb.dataset.id);
    const targets = checked.length
      ? sorted.filter(p=>checked.includes(p._id))
      : sorted.slice(0,2000);
    const items=targets.filter(p=>p.part_number).map(p=>({
      _id:p._id, part_number:p.part_number, qty:parseInt(p.qty)||1
    }));
    if(!items.length){toast('No parts with part numbers','error');return;}
    runFCCheckModal(items,'parts');
  });

  // Priority Import button
  document.getElementById('btn-ps-priority')?.addEventListener('click',()=>{
    openPriorityImportModal();
  });
}

async function createRFQ(){
  // Load customers + existing projects
  let customers=[], allProjects=[];
  try {
    const [cs,ps]=await Promise.all([
      getDocs(query(collection(db,'companies',companyId,'customers'),orderBy('name'))),
      getDocs(collection(db,'companies',companyId,'projects'))
    ]);
    customers=cs.docs.map(d=>({_id:d.id,...d.data()}));
    allProjects=ps.docs.map(d=>({_id:d.id,...d.data()}));
  } catch(e){ toast('Error: '+e.message,'error'); return; }

  if(!customers.length){
    if(confirm('No customers yet. Go to Customers to add one first?')) route('customers');
    return;
  }

  showModal(`<div class="modal modal-sm">
    <div class="modal-head"><h3>New RFQ</h3><button class="close-modal" id="modal-close">✕</button></div>
    <div class="modal-body">
      <div class="form-field">
        <label>Customer</label>
        <select class="form-input" id="rfq-cust-sel">
          <option value="">— Select customer —</option>
          ${customers.map(c=>`<option value="${c._id}" data-name="${esc(c.name)}">${esc(c.name)}</option>`).join('')}
        </select>
      </div>
      <div class="form-field" style="margin-top:10px">
        <label>RFQ Name (auto-generated)</label>
        <input class="form-input" id="rfq-name-prev" readonly
          style="background:#F7FAFC;color:var(--blue-dark);font-weight:700;letter-spacing:.5px"
          placeholder="Select a customer first…">
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
      <button class="btn btn-green" id="btn-confirm-rfq" disabled>✓ Create RFQ</button>
    </div>
  </div>`);

  document.getElementById('modal-close').addEventListener('click',closeModal);
  document.getElementById('modal-cancel').addEventListener('click',closeModal);

  const sel=document.getElementById('rfq-cust-sel');
  const prev=document.getElementById('rfq-name-prev');
  const confirmBtn=document.getElementById('btn-confirm-rfq');

  function calcName(custId, custName){
    const existing=allProjects.filter(p=>p.customer_id===custId
      ||(p.name||'').toLowerCase().startsWith(custName.toLowerCase()+'-'));
    let maxN=0;
    existing.forEach(p=>{const m=(p.name||'').match(/-0*(\d+)$/);if(m)maxN=Math.max(maxN,+m[1]);});
    return `${custName}-${String(maxN+1).padStart(3,'0')}`;
  }

  sel.addEventListener('change',()=>{
    const custId=sel.value;
    const custName=sel.selectedOptions[0]?.dataset.name||'';
    if(!custId){prev.value='';confirmBtn.disabled=true;return;}
    const rfqName=calcName(custId,custName);
    prev.value=rfqName;
    confirmBtn.disabled=false;
    confirmBtn.dataset.custid=custId;
    confirmBtn.dataset.custname=custName;
    confirmBtn.dataset.rfqname=rfqName;
  });

  confirmBtn.addEventListener('click',async()=>{
    const{custid:custId,custname:custName,rfqname:rfqName}=confirmBtn.dataset;
    if(!custId||!rfqName) return;
    try {
      confirmBtn.disabled=true; confirmBtn.textContent='Creating…';
      const ref=await addDoc(collection(db,'companies',companyId,'projects'),{
        name:rfqName, customer_id:custId, customer_name:custName,
        updatedAt:serverTimestamp(), createdAt:serverTimestamp()
      });
      toast('RFQ created','success');
      closeModal();
      renderRFQDetail(ref.id,rfqName);
    } catch(e){ toast('Error: '+e.message,'error'); confirmBtn.disabled=false; confirmBtn.textContent='✓ Create RFQ'; }
  });
}

async function deleteRFQ(id, name){
  if(!confirm(`Delete RFQ "${name}"? This removes all drawings.`)) return;
  try {
    // Delete all drawings first
    const snap=await getDocs(collection(db,'companies',companyId,'projects',id,'drawings'));
    await Promise.all(snap.docs.map(d=>deleteDoc(d.ref)));
    await deleteDoc(doc(db,'companies',companyId,'projects',id));
    toast('RFQ deleted','success');
    renderRFQList();
  } catch(e){ toast('Error: '+e.message,'error'); }
}

// RFQ DETAIL  (show drawings – each drawing has items[] array)
// ══════════════════════════════════════════════════════════════════════════════
async function renderRFQDetail(projectId, projectName){
  setContent(`<div style="text-align:center;padding:60px;color:var(--muted)"><div class="ring" style="margin:0 auto 12px"></div>Loading BOM…</div>`);
  setActions(`
    <button class="btn btn-blue" id="btn-add-drawing">＋ Add Drawing</button>
    <button class="btn btn-red" id="btn-bom-del-sel">🗑 Delete Selected</button>
    <button class="btn btn-ghost" id="btn-back-rfq">← Back</button>`);

  document.getElementById('btn-back-rfq').addEventListener('click', renderRFQList);
  document.getElementById('btn-add-drawing').addEventListener('click',
    () => openAddDrawingModal(projectId, projectName));

  document.getElementById('page-title').textContent = `📋 ${projectName}`;

  let drawings=[];
  try {
    const snap=await getDocs(collection(db,'companies',companyId,'projects',projectId,'drawings'));
    drawings=snap.docs.map(d=>({_id:d.id,...d.data()}));
    drawings.sort((a,b)=>String(a.name||'').localeCompare(String(b.name||'')));
  } catch(e){
    setContent(`<p style="color:red;padding:20px">Error loading BOM: ${e.message}</p>`);
    return;
  }

  // Flatten items from all drawings.
  // Desktop app stores: { name, items:[{item,part_number,...}] }
  // Old web format stored individual docs with BOM fields directly – handle both.
  const allRows = [];
  for(const dwg of drawings){
    if(Array.isArray(dwg.items) && dwg.items.length > 0){
      dwg.items.forEach((it,idx)=>allRows.push({...it, _dwgId:dwg._id, _dwgName:dwg.name||'', _idx:idx, _fmt:'arr'}));
    } else if(dwg.part_number || dwg.description || dwg.drawing_number){
      // Old format: document IS the BOM row
      allRows.push({...dwg, _dwgId:dwg._id, _dwgName:'', _idx:-1, _fmt:'doc'});
    }
  }
  // Sort: drawing name first (keeps groups together), then item number within each drawing
  allRows.sort((a,b)=>{
    const nc=String(a._dwgName||'').localeCompare(String(b._dwgName||''));
    if(nc!==0) return nc;
    return (parseInt(a.item)||0)-(parseInt(b.item)||0);
  });

  const BOM_COLS=[
    {k:'item',          l:'Item',        w:'45px'},
    {k:'drawing_number',l:'Drawing #',   w:'110px'},
    {k:'revision',      l:'Revision',    w:'90px'},
    {k:'part_number',   l:'Part #',      w:'130px'},
    {k:'atlantium_pn',  l:'Cust PN',     w:'100px'},
    {k:'description',   l:'Description', w:'210px',wrap:true},
    {k:'qty',           l:'QTY',         w:'55px'},
    {k:'unit',          l:'Units',       w:'55px'},
    {k:'manufacturer',  l:'Manufacturer',w:'110px'},
  ];

  // Unique drawing names for filter
  const uniqueDwgs = [...new Set(allRows.map(r=>r._dwgName).filter(Boolean))];

  // Build rows with drawing-name group headers + data-dwg attributes for filtering
  let lastDwgName = null;
  const rowsHtml = allRows.map((row,ri)=>{
    let header = '';
    if(row._dwgName && row._dwgName !== lastDwgName){
      lastDwgName = row._dwgName;
      header = `<tr data-dwg="${esc(row._dwgName)}" class="dwg-grp-hdr" style="background:var(--blue-light)"><td colspan="11" style="font-weight:700;color:var(--blue-dark);padding:5px 9px;border-right:none"><span class="dwg-toggle" style="cursor:pointer;user-select:none;display:inline-block;width:14px;text-align:center;font-size:11px;margin-right:5px;color:var(--blue-mid)" title="Collapse/expand">▼</span>📄 ${esc(row._dwgName)}</td></tr>`;
    }
    return header + `<tr data-dwg="${esc(row._dwgName)}">
      <td style="text-align:center"><input type="checkbox" class="bom-check" data-dwgid="${esc(row._dwgId)}" data-idx="${row._idx}" data-fmt="${row._fmt}"></td>
      ${BOM_COLS.map(c=>{
        // Drawing # fallback: if empty, show the drawing container name
        let val=row[c.k]||'';
        if(c.k==='drawing_number'&&!val) val=row._dwgName||'';
        return `<td${c.wrap?' class="wrap"':''}>${esc(val)}</td>`;
      }).join('')}
      <td><button class="btn btn-red btn-sm del-row" data-dwgid="${esc(row._dwgId)}" data-idx="${row._idx}" data-fmt="${row._fmt}" title="Delete row">✕</button></td>
    </tr>`;
  }).join('');

  const filterOpts = uniqueDwgs.map(n=>`<option value="${esc(n)}">${esc(n)}</option>`).join('');
  setContent(`
    ${uniqueDwgs.length>=1?`<div class="toolbar" style="margin-bottom:10px">
      ${uniqueDwgs.length>1?`
      <label style="font-size:12px;color:var(--muted);white-space:nowrap">Filter by Drawing:</label>
      <select id="dwg-filter" class="search-box" style="flex:0 0 auto;max-width:280px;padding:5px 9px">
        <option value="">All Drawings (${uniqueDwgs.length})</option>
        ${filterOpts}
      </select>`:''}
      <button class="btn btn-ghost btn-sm" id="btn-collapse-all" style="white-space:nowrap;flex-shrink:0">▶ Collapse All</button>
      <span class="count-badge" id="bom-flt-count">${allRows.length} parts</span>
    </div>`:''}
    <div class="table-wrap"><table id="bom-table">
      <thead><tr><th style="width:28px"><input type="checkbox" id="bom-check-all" title="Select all"></th>${BOM_COLS.map(c=>`<th style="min-width:${c.w}">${c.l}</th>`).join('')}<th style="width:40px"></th></tr></thead>
      <tbody id="bom-tbody">${rowsHtml||'<tr class="empty-row"><td colspan="11">No BOM rows yet. Click ＋ Add Drawing to import.</td></tr>'}</tbody>
    </table></div>
    <div style="margin-top:8px;font-size:11px;color:var(--muted)">${allRows.length} parts across ${drawings.length} drawing(s)</div>`);

  // Drawing group collapse/expand (per-group toggle)
  document.querySelectorAll('.dwg-grp-hdr').forEach(hdr=>{
    hdr.querySelector('.dwg-toggle')?.addEventListener('click',e=>{
      const dwg=hdr.dataset.dwg;
      const arrow=e.currentTarget;
      const collapsing=arrow.textContent.trim()==='▼';
      arrow.textContent=collapsing?'▶':'▼';
      document.querySelectorAll('#bom-tbody tr:not(.dwg-grp-hdr)').forEach(tr=>{
        if(tr.dataset.dwg===dwg) tr.style.display=collapsing?'none':'';
      });
    });
  });

  // Collapse All / Expand All toggle
  let _allCollapsed=false;
  document.getElementById('btn-collapse-all')?.addEventListener('click',e=>{
    _allCollapsed=!_allCollapsed;
    document.querySelectorAll('.dwg-grp-hdr').forEach(hdr=>{
      const arrow=hdr.querySelector('.dwg-toggle');
      if(arrow) arrow.textContent=_allCollapsed?'▶':'▼';
      const dwg=hdr.dataset.dwg;
      document.querySelectorAll('#bom-tbody tr:not(.dwg-grp-hdr)').forEach(tr=>{
        if(tr.dataset.dwg===dwg) tr.style.display=_allCollapsed?'none':'';
      });
    });
    e.currentTarget.textContent=_allCollapsed?'▼ Expand All':'▶ Collapse All';
  });

  // Drawing filter
  document.getElementById('dwg-filter')?.addEventListener('change',e=>{
    const val=e.target.value;
    document.querySelectorAll('#bom-tbody tr').forEach(tr=>{
      tr.style.display=(!val||tr.dataset.dwg===val)?'':'none';
    });
    const cnt=val?document.querySelectorAll(`#bom-tbody tr[data-dwg="${val}"]:not(.dwg-grp-hdr)`).length:allRows.length;
    const el=document.getElementById('bom-flt-count');
    if(el) el.textContent=cnt+' parts';
  });

  makeTableResizable(document.getElementById('bom-table'));

  document.querySelectorAll('.del-row').forEach((btn,ri)=>{
    btn.addEventListener('click', async()=>{
      if(!confirm('Delete this BOM row?')) return;
      const dwgId=btn.dataset.dwgid, idx=parseInt(btn.dataset.idx), fmt=btn.dataset.fmt;
      try {
        if(fmt==='doc'){
          await deleteDoc(doc(db,'companies',companyId,'projects',projectId,'drawings',dwgId));
        } else {
          // Remove item at idx from drawing.items array
          const dwgRef=doc(db,'companies',companyId,'projects',projectId,'drawings',dwgId);
          const dwgSnap=await getDoc(dwgRef);
          const items=[...(dwgSnap.data()?.items||[])];
          items.splice(idx,1);
          if(items.length===0){
            await deleteDoc(dwgRef);
          } else {
            await updateDoc(dwgRef,{items, updatedAt:serverTimestamp()});
          }
        }
        toast('Row deleted','success');
        renderRFQDetail(projectId, projectName);
      } catch(e){ toast(e.message,'error'); }
    });
  });

  // Check-all toggle
  document.getElementById('bom-check-all')?.addEventListener('change',e=>{
    document.querySelectorAll('.bom-check').forEach(cb=>cb.checked=e.target.checked);
  });

  // Bulk delete selected rows
  document.getElementById('btn-bom-del-sel')?.addEventListener('click', async()=>{
    const checked=[...document.querySelectorAll('.bom-check:checked')];
    if(!checked.length){ toast('No rows selected','error'); return; }
    if(!confirm(`Delete ${checked.length} selected row(s)?`)) return;
    const selections=checked.map(cb=>({dwgId:cb.dataset.dwgid, idx:parseInt(cb.dataset.idx), fmt:cb.dataset.fmt}));
    const byDwg={};
    selections.forEach(s=>{ const key=s.dwgId+'|'+s.fmt; (byDwg[key]=byDwg[key]||[]).push(s); });
    try{
      for(const key in byDwg){
        const group=byDwg[key];
        const {dwgId,fmt}=group[0];
        if(fmt==='doc'){
          await deleteDoc(doc(db,'companies',companyId,'projects',projectId,'drawings',dwgId));
        } else {
          const dwgRef=doc(db,'companies',companyId,'projects',projectId,'drawings',dwgId);
          const dwgSnap=await getDoc(dwgRef);
          let items=[...(dwgSnap.data()?.items||[])];
          const idxs=group.map(g=>g.idx).sort((a,b)=>b-a);
          idxs.forEach(idx=>{ if(idx>=0 && idx<items.length) items.splice(idx,1); });
          if(items.length===0){ await deleteDoc(dwgRef); }
          else { await updateDoc(dwgRef,{items, updatedAt:serverTimestamp()}); }
        }
      }
      toast(`Deleted ${selections.length} row(s)`,'success');
      renderRFQDetail(projectId, projectName);
    }catch(e){ toast('Error: '+e.message,'error'); }
  });
}

// Extracts BOM rows from ALL selected files (one after another), then shows a single
// combined preview for review. Each row keeps track of which file/drawing it came from
// via drawing_number/revision (parsed from the filename), so on save the rows are
// grouped back into per-drawing RFQ documents.
async function handleFiles(files, projectId, projectName, drawingNameOverride=''){
  if(!files || !files.length) return;
  const body = document.getElementById('modal-body-inner');
  const foot = document.getElementById('modal-foot');
  const allRows = [];
  const errors = [];

  for(let fidx=0; fidx<files.length; fidx++){
    const file = files[fidx];
    const isPDF = file.type==='application/pdf' || file.name.toLowerCase().endsWith('.pdf');
    const isImg = file.type.startsWith('image/');
    if(!isPDF && !isImg){ errors.push(`"${file.name}" — not a PDF or image, skipped`); continue; }

    const filePrefix = files.length>1 ? `File ${fidx+1}/${files.length}: ${esc(file.name)} — ` : '';
    body.innerHTML = `
      <div class="ai-status"><div class="ring"></div><span id="ai-msg">${filePrefix}${isPDF?'Extracting PDF text…':'Reading image…'}</span></div>
      <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>`;
    foot.innerHTML = '';
    const setMsg = (m,pct) => {
      const el=document.getElementById('ai-msg'); if(el)el.textContent=filePrefix+m;
      const pb=document.getElementById('prog'); if(pb)pb.style.width=pct+'%';
    };

    try {
      let extractedRows = [];
      let _pdfText='', _pdfTextLen=0, _pdfImages=[];
      if(isPDF){
        setMsg('Reading PDF pages…', 15);
        const {pageTexts, pageImages} = await extractPDFPages(file);
        _pdfImages = pageImages;
        _pdfText = pageTexts.map((t,i)=>`=== PAGE ${i+1} ===\n${t}`).join('\n\n');
        _pdfTextLen = pageTexts.join('').trim().length;

        if(_pdfTextLen > 50){
          setMsg('Sending text to AI…', 45);
          extractedRows = await aiExtractBOM(_pdfText, false, null, file.name);
        }
        if(!extractedRows.length && (anthKey||geminiKey)){
          setMsg('Text extraction found nothing — trying page vision…', 60);
          for(let pi=0; pi<_pdfImages.length; pi++){
            const b64=_pdfImages[pi];
            if(!b64) continue;
            setMsg(`Vision analysis: page ${pi+1}/${_pdfImages.length}…`, 60+Math.round(35*pi/_pdfImages.length));
            const rows=await aiExtractBOM('',true,{b64,mimeType:'image/png'},file.name);
            if(rows.length){ extractedRows=rows; break; }
          }
        }
      } else {
        setMsg('Encoding image…', 20);
        const {b64, mimeType} = await encodeImage(file);
        setMsg('Sending to AI (vision)…', 50);
        extractedRows = await aiExtractBOM('', true, {b64, mimeType}, file.name);
      }

      _normalizeBOMRows(extractedRows);
      // Parse filename: "303-49-00251-00 REV 01 _approved.pdf"
      // → drawingName="303-49-00251-00", revision="REV 01 _approved"
      const _fileBase = file.name.replace(/\.[^.]+$/,'');
      const _spaceIdx = _fileBase.indexOf(' ');
      const effectiveDwgName = (files.length===1 && drawingNameOverride)
        ? drawingNameOverride
        : (_spaceIdx>0 ? _fileBase.slice(0,_spaceIdx) : _fileBase);
      const fileRevision = _spaceIdx>0 ? _fileBase.slice(_spaceIdx+1).trim() : '';
      extractedRows.forEach(r=>{
        if(!r.drawing_number) r.drawing_number=effectiveDwgName;
        if(!r.drawing_name) r.drawing_name=effectiveDwgName;
        if(!r.revision) r.revision=fileRevision;
      });

      if(!extractedRows.length){
        errors.push(`"${file.name}" — no BOM rows detected`);
      } else {
        allRows.push(...extractedRows);
      }
    } catch(e){
      const hint = e.message==='Failed to fetch'
        ? 'network error — check your internet connection or Anthropic/Gemini key'
        : e.message;
      errors.push(`"${file.name}" — ${hint}`);
    }
  }

  if(errors.length) errors.forEach(msg=>toast(msg,'error'));

  const _ringEl=document.querySelector('.ai-status .ring');
  if(_ringEl){_ringEl.style.cssText='width:16px;height:16px;border-radius:50%;background:#1B6B3A;border:none;animation:none;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;line-height:1';
    _ringEl.textContent='✓';}

  if(!allRows.length){
    body.innerHTML = `<p style="color:var(--muted);margin-top:10px">No BOM rows were detected in ${files.length>1?`any of the ${files.length} files`:'this file'}.</p>`;
    foot.innerHTML = `<button class="btn btn-ghost" id="modal-cancel-err">Close</button>`;
    document.getElementById('modal-cancel-err')?.addEventListener('click',closeModal);
    return;
  }

  showBOMPreview(allRows, body, foot,
    `💾 Save to Part Stock + RFQ (${allRows.length} rows${files.length>1?` from ${files.length} files`:''})`,
    async(updatedRows)=>{
      await saveBOMToPartStock(updatedRows);
      // Group rows by drawing_number so each source file lands in its own RFQ drawing doc
      const byDwg = {};
      updatedRows.forEach(r=>{
        const key = r.drawing_number || projectName;
        (byDwg[key]=byDwg[key]||[]).push(r);
      });
      for(const dwgName in byDwg){
        await saveBOMToRFQSilent(byDwg[dwgName], projectId, dwgName);
      }
      toast(`Saved ${updatedRows.length} BOM rows across ${Object.keys(byDwg).length} drawing(s)`,'success');
      closeModal();
      renderRFQDetail(projectId, projectName);
    }
  );
}

// Writes rows into a single named drawing document under an RFQ (creating or
// merging into an existing drawing of that name). No UI side-effects — callers
// (which may invoke this once per drawing when saving a multi-file batch) are
// responsible for toasts/closing the modal/re-rendering once all groups are saved.
async function saveBOMToRFQSilent(rows, projectId, drawingName){
  const col=collection(db,'companies',companyId,'projects',projectId,'drawings');
  const existSnap=await getDocs(col);
  const existing=existSnap.docs.find(d=>(d.data().name||'')===(drawingName));
  if(existing){
    const oldItems=existing.data().items||[];
    await updateDoc(existing.ref,{items:[...oldItems,...rows], updatedAt:serverTimestamp()});
  } else {
    await addDoc(col,{name:drawingName, items:rows, updatedAt:serverTimestamp()});
  }
  await updateDoc(doc(db,'companies',companyId,'projects',projectId),{updatedAt:serverTimestamp()});
}

// ── Save BOM rows to Part Stock (parts_cache) ─────────────────────────────────
// Upserts each row by part_number; never overwrites existing price/stock/distributor
async function saveBOMToPartStock(rows){
  let created=0;
  for(const r of rows){
    const pn=(r.part_number||'').trim();
    if(!pn) continue;
    // Firestore doc IDs can't have / ; replace unsafe chars
    const key=pn.replace(/[\/\\#\[\]*?]/g,'_').slice(0,500);
    const ref=doc(db,'companies',companyId,'parts_cache',key);
    try{
      const snap=await getDoc(ref);
      if(snap.exists()){
        // Merge — only fill in fields that are currently empty
        const d=snap.data();
        const patch={updatedAt:serverTimestamp()};
        if(r.description && !d.description) patch.description=r.description;
        if(r.drawing_number && !d.drawing_number) patch.drawing_number=r.drawing_number;
        if(r.manufacturer && !d.manufacturer) patch.manufacturer=r.manufacturer;
        if(r.unit && !d.unit) patch.unit=r.unit;
        if(r.atlantium_pn && !d.atlantium_pn) patch.atlantium_pn=r.atlantium_pn;
        if(Object.keys(patch).length>1) await updateDoc(ref,patch);
      } else {
        await setDoc(ref,{
          part_number:pn, description:r.description||'',
          drawing_number:r.drawing_number||'', manufacturer:r.manufacturer||'',
          unit:r.unit||'', atlantium_pn:r.atlantium_pn||'',
          price:'', distributor:'', stock:'', price_description:'',
          updatedAt:serverTimestamp()
        });
        created++;
      }
    }catch(e){ console.warn('[PartStock] save error:',pn,e.message); }
  }
  // Refresh in-memory parts list so SD search sees new entries
  await loadParts();
  return created;
}

// ── PDF extraction: text + render pages as PNG images (like Windows app) ────────
async function extractPDFPages(file){
  if(!window.pdfjsLib) throw new Error('PDF.js not loaded — please reload the page and try again.');
  if(!pdfjsLib.GlobalWorkerOptions.workerSrc)
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const ab = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:ab}).promise;
  const pageTexts=[], pageImages=[];
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    // -- Text --
    const content = await page.getTextContent();
    const cells = content.items.map(it=>({x:it.transform[4],y:it.transform[5],str:it.str}));
    cells.sort((a,b)=>b.y-a.y||a.x-b.x);
    let lastY=null, line='', lines=[];
    for(const it of cells){
      if(lastY!==null && Math.abs(it.y-lastY)>4){lines.push(line);line='';}
      line+=(line?' ':'')+it.str; lastY=it.y;
    }
    if(line) lines.push(line);
    pageTexts.push(lines.join('\n'));
    // -- Render page as PNG at 2.5x zoom (matches Windows app 3x approach) --
    try{
      const vp = page.getViewport({scale:2.5});
      const canvas = document.createElement('canvas');
      canvas.width=vp.width; canvas.height=vp.height;
      await page.render({canvasContext:canvas.getContext('2d'), viewport:vp}).promise;
      pageImages.push(canvas.toDataURL('image/png').split(',')[1]);
    }catch(e){ pageImages.push(null); }
  }
  return {pageTexts, pageImages};
}

// ── Image encoding ─────────────────────────────────────────────────────────────
function encodeImage(file){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const url=e.target.result;
      res({b64:url.split(',')[1], mimeType:url.split(';')[0].slice(5)});
    };
    reader.onerror=rej;
    reader.readAsDataURL(file);
  });
}
// ── Generic file → base64 (for PDF vision) ──────────────────────────────────
function fileToB64(file){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onload=e=>res(e.target.result.split(',')[1]);
    reader.onerror=rej;
    reader.readAsDataURL(file);
  });
}

let _dbgLastAI='';
function _parseAIJson(raw){
  _dbgLastAI=raw;
  const m=raw.match(/\[[\s\S]*\]/);
  if(!m){console.warn('[AI] no JSON array. Raw:',raw.slice(0,300));return[];}
  try{return JSON.parse(m[0]);}
  catch(e){console.warn('[AI] parse error:',e.message,'at:',m[0].slice(0,200));return[];}
}

async function aiExtractBOM(text, isImage, imgData, filename){
  if(anthKey){
    try { return await _anthropicBOM(text, isImage, imgData, filename); }
    catch(e){
      if(!geminiKey) throw e;
      console.warn('Anthropic failed, using Gemini:', e.message);
    }
  }
  if(geminiKey){ return await _geminiBOM(text, isImage, imgData, filename); }
  throw new Error('No AI API key configured. Add a Gemini or Anthropic key in Settings.');
}

async function _anthropicBOM(text, isImage, imgData, filename){
  const messages = isImage ? [{role:'user',content:[
    {type:'image',source:{type:'base64',media_type:imgData.mimeType,data:imgData.b64}},
    {type:'text',text:_BOM_VISION_PROMPT}
  ]}] : [{role:'user', content: _BOM_TEXT_PROMPT(filename)+'\n'+text.slice(0,30000)}];
  const resp = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'x-api-key':anthKey,'anthropic-version':'2023-06-01',
             'anthropic-dangerous-allow-browser':'true','content-type':'application/json'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001', max_tokens:4096, messages})
  });
  if(!resp.ok){let m=`Anthropic error ${resp.status}`;
    try{const e=await resp.json();m=e.error?.message||m;}catch{}throw new Error(m);}
  const data=await resp.json();
  return _parseAIJson(data.content[0].text.trim());
}

async function _geminiBOM(text, isImage, imgData, filename){
  const parts = isImage
    ? [{inlineData:{mimeType:imgData.mimeType,data:imgData.b64}},{text:_BOM_VISION_PROMPT}]
    : [{text: _BOM_TEXT_PROMPT(filename)+'\n'+text.slice(0,30000)}];
  const resp = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiKey}`,
    {method:'POST',headers:{'content-type':'application/json'},
     body:JSON.stringify({contents:[{parts}],generationConfig:{thinkingConfig:{thinkingBudget:0}}})}
  );
  if(!resp.ok){let m=`Gemini error ${resp.status}`;
    try{const e=await resp.json();m=e.error?.message||m;}catch{}throw new Error(m);}
  const data=await resp.json();
  const raw=(data.candidates?.[0]?.content?.parts||[]).filter(p=>!p.thought).map(p=>p.text||'').join('');
  console.log('[Gemini] parts:',data.candidates?.[0]?.content?.parts?.length,'raw(200):',raw.slice(0,200));
  _dbgLastAI=raw;
  return _parseAIJson(raw.trim());
}

function _detectCurrency(raw){

}

async function _fetchCurrencyRate(code){
  if(code==='USD') return 1;
  if(_currencyRateCache[code]) return _currencyRateCache[code];
  const url=_COINMILL_URLS[code];
  if(!url) return null;
  try{
    const resp=await fetch(FC_PROXY+encodeURIComponent(url),{signal:AbortSignal.timeout(15000)});
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const html=await resp.text();
    // coinmill pages phrase the rate as "1 XXX = Y.YYYYY USD" somewhere in the text
    let m = html.match(new RegExp('1\\s*'+code+'\\s*=\\s*([\\d,]+\\.?\\d*)\\s*USD','i'));
    if(!m) m = html.match(/=\s*([\d,]+\.\d+)\s*USD/i);
    if(m){
      const rate=parseFloat(m[1].replace(/,/g,''));
      if(rate>0){ _currencyRateCache[code]=rate; return rate; }
    }
  }catch(e){ console.warn('[Currency] rate fetch error:',code,e.message); }
  return null;
}

// Parses a raw price (may include a currency symbol/code) and converts to a plain USD number.
// Returns null if the value can't be parsed at all. Falls back to the raw number (unconverted)
// if a live rate can't be fetched, so an import never blocks on network issues.
async function _convertToUSD(raw){
  const s=String(raw||'').trim();
  if(!s) return null;
  const num=parseFloat(s.replace(/[^\d.\-]/g,''));
  if(isNaN(num)) return null;
  const cur=_detectCurrency(s);
  if(cur==='USD') return num;
  const rate=await _fetchCurrencyRate(cur);
  if(!rate){ console.warn('[Currency] no rate for',cur,'- keeping original value'); return num; }
  return Math.round(num*rate*10000)/10000;
}

function _fcParsePriceBreaks(texts){
  const breaks=[];
  // Strategy A: "N+ $X.XX" pairs inline
  for(const t of texts){
    const re=/([\d,]+)\s*\+?\s*\$\s*([\d,]+\.\d+)/g; let m;
    while((m=re.exec(t))!==null){
      const qty=parseInt(m[1].replace(/,/g,''));
      const price=parseFloat(m[2].replace(/,/g,''));
      if(qty>0&&price>0) breaks.push([qty,price]);
    }
  }
  // Strategy B: adjacent qty/price cells
  if(!breaks.length){
    for(let i=0;i<texts.length-1;i++){
      const qm=texts[i].trim().match(/^([\d,]+)$/);
      if(qm){
        const nxt=texts[i+1];
        const pm=nxt.match(/\$\s*([\d,]+\.\d+)/)||nxt.trim().match(/^(\d+\.\d{2,4})$/);
        if(pm){
          const qty=parseInt(qm[1].replace(/,/g,''));
          const price=parseFloat(pm[1].replace(/,/g,''));
          if(qty>0&&price>0){breaks.push([qty,price]);i++;}
        }
      }
    }
  }
  // Strategy C: first dollar amount = unit price
  if(!breaks.length){
    for(const t of texts){
      const m=t.match(/\$\s*([\d,]+\.\d+)/);
      if(m){breaks.push([1,parseFloat(m[1].replace(/,/g,''))]);break;}
      const m2=t.trim().match(/^(\d+\.\d{2,4})$/);
      if(m2){breaks.push([1,parseFloat(m2[1])]);break;}
    }
  }
  breaks.sort((a,b)=>a[0]-b[0]);
  const seen=new Set(),result=[];
  for(const [qty,price] of breaks){if(!seen.has(qty)){seen.add(qty);result.push([qty,price]);}}
  return result;
}

function _fcNearestBreakPrice(breaks,targetQty){
  if(!breaks.length) return '';
  let [bestQty,bestPrice]=breaks[0];
  let bestDist=Math.abs(targetQty-bestQty);
  for(const [qty,price] of breaks.slice(1)){
    const dist=Math.abs(targetQty-qty);
    if(dist<bestDist||(dist===bestDist&&qty<bestQty)){bestDist=dist;bestQty=qty;bestPrice=price;}
  }
  return '$'+bestPrice.toFixed(4).replace(/\.?0+$/,'');
}

async function _fcFetchPart(partNumber, qty=0){
  const pn=partNumber.trim();
  if(!pn) return null;
  const fcUrl=`https://www.findchips.com/search/${encodeURIComponent(pn)}`;
  const resp=await fetch(FC_PROXY+encodeURIComponent(fcUrl),{signal:AbortSignal.timeout(22000)});
  if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const html=await resp.text();
  if(/no results were found|0 results|no parts found/i.test(html))
    return{price:'Not found',distributor:'',stock:'',url:fcUrl};
  const doc=new DOMParser().parseFromString(html,'text/html');
  // Collect every individual (qty,price) price-break across ALL distributor rows,
  // then pick the single break whose quantity is closest to the target qty — not
  // just whichever distributor happens to be cheapest overall (that can pick a
  // price meant for a completely different order size).
  const candidates=[];
  for(const sec of doc.querySelectorAll('[class*="distributor-results"]')){
    let dist='';
    for(const sel of ['[class*="distributor-name"]','[class*="distributor-title"]','h2','h3','h4']){
      const tag=sec.querySelector(sel);
      if(tag){const t=tag.textContent.trim().replace(/\s+/g,' ');if(t.length>1&&t.length<60){dist=t;break;}}
    }
    for(const row of sec.querySelectorAll('tr')){
      const cells=[...row.querySelectorAll('td')];
      if(cells.length<3) continue;
      const texts=cells.map(c=>c.textContent.trim().replace(/\s+/g,' '));
      const brks=_fcParsePriceBreaks(texts);
      if(!brks.length) continue;
      let stock='';
      for(const t of texts){
        if(!t.includes('$')&&t.length<20){const m=t.match(/^([\d,]+)$/);if(m){stock=m[1];break;}}
      }
      for(const [bqty,bprice] of brks){
        candidates.push({qty:bqty, price:bprice, distributor:dist, stock});
      }
    }
  }
  if(!candidates.length) return{price:'Not found',distributor:'',stock:'',url:fcUrl};
  const target=qty>0?qty:1;
  let best=candidates[0];
  let bestDist=Math.abs(target-best.qty);
  for(const c of candidates.slice(1)){
    const d=Math.abs(target-c.qty);
    if(d<bestDist || (d===bestDist && c.price<best.price)){ best=c; bestDist=d; }
  }
  return {
    price: '$'+best.price.toFixed(4).replace(/\.?0+$/,''),
    distributor: best.distributor,
    stock: best.stock,
    url: fcUrl
  };
}

// mode: 'parts' → save to Firestore allParts; 'sd' → update sdItems in memory
async function runFCCheckModal(items, mode){
  if(!items.length){toast('No parts to check','error');return;}
  let stopped=false;
  const total=items.length;

  showModal(`<div class="modal" style="width:min(94vw,820px)">
    <div class="modal-head"><h3>🔍 FindChips Price Check</h3><button class="close-modal" id="fc-close-x">✕</button></div>
    <div class="modal-body" id="fc-modal-body">
      <div class="ai-status" style="margin-bottom:8px"><div class="ring"></div><span id="fc-status">Starting…</span></div>
      <div class="progress-bar"><div class="progress-fill" id="fc-prog"></div></div>
      <div style="max-height:340px;overflow:auto;margin-top:12px">
        <table style="width:100%;font-size:12px" id="fc-res-table">
          <thead><tr style="position:sticky;top:0;background:#fff">
            <th>Part #</th><th>QTY</th><th>Price</th><th>Distributor</th><th>Stock</th><th>Status</th>
          </tr></thead>
          <tbody id="fc-res-tbody">
            ${items.map((it,i)=>`<tr id="fc-row-${i}">
              <td>${esc(it.part_number)}</td><td>${it.qty||1}</td>
              <td id="fc-p-${i}" style="color:var(--muted)">—</td>
              <td id="fc-d-${i}" style="color:var(--muted)">—</td>
              <td id="fc-s-${i}" style="color:var(--muted)">—</td>
              <td id="fc-st-${i}"><span class="ring" style="width:12px;height:12px;border-width:2px;display:inline-block;vertical-align:middle"></span></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" id="btn-fc-stop">Stop</button>
      <span id="fc-summary" style="font-size:12px;color:var(--muted)"></span>
    </div>
  </div>`);

  const _fcRefresh=()=>{ if(mode==='parts'){allParts=[];renderPartStock();}else{renderSalesDesk();} };
  document.getElementById('btn-fc-stop').addEventListener('click',()=>{stopped=true;closeModal();_fcRefresh();});
  document.getElementById('fc-close-x').addEventListener('click',()=>{stopped=true;closeModal();_fcRefresh();});

  let done=0, found=0;
  for(let i=0;i<items.length;i++){
    if(stopped) break;
    const it=items[i];
    const setStatus=(txt,color='var(--muted)')=>{
      const el=document.getElementById(`fc-st-${i}`);
      if(el) el.innerHTML=`<span style="color:${color};font-size:11px">${txt}</span>`;
    };
    const prog=document.getElementById('fc-prog');
    if(prog) prog.style.width=Math.round(100*i/total)+'%';
    const stEl=document.getElementById('fc-status');
    if(stEl) stEl.textContent=`Checking ${i+1}/${total}: ${it.part_number}`;
    setStatus('⏳');
    try{
      const res=await _fcFetchPart(it.part_number, parseInt(it.qty)||1);
      if(!res||res.price==='Not found'){
        setStatus('Not found','var(--muted)');
        const pd=document.getElementById(`fc-p-${i}`); if(pd) pd.textContent='—';
      } else {
        found++;
        const priceNum=parseFloat(res.price.replace(/[^0-9.]/g,''))||0;
        const pd=document.getElementById(`fc-p-${i}`); if(pd){pd.textContent=res.price;pd.style.color='var(--green)';}
        const dd=document.getElementById(`fc-d-${i}`); if(dd){dd.textContent=res.distributor||'';dd.style.color='var(--text)';}
        const sd=document.getElementById(`fc-s-${i}`); if(sd){sd.textContent=res.stock||'';sd.style.color='var(--text)';}
        setStatus('✓','var(--green)');
        // Update data
        if(mode==='parts'){
          const partId=it._id;
          if(partId){
            try{
              await updateDoc(doc(db,'companies',companyId,'parts_cache',partId),{
                price:priceNum, distributor:res.distributor||'',
                stock:res.stock||'', findchips_url:res.url||'',
                updatedAt:serverTimestamp()
              });
              const ap=allParts.find(p=>p._id===partId);
              if(ap){ap.price=priceNum;ap.distributor=res.distributor||'';ap.stock=res.stock||'';ap.findchips_url=res.url||'';}
            }catch(e){console.warn('FC save error:',e.message);}
          }
        } else if(mode==='sd'){
          const sdIdx=it._sdIdx;
          if(sdIdx!==undefined&&sdItems[sdIdx]){
            sdItems[sdIdx].price=priceNum;
            sdItems[sdIdx].total=priceNum*(sdItems[sdIdx].qty||1);
          }
          // Also save the result to Part Stock (parts_cache) — upsert by part_number
          try{
            const pn=(it.part_number||'').trim();
            if(pn){
              const existing=allParts.find(p=>String(p.part_number||'').toLowerCase()===pn.toLowerCase());
              if(existing){
                await updateDoc(doc(db,'companies',companyId,'parts_cache',existing._id),{
                  price:priceNum, distributor:res.distributor||'',
                  stock:res.stock||'', findchips_url:res.url||'',
                  updatedAt:serverTimestamp()
                });
                existing.price=priceNum; existing.distributor=res.distributor||'';
                existing.stock=res.stock||''; existing.findchips_url=res.url||'';
              } else {
                const key=pn.replace(/[\/\\#\[\]*?]/g,'_').slice(0,500);
                const ref=doc(db,'companies',companyId,'parts_cache',key);
                await setDoc(ref,{
                  part_number:pn, description:'', drawing_number:'', manufacturer:'',
                  unit:'', atlantium_pn:'',
                  price:priceNum, distributor:res.distributor||'', stock:res.stock||'',
                  price_description:'', findchips_url:res.url||'',
                  updatedAt:serverTimestamp()
                },{merge:true});
                allParts.push({_id:key, part_number:pn, price:priceNum,
                  distributor:res.distributor||'', stock:res.stock||'', findchips_url:res.url||''});
              }
            }
          }catch(e){ console.warn('FC->PartStock save error:',e.message); }
        }
      }
    }catch(e){
      setStatus('Error','var(--red)');
      console.warn('FC error',it.part_number,e.message);
    }
    done++;
    const sumEl=document.getElementById('fc-summary');
    if(sumEl) sumEl.textContent=`${done}/${total} checked, ${found} prices found`;
    // Small delay to avoid hammering FindChips
    if(i<items.length-1&&!stopped) await new Promise(r=>setTimeout(r,400));
  }

  const prog=document.getElementById('fc-prog'); if(prog) prog.style.width='100%';
  const stEl=document.getElementById('fc-status');
  if(stEl) stEl.textContent=`Done — ${found}/${total} prices found`;
  const stopBtn=document.getElementById('btn-fc-stop');
  if(stopBtn){stopBtn.textContent='Close';stopBtn.className='btn btn-green';
    stopBtn.onclick=()=>{closeModal();_fcRefresh();};
  }
  const ringEl=document.querySelector('#fc-modal-body .ring');
  if(ringEl){ringEl.style.cssText='width:16px;height:16px;border-radius:50%;background:#1B6B3A;border:none;animation:none;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;line-height:1';ringEl.textContent='✓';}
}

// ── PRIORITY IMPORT — Excel (part_number + price) → Part Stock priority_price ─
// ══════════════════════════════════════════════════════════════════════════════
const _PN_HEADER_HINTS=['part number','part_number','partnumber','pn','p/n','מק"ט','מקט','catalog','item number','item no','cat no','cat#'];
const _PRICE_HEADER_HINTS=['price','unit price','מחיר','cost','rate'];

function _priorityFindCol(headers, hints){
  const norm=headers.map(h=>String(h||'').trim().toLowerCase());
  for(const hint of hints){
    const idx=norm.findIndex(h=>h===hint);
    if(idx>=0) return idx;
  }
  for(const hint of hints){
    const idx=norm.findIndex(h=>h.includes(hint));
    if(idx>=0) return idx;
  }
  return -1;
}

function openPriorityImportModal(){
  showModal(`<div class="modal">
    <div class="modal-head"><h3>📥 Priority Import</h3><button class="close-modal" onclick="closeModal()">✕</button></div>

async function handlePriorityFile(file){
  const body=document.getElementById('pi-modal-body');
  const foot=document.querySelector('#modal-bg .modal-foot');
  body.innerHTML=`<div class="ai-status"><div class="ring"></div><span id="pi-msg">Reading file…</span></div>`;
  foot.innerHTML='';

  try{
    if(!window.XLSX) throw new Error('Excel library not loaded — please reload the page and try again.');
    const ab=await file.arrayBuffer();
    const wb=XLSX.read(ab,{type:'array'});
    const sheet=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(sheet,{header:1,raw:false,defval:''});
    if(!rows.length) throw new Error('The file appears to be empty.');

    // Header row may have fewer cells than some data rows actually contain (Excel
    // pivot-table exports, trailing unlabeled columns, etc). Pad the header list out
    // to the widest row in the file so every real data column gets its own selectable
    // option in the mapping dropdowns below — otherwise the Price dropdown could end
    // up with no valid option and silently collapse to the same column as Part Number.
    const maxCols = rows.reduce((m,r)=>Math.max(m, r.length), 0);
    const headers = Array.from({length:maxCols}, (_,i)=>rows[0][i] ?? '');

    // Suggest column mapping (Part Number may be labeled "מק"ט", Price may be "מחיר ליחידה") —
    // let the user confirm/adjust before importing, rather than guessing silently.
    let pnCol=_priorityFindCol(headers,_PN_HEADER_HINTS);
    let prCol=_priorityFindCol(headers,_PRICE_HEADER_HINTS);
    const headerDetected = pnCol>=0 || prCol>=0;
    if(pnCol<0) pnCol=0;
    if(prCol<0) prCol=(pnCol===1?0:1);
    if(prCol===pnCol) prCol=(pnCol===0 && maxCols>1)?1:(pnCol>0?0:1);

    showPriorityColumnMap(rows, headers, pnCol, prCol, headerDetected, body, foot);
  }catch(e){
    body.innerHTML+=`<p style="color:red;margin-top:12px">Error: ${e.message}</p>`;
    foot.innerHTML=`<button class="btn btn-ghost" onclick="closeModal()">Close</button>`;
  }
}

// Suggest which column is Part Number (מק"ט) and which is Priority Price (מחיר ליחידה),
// pre-selected from header detection, and let the user confirm or change before parsing.
function showPriorityColumnMap(rows, headers, pnCol, prCol, headerDetected, body, foot){
  const colLabel=(h,i)=>{ const t=String(h||'').trim(); return t?esc(t):`(Column ${i+1})`; };
  const colOpts=(selected)=>headers.map((h,i)=>`<option value="${i}" ${i===selected?'selected':''}>${colLabel(h,i)}</option>`).join('');
  const sampleRows=(headerDetected?rows.slice(1):rows).slice(0,3);

  body.innerHTML=`
    <p style="font-size:12px;color:var(--muted);margin-bottom:12px">We suggest the following column mapping — confirm or change before importing:</p>
    <div class="form-field">
      <label>Part Number column (מק"ט)</label>
      <select class="form-input" id="pi-pn-col">${colOpts(pnCol)}</select>
    </div>
    <div class="form-field" style="margin-top:10px">
      <label>Priority Price column (מחיר ליחידה)</label>
      <select class="form-input" id="pi-price-col">${colOpts(prCol)}</select>
    </div>
    <div class="form-field" style="margin-top:10px">
      <label style="display:flex;align-items:center;gap:6px;text-transform:none;font-weight:400;font-size:12px">
        <input type="checkbox" id="pi-has-header" ${headerDetected?'checked':''} style="width:auto">
        First row is a header row (skip it)
      </label>
    </div>
    ${sampleRows.length?`<div style="margin-top:12px">
      <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Preview:</div>
      <div class="table-wrap"><table style="font-size:11px">
        <tbody>${sampleRows.map(r=>`<tr>${headers.map((_,i)=>`<td>${esc(String(r[i]??''))}</td>`).join('')}</tr>`).join('')}</tbody>
      </table></div>
    </div>`:''}`;

  foot.innerHTML=`
    <button class="btn btn-ghost" id="pi-map-cancel">Cancel</button>
    <button class="btn btn-green" id="pi-map-continue">Continue →</button>`;

  document.getElementById('pi-map-cancel').addEventListener('click',closeModal);
  document.getElementById('pi-map-continue').addEventListener('click', async()=>{
    const pnColSel=parseInt(document.getElementById('pi-pn-col').value);
    const prColSel=parseInt(document.getElementById('pi-price-col').value);
    const skipHeader=document.getElementById('pi-has-header').checked;
    if(pnColSel===prColSel){ toast('Part Number and Price columns must be different','error'); return; }

    const btn=document.getElementById('pi-map-continue');
    btn.disabled=true; btn.textContent='Converting…';

    const dataRows=skipHeader?rows.slice(1):rows;
    const parsed=[];
    for(const r of dataRows){
      const pn=String(r[pnColSel]||'').trim();
      const rawPrice=r[prColSel];
      if(!pn || rawPrice===''||rawPrice===undefined||rawPrice===null) continue;
      const usd=await _convertToUSD(rawPrice);
      if(usd===null) continue;
      parsed.push({part_number:pn, priority_price:usd, _raw:String(rawPrice)});
    }

    if(!parsed.length){
      body.innerHTML=`<p style="color:var(--muted);margin-top:10px">No valid Part Number + Price rows were detected with this mapping.</p>`;
      foot.innerHTML=`<button class="btn btn-ghost" onclick="closeModal()">Close</button>`;
      return;
    }

    showPriorityPreview(parsed, body, foot);
  });
}

    <div class="ai-status" style="margin-bottom:10px">
      <div style="width:16px;height:16px;border-radius:50%;background:#1B6B3A;border:none;animation:none;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;line-height:1">✓</div>

  document.getElementById('pi-cancel').addEventListener('click',closeModal);

    const finalRows=[];
    document.querySelectorAll('#pi-preview-tbody tr').forEach(tr=>{
      const pn=tr.querySelector('[data-k="part_number"]')?.textContent.trim()||'';
      const pr=parseFloat(tr.querySelector('[data-k="priority_price"]')?.textContent.trim())||0;
      if(pn) finalRows.push({part_number:pn, priority_price:pr});

    if(!finalRows.length){ toast('No rows to save','error'); return; }
    const btn=document.getElementById('pi-save');

      allParts=[]; renderPartStock();
    }catch(e){ toast('Save error: '+e.message,'error'); btn.disabled=false; btn.textContent=`💾 Save to Part Stock (${finalRows.length} rows)`; }
  });
}

// Upsert priority prices into parts_cache. Existing part_number → update priority_price;
// unknown part_number → create a new row with just part_number + priority_price.
async function savePriorityImport(rows){
  await loadParts();
  let updated=0, created=0;
  for(const r of rows){
    const pn=r.part_number.trim();
    if(!pn) continue;
    const existing=allParts.find(p=>String(p.part_number||'').toLowerCase()===pn.toLowerCase());
    try{
      if(existing){
        await updateDoc(doc(db,'companies',companyId,'parts_cache',existing._id),{
          priority_price:r.priority_price, updatedAt:serverTimestamp()
        });
        existing.priority_price=r.priority_price;
        updated++;
      } else {
        const key=pn.replace(/[\/\\#\[\]*?]/g,'_').slice(0,500);
        await setDoc(doc(db,'companies',companyId,'parts_cache',key),{
          part_number:pn, description:'', drawing_number:'', manufacturer:'',
          unit:'', atlantium_pn:'', price:'', distributor:'', stock:'', price_description:'',
          priority_price:r.priority_price, updatedAt:serverTimestamp()
        },{merge:true});
        allParts.push({_id:key, part_number:pn, priority_price:r.priority_price});
        created++;
      }
    }catch(e){ console.warn('[PriorityImport] save error:',pn,e.message); }
  }
  return {updated, created};
}

function openSDFileModal(){

  const dz=document.getElementById('sd-drop-zone');

  dz.addEventListener('click',()=>fi.click());
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dragover');});

    if(fi.files.length) handleSDFiles([...fi.files]);
  });
