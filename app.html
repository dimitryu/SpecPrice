<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpecPrice — App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sidebar-w: 220px;
      --topbar-h: 52px;
      --blue-dark:  #1F3A5F;
      --blue-mid:   #2E75B6;
      --blue-light: #EBF3FB;
      --text:       #1A202C;
      --muted:      #718096;
      --border:     #E2E8F0;
      --green:      #1B6B3A;
      --green-bg:   #D4EDDA;
      --red:        #9B1C1C;
      --red-bg:     #FDE8E8;
      --row-alt:    #F0F6FB;
      --row-even:   #FFFFFF;
    }
    html, body { height: 100%; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }

    /* ---------- Splash ---------- */
    #splash {
      position: fixed; inset: 0; background: var(--blue-dark);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px; z-index: 999;
    }
    #splash h1 { color: #fff; font-size: 22px; font-weight: 700; }
    .ring {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,.25); border-top-color: #fff;
      border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---------- Layout ---------- */
    #shell { display: flex; height: 100vh; }

    /* Sidebar */
    aside {
      width: var(--sidebar-w); background: var(--blue-dark); color: #CBD5E0;
      display: flex; flex-direction: column; flex-shrink: 0;
      overflow: hidden;
    }
    .sb-brand {
      padding: 18px 16px 10px; font-size: 17px; font-weight: 700;
      color: #fff; border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .sb-company {
      padding: 8px 16px 12px; font-size: 11px; color: #90A4AE;
      letter-spacing: .3px; border-bottom: 1px solid rgba(255,255,255,.08);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    nav { flex: 1; padding: 8px 0; }
    .nav-item {
      display: flex; align-items: center; gap: 9px;
      padding: 9px 18px; cursor: pointer; font-size: 13px;
      color: #B0BEC5; transition: background .12s, color .12s;
      user-select: none; border-left: 3px solid transparent;
    }
    .nav-item:hover   { background: rgba(255,255,255,.07); color: #fff; }
    .nav-item.active  { background: rgba(46,117,182,.3); color: #fff;
                        border-left-color: var(--blue-mid); }
    .nav-item .icon   { font-size: 15px; width: 20px; text-align: center; }
    .sb-foot {
      padding: 12px 16px; border-top: 1px solid rgba(255,255,255,.08);
      font-size: 11px; color: #90A4AE;
    }
    #user-email-sb { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 8px; }
    .btn-signout {
      width: 100%; padding: 6px; background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12); border-radius: 5px;
      color: #B0BEC5; font-size: 12px; cursor: pointer; transition: background .12s;
    }
    .btn-signout:hover { background: rgba(255,255,255,.15); color: #fff; }

    /* Main area */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* Topbar */
    .topbar {
      height: var(--topbar-h); background: #fff; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 20px; gap: 12px; flex-shrink: 0;
    }
    .topbar h2 { font-size: 15px; font-weight: 700; color: var(--blue-dark); flex: 1; }
    .topbar-actions { display: flex; gap: 8px; }

    /* Content */
    #content { flex: 1; overflow: auto; padding: 20px; background: #F7FAFC; }

    /* Toolbar */
    .toolbar {
      display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap;
    }
    .search-box {
      flex: 1; min-width: 220px; padding: 7px 12px;
      border: 1.5px solid var(--border); border-radius: 7px;
      font-size: 13px; outline: none; color: var(--text);
    }
    .search-box:focus { border-color: var(--blue-mid); box-shadow: 0 0 0 3px rgba(46,117,182,.1); }
    .count-badge {
      font-size: 12px; color: var(--muted); white-space: nowrap;
    }
    .btn-action {
      padding: 7px 14px; border: none; border-radius: 6px;
      font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity .12s;
    }
    .btn-action:hover { opacity: .85; }
    .btn-blue  { background: var(--blue-mid); color: #fff; }
    .btn-green { background: #1F8B4C; color: #fff; }

    /* Table */
    .table-wrap { overflow: auto; border-radius: 9px; border: 1px solid var(--border); background: #fff; }
    table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    thead th {
      position: sticky; top: 0; z-index: 2;
      background: var(--blue-mid); color: #fff; font-weight: 600;
      padding: 8px 10px; text-align: left; white-space: nowrap;
      cursor: pointer; user-select: none;
    }
    thead th:hover { background: #1F5B92; }
    tbody tr:nth-child(odd)  { background: var(--row-even); }
    tbody tr:nth-child(even) { background: var(--row-alt); }
    tbody tr:hover { background: #D6EAF8; }
    td { padding: 6px 10px; border-bottom: 1px solid #EDF2F7; white-space: nowrap; }
    td.wrap { white-space: normal; max-width: 240px; }
    .price-green { color: var(--green); background: var(--green-bg); font-weight: 600; border-radius: 4px; padding: 2px 6px; }
    .price-red   { color: var(--red);   background: var(--red-bg);   font-weight: 600; border-radius: 4px; padding: 2px 6px; }

    /* Empty / loading */
    .placeholder { text-align: center; padding: 60px 20px; color: var(--muted); }
    .placeholder .big { font-size: 36px; margin-bottom: 10px; }

    /* RFQ list */
    .rfq-list { display: grid; gap: 10px; }
    .rfq-card {
      background: #fff; border: 1px solid var(--border); border-radius: 9px;
      padding: 14px 18px; cursor: pointer; transition: box-shadow .12s, border-color .12s;
    }
    .rfq-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); border-color: var(--blue-mid); }
    .rfq-card h3 { font-size: 14px; color: var(--blue-dark); }
    .rfq-card p  { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px; background: var(--blue-light); border: none;
      border-radius: 6px; font-size: 12px; font-weight: 600;
      color: var(--blue-dark); cursor: pointer; margin-bottom: 14px;
    }
    .back-btn:hover { background: #D0E8F5; }

    /* Sales Desk */
    .sd-layout { display: grid; grid-template-columns: 1fr 340px; gap: 16px; height: 100%; }
    .sd-panel { background: #fff; border: 1px solid var(--border); border-radius: 9px; overflow: hidden; }
    .sd-panel-title {
      padding: 10px 14px; font-size: 12px; font-weight: 700;
      color: var(--blue-dark); background: var(--blue-light);
      border-bottom: 1px solid var(--border);
    }
    .sd-scroll { overflow: auto; max-height: calc(100vh - 160px); }
    .summary-row { display: flex; justify-content: space-between; padding: 8px 14px;
                   font-size: 13px; border-bottom: 1px solid var(--border); }
    .summary-row strong { color: var(--blue-dark); }
    .summary-total { background: var(--blue-dark); color: #fff; padding: 12px 14px;
                     display: flex; justify-content: space-between; font-weight: 700; }

    /* Company selector modal */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      display: flex; align-items: center; justify-content: center; z-index: 500;
    }
    .modal {
      background: #fff; border-radius: 12px; padding: 28px;
      min-width: 320px; max-width: 480px; box-shadow: 0 24px 64px rgba(0,0,0,.25);
    }
    .modal h3 { font-size: 16px; margin-bottom: 16px; color: var(--blue-dark); }
    .company-card {
      padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 8px;
      margin-bottom: 8px; cursor: pointer; transition: border-color .12s, background .12s;
      font-size: 14px; font-weight: 600; color: var(--blue-dark);
    }
    .company-card:hover { border-color: var(--blue-mid); background: var(--blue-light); }
  </style>
</head>
<body>

<!-- Splash -->
<div id="splash">
  <h1>⚡ SpecPrice</h1>
  <div class="ring"></div>
</div>

<!-- Main shell (hidden until ready) -->
<div id="shell" style="display:none">
  <aside>
    <div class="sb-brand">⚡ SpecPrice</div>
    <div class="sb-company" id="sb-company">—</div>
    <nav>
      <div class="nav-item active" data-view="part-stock">
        <span class="icon">📦</span> Part Stock
      </div>
      <div class="nav-item" data-view="rfq">
        <span class="icon">📋</span> RFQ List
      </div>
      <div class="nav-item" data-view="sales-desk">
        <span class="icon">💰</span> Sales Desk
      </div>
    </nav>
    <div class="sb-foot">
      <div id="user-email-sb"></div>
      <button class="btn-signout" id="logout-btn">Sign Out</button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <h2 id="page-title">Part Stock</h2>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div id="content"><div class="placeholder"><div class="big">⏳</div>Loading…</div></div>
  </div>
</div>

<script type="module">
import { initializeApp }            from 'https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js';
import { getAuth, onAuthStateChanged, signOut }
                                    from 'https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js';
import { getFirestore, doc, getDoc, getDocs, collection, query, orderBy }
                                    from 'https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js';

// ── Firebase ──────────────────────────────────────────────────────────────────
const app = initializeApp({
  apiKey:            "AIzaSyCyRRnbEE_h7KC5RieXiNcVAZv_aaiqNK4",
  authDomain:        "specprice-236a2.firebaseapp.com",
  projectId:         "specprice-236a2",
  storageBucket:     "specprice-236a2.firebasestorage.app",
  messagingSenderId: "294680326166",
  appId:             "1:294680326166:web:d3ef0602f2103c87b30537"
});
const auth = getAuth(app);
const db   = getFirestore(app);

// ── State ─────────────────────────────────────────────────────────────────────
let companyId   = '';
let companyName = '';
let allParts    = [];
let currentView = 'part-stock';
let sortCol     = 'part_number';
let sortAsc     = true;
let sdItems     = [];   // sales desk rows

// ── Auth guard ────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  if (!user) { location.href = 'index.html'; return; }
  document.getElementById('user-email-sb').textContent = user.email;
  await initCompany(user);
  hideSplash();
  route('part-stock');
});

document.getElementById('logout-btn').addEventListener('click', () => {
  signOut(auth).then(() => location.href = 'index.html');
});

// ── Company init ──────────────────────────────────────────────────────────────
async function initCompany(user) {
  // Try user doc first
  const uSnap = await getDoc(doc(db, 'users', user.uid));
  const uData = uSnap.data() || {};
  companyId = uData.company_id || '';

  if (!companyId) {
    // Fall back: list companies and pick (or show selector)
    const snap = await getDocs(collection(db, 'companies'));
    if (snap.size === 1) {
      companyId = snap.docs[0].id;
    } else if (snap.size > 1) {
      companyId = await pickCompany(snap.docs);
    }
  }

  if (companyId) {
    const cSnap = await getDoc(doc(db, 'companies', companyId));
    companyName = cSnap.data()?.name || companyId;
    document.getElementById('sb-company').textContent = companyName;
  }
}

function pickCompany(docs) {
  return new Promise(resolve => {
    const bg = document.createElement('div');
    bg.className = 'modal-bg';
    bg.innerHTML = `<div class="modal">
      <h3>Select Company</h3>
      ${docs.map(d => `<div class="company-card" data-id="${d.id}">${d.data().name || d.id}</div>`).join('')}
    </div>`;
    bg.querySelectorAll('.company-card').forEach(el => {
      el.addEventListener('click', () => { document.body.removeChild(bg); resolve(el.dataset.id); });
    });
    document.body.appendChild(bg);
  });
}

// ── Router ────────────────────────────────────────────────────────────────────
function route(view) {
  currentView = view || 'part-stock';
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.view === currentView);
  });
  document.getElementById('topbar-actions').innerHTML = '';
  const TITLES = { 'part-stock': '📦 Part Stock', 'rfq': '📋 RFQ List', 'sales-desk': '💰 Sales Desk' };
  document.getElementById('page-title').textContent = TITLES[currentView] || '';
  if      (currentView === 'part-stock')  renderPartStock();
  else if (currentView === 'rfq')         renderRFQ();
  else if (currentView === 'sales-desk')  renderSalesDesk();
}

document.querySelectorAll('.nav-item').forEach(el => {
  el.addEventListener('click', () => route(el.dataset.view));
});

// ── Helpers ───────────────────────────────────────────────────────────────────
function hideSplash() {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('shell').style.display  = 'flex';
}

function fmt(v) { return v ? String(v) : ''; }
function fmtPrice(v) {
  const n = parseFloat(v);
  return isNaN(n) || n === 0 ? '' : '$' + n.toFixed(4);
}
function fmtDate(v) {
  if (!v) return '';
  try {
    const d = v.toDate ? v.toDate() : new Date(v);
    return d.toLocaleDateString('en-GB');
  } catch { return fmt(v); }
}
function debounce(fn, ms) {
  let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
}
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── PART STOCK ────────────────────────────────────────────────────────────────
async function loadParts() {
  if (allParts.length > 0) return;
  const snap = await getDocs(collection(db, 'companies', companyId, 'parts_cache'));
  allParts = snap.docs.map(d => ({ _id: d.id, ...d.data() }));
}

function sortParts(parts) {
  const k = sortCol;
  return [...parts].sort((a, b) => {
    let va = String(a[k] || '').toLowerCase();
    let vb = String(b[k] || '').toLowerCase();
    // numeric sort for price columns
    if (['price','priority_price'].includes(k)) {
      va = parseFloat(a[k]) || 0;
      vb = parseFloat(b[k]) || 0;
    }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ?  1 : -1;
    return 0;
  });
}

async function renderPartStock(filterText) {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="placeholder"><div class="big">⏳</div>Loading parts…</div>';

  try {
    await loadParts();
  } catch (e) {
    content.innerHTML = `<div class="placeholder"><div class="big">⚠️</div>${e.message}</div>`;
    return;
  }

  const q = (filterText || '').toLowerCase().trim();
  const filtered = q
    ? allParts.filter(p =>
        [p.part_number, p.drawing_number, p.drawing_name, p.description, p.manufacturer, p.atlantium_pn]
          .some(v => String(v || '').toLowerCase().includes(q)))
    : allParts;

  const sorted = sortParts(filtered);

  const cols = [
    { k: 'part_number',    label: 'Part Number',   w: '130px' },
    { k: 'drawing_number', label: 'Drawing #',      w: '100px' },
    { k: 'drawing_name',   label: 'Drawing Name',   w: '130px' },
    { k: 'atlantium_pn',   label: 'Customer PN',    w: '110px' },
    { k: 'description',    label: 'Description',    w: '220px', wrap: true },
    { k: 'manufacturer',   label: 'Manufacturer',   w: '110px' },
    { k: 'price',          label: 'FC Price',        w: '90px'  },
    { k: 'priority_price', label: 'Priority Price',  w: '100px' },
    { k: 'qty',            label: 'QTY',             w: '60px'  },
    { k: 'unit',           label: 'Units',           w: '60px'  },
    { k: 'updatedAt',      label: 'Updated',         w: '90px'  },
  ];

  const sortArrow = (k) => k === sortCol ? (sortAsc ? ' ▲' : ' ▼') : '';

  const tbody = sorted.slice(0, 2000).map((p, i) => {
    const fc   = parseFloat(p.price) || 0;
    const pr   = parseFloat(p.priority_price) || 0;
    let fcCls = '', prCls = '';
    if (fc && pr) {
      fcCls = fc <= pr ? 'price-green' : 'price-red';
      prCls = pr <= fc ? 'price-green' : 'price-red';
    }
    const unit = esc(p.unit || p.units || '');
    return `<tr>
      <td>${esc(p.part_number)}</td>
      <td>${esc(p.drawing_number)}</td>
      <td>${esc(p.drawing_name)}</td>
      <td>${esc(p.atlantium_pn)}</td>
      <td class="wrap">${esc(p.description)}</td>
      <td>${esc(p.manufacturer)}</td>
      <td>${fc ? `<span class="${fcCls}">${fmtPrice(fc)}</span>` : ''}</td>
      <td>${pr ? `<span class="${prCls}">${fmtPrice(pr)}</span>` : ''}</td>
      <td>${esc(p.qty)}</td>
      <td>${unit}</td>
      <td>${fmtDate(p.updatedAt)}</td>
    </tr>`;
  }).join('');

  const overage = sorted.length > 2000 ? `<p style="color:var(--muted);font-size:12px;padding:8px 10px">Showing first 2000 of ${sorted.length} parts</p>` : '';

  content.innerHTML = `
    <div class="toolbar">
      <input class="search-box" id="ps-search" placeholder="Search part number, description, manufacturer…" value="${esc(filterText || '')}">
      <span class="count-badge">${filtered.length} parts</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>${cols.map(c =>
          `<th data-col="${c.k}" style="min-width:${c.w}">${esc(c.label)}${sortArrow(c.k)}</th>`
        ).join('')}</tr></thead>
        <tbody>${tbody || '<tr><td colspan="11" style="text-align:center;padding:40px;color:var(--muted)">No parts found</td></tr>'}</tbody>
      </table>
      ${overage}
    </div>`;

  // Search
  const input = document.getElementById('ps-search');
  input.addEventListener('input', debounce(() => renderPartStock(input.value), 280));
  input.focus();

  // Sort on header click
  document.querySelectorAll('thead th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const k = th.dataset.col;
      if (sortCol === k) sortAsc = !sortAsc; else { sortCol = k; sortAsc = true; }
      renderPartStock(input.value);
    });
  });
}

// ── RFQ LIST ──────────────────────────────────────────────────────────────────
async function renderRFQ(projectId) {
  const content = document.getElementById('content');

  if (!projectId) {
    // Show project list
    content.innerHTML = '<div class="placeholder"><div class="big">⏳</div>Loading RFQs…</div>';
    let projects = [];
    try {
      const snap = await getDocs(query(
        collection(db, 'companies', companyId, 'projects'),
        orderBy('updatedAt', 'desc')
      ));
      projects = snap.docs.map(d => ({ _id: d.id, ...d.data() }));
    } catch {
      const snap = await getDocs(collection(db, 'companies', companyId, 'projects'));
      projects = snap.docs.map(d => ({ _id: d.id, ...d.data() }));
      projects.sort((a, b) => String(b.updatedAt || '').localeCompare(String(a.updatedAt || '')));
    }

    if (!projects.length) {
      content.innerHTML = '<div class="placeholder"><div class="big">📋</div>No RFQs found</div>';
      return;
    }

    const cards = projects.map(p => `
      <div class="rfq-card" data-id="${esc(p._id)}">
        <h3>${esc(p.name || p._id)}</h3>
        <p>${fmtDate(p.updatedAt)}  ${p.members ? '· ' + Object.keys(p.members).length + ' members' : ''}</p>
      </div>`).join('');

    content.innerHTML = `<div class="toolbar"><span class="count-badge">${projects.length} RFQs</span></div><div class="rfq-list">${cards}</div>`;
    content.querySelectorAll('.rfq-card').forEach(el => {
      el.addEventListener('click', () => renderRFQ(el.dataset.id));
    });

  } else {
    // Show drawings for this project
    content.innerHTML = '<div class="placeholder"><div class="big">⏳</div>Loading BOM…</div>';
    const pSnap = await getDoc(doc(db, 'companies', companyId, 'projects', projectId));
    const pData = pSnap.data() || {};
    const dSnap = await getDocs(collection(db, 'companies', companyId, 'projects', projectId, 'drawings'));
    const drawings = dSnap.docs.map(d => ({ _id: d.id, ...d.data() }));

    const BOM_COLS = [
      { k: 'item',          label: 'Item',          w: '40px' },
      { k: 'drawing_number',label: 'Drawing #',     w: '100px' },
      { k: 'part_number',   label: 'Part Number',   w: '130px' },
      { k: 'drawing_name',  label: 'Drawing Name',  w: '130px' },
      { k: 'atlantium_pn',  label: 'Customer PN',   w: '110px' },
      { k: 'description',   label: 'Description',   w: '220px', wrap: true },
      { k: 'qty',           label: 'QTY',            w: '55px' },
      { k: 'unit',          label: 'Units',          w: '55px' },
      { k: 'manufacturer',  label: 'Manufacturer',  w: '110px' },
    ];

    const rows = drawings.map((d, i) => `<tr>
      ${BOM_COLS.map(c => `<td${c.wrap?' class="wrap"':''}>${esc(d[c.k] || '')}</td>`).join('')}
    </tr>`).join('');

    content.innerHTML = `
      <button class="back-btn" id="back-rfq">← Back to RFQ List</button>
      <h3 style="margin-bottom:12px;color:var(--blue-dark)">${esc(pData.name || projectId)}</h3>
      <div class="table-wrap">
        <table>
          <thead><tr>${BOM_COLS.map(c => `<th style="min-width:${c.w}">${esc(c.label)}</th>`).join('')}</tr></thead>
          <tbody>${rows || '<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--muted)">No BOM rows</td></tr>'}</tbody>
        </table>
      </div>`;

    document.getElementById('back-rfq').addEventListener('click', () => renderRFQ());
  }
}

// ── SALES DESK ────────────────────────────────────────────────────────────────
async function renderSalesDesk() {
  const content = document.getElementById('content');
  await loadParts();

  const renderSD = () => {
    const total = sdItems.reduce((s, r) => s + r.total, 0);
    const rows = sdItems.map((r, i) => `<tr>
      <td>${esc(r.part_number)}</td>
      <td class="wrap">${esc(r.description)}</td>
      <td>${esc(r.qty)}</td>
      <td>${esc(r.unit)}</td>
      <td>${fmtPrice(r.price)}</td>
      <td>$${r.total.toFixed(2)}</td>
      <td><button class="btn-action" style="background:#E53E3E;color:#fff;padding:3px 8px" data-i="${i}">✕</button></td>
    </tr>`).join('');

    document.getElementById('sd-tbody').innerHTML = rows || `<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--muted)">No parts added yet</td></tr>`;
    document.getElementById('sd-total').textContent = '$' + total.toFixed(2);
    document.querySelectorAll('#sd-tbody button[data-i]').forEach(btn => {
      btn.addEventListener('click', () => { sdItems.splice(+btn.dataset.i, 1); renderSD(); });
    });
  };

  content.innerHTML = `
    <div class="sd-layout">
      <div class="sd-panel">
        <div class="sd-panel-title">BOM Items</div>
        <div style="padding:10px 12px;border-bottom:1px solid var(--border);display:flex;gap:8px">
          <input class="search-box" id="sd-search" placeholder="Search and add part…" style="flex:1">
          <div id="sd-suggestions" style="position:relative"></div>
        </div>
        <div class="sd-scroll">
          <table style="width:100%">
            <thead><tr>
              <th>Part Number</th><th>Description</th><th>QTY</th>
              <th>Units</th><th>Price</th><th>Total</th><th></th>
            </tr></thead>
            <tbody id="sd-tbody"></tbody>
          </table>
        </div>
      </div>

      <div>
        <div class="sd-panel" style="margin-bottom:12px">
          <div class="sd-panel-title">Summary</div>
          <div id="sd-summary-rows"></div>
          <div class="summary-total">
            <span>TOTAL PARTS COST</span>
            <span id="sd-total">$0.00</span>
          </div>
        </div>
        <button class="btn-action btn-green" style="width:100%;padding:10px" id="sd-print">🖨 Print / Save PDF</button>
      </div>
    </div>`;

  renderSD();

  // Search to add parts
  let suggestions = [];
  const sdSearch = document.getElementById('sd-search');
  const suggestBox = document.getElementById('sd-suggestions');

  sdSearch.addEventListener('input', () => {
    const q = sdSearch.value.toLowerCase().trim();
    if (!q) { suggestBox.innerHTML = ''; return; }
    suggestions = allParts.filter(p =>
      [p.part_number, p.description, p.manufacturer].some(v => String(v||'').toLowerCase().includes(q))
    ).slice(0, 8);

    if (!suggestions.length) { suggestBox.innerHTML = ''; return; }

    suggestBox.innerHTML = `<div style="
      position:absolute; top:0; left:0; right:0;
      background:#fff; border:1px solid var(--border); border-radius:7px;
      box-shadow:0 8px 24px rgba(0,0,0,.12); z-index:100; min-width:360px;
      transform:translateY(36px)">
      ${suggestions.map((p, i) => `
        <div data-si="${i}" style="padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border);
          font-size:12px" onmouseover="this.style.background='#EBF3FB'" onmouseout="this.style.background=''">
          <strong>${esc(p.part_number)}</strong>
          <span style="color:var(--muted)"> — ${esc((p.description||'').substring(0,50))}</span>
          ${p.price ? `<span style="float:right;color:var(--green)">$${parseFloat(p.price).toFixed(4)}</span>` : ''}
        </div>`).join('')}
    </div>`;

    suggestBox.querySelectorAll('[data-si]').forEach(el => {
      el.addEventListener('click', () => {
        const p = suggestions[+el.dataset.si];
        const qtyStr = prompt(`QTY for ${p.part_number}?`, '1');
        if (qtyStr === null) return;
        const qty = parseFloat(qtyStr) || 1;
        const price = parseFloat(p.price) || parseFloat(p.priority_price) || 0;
        sdItems.push({
          part_number: p.part_number || '',
          description: p.description || '',
          qty: qty,
          unit: p.unit || p.units || '',
          price: price,
          total: price * qty,
        });
        sdSearch.value = '';
        suggestBox.innerHTML = '';
        renderSD();
      });
    });
  });

  document.getElementById('sd-print').addEventListener('click', () => window.print());
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────
// (onAuthStateChanged above handles first load)
</script>
</body>
</html>
