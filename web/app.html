// Extracts BOM rows from ALL selected files, then shows one combined preview
// before adding everything to the Sales Desk in a single confirmation step.
async function handleSDFiles(files){
  if(!files || !files.length) return;
  const body=document.getElementById('sd-modal-body');
  const foot=document.querySelector('#modal-bg .modal-foot');
  const allRows=[];
  const errors=[];

  for(let fidx=0; fidx<files.length; fidx++){
    const file=files[fidx];
    const isPDF=file.type==='application/pdf'||file.name.toLowerCase().endsWith('.pdf');
    const isImg=file.type.startsWith('image/');
    if(!isPDF&&!isImg){ errors.push(`"${file.name}" — not a PDF or image, skipped`); continue; }

    const filePrefix = files.length>1 ? `File ${fidx+1}/${files.length}: ${esc(file.name)} — ` : '';
    body.innerHTML=`<div class="ai-status"><div class="ring"></div><span id="sd-ai-msg">${filePrefix}${isPDF?'Extracting PDF text…':'Reading image…'}</span></div>
      <div class="progress-bar"><div class="progress-fill" id="sd-prog"></div></div>`;
    foot.innerHTML='';
    const setM=(m,p)=>{
      const e=document.getElementById('sd-ai-msg');if(e)e.textContent=filePrefix+m;
      const b=document.getElementById('sd-prog');if(b)b.style.width=p+'%';
    };

    try {
      let extractedRows=[];
      let _pdfText='', _pdfTextLen=0, _pdfImages=[];
      let _procIsImage=false, _procImgData=null; // whichever image (if any) ended up being used — reused below for the cable-process analysis

      if(isPDF){
        setM('Reading PDF pages…',15);
        const {pageTexts,pageImages}=await extractPDFPages(file);
        _pdfImages=pageImages;
        _pdfText=pageTexts.map((t,i)=>`=== PAGE ${i+1} ===\n${t}`).join('\n\n');
        _pdfTextLen=pageTexts.join('').trim().length;

        if(_pdfTextLen>50){
          setM('Sending text to AI…',45);
          extractedRows=await aiExtractBOM(_pdfText,false,null,file.name);
        }
        if(!extractedRows.length&&(anthKey||geminiKey)){
          setM('Text extraction found nothing — trying page vision…',60);
          for(let pi=0;pi<_pdfImages.length;pi++){
            const b64=_pdfImages[pi];
            if(!b64) continue;
            setM(`Vision analysis: page ${pi+1}/${_pdfImages.length}…`,60+Math.round(35*pi/_pdfImages.length));
            const rows2=await aiExtractBOM('',true,{b64,mimeType:'image/png'},file.name);
            if(rows2.length){extractedRows=rows2;_procIsImage=true;_procImgData={b64,mimeType:'image/png'};break;}
          }
        }
        if(!_procIsImage && _pdfImages[0]){ _procIsImage=true; _procImgData={b64:_pdfImages[0],mimeType:'image/png'}; }
      } else {
        setM('Encoding image…',20);
        const {b64,mimeType}=await encodeImage(file);
        setM('Sending to AI (vision)…',50);
        extractedRows=await aiExtractBOM('',true,{b64,mimeType},file.name);
        _procIsImage=true; _procImgData={b64,mimeType};
      }

      _normalizeBOMRows(extractedRows);
      // Parse filename: "303-49-00251-00 REV 01 _approved.pdf"
      // → drawingName="303-49-00251-00", revision="REV 01 _approved"
      const _fileBase=file.name.replace(/\.[^.]+$/,'');
      const _spaceIdx=_fileBase.indexOf(' ');
      const effectiveDwgName=_spaceIdx>0 ? _fileBase.slice(0,_spaceIdx) : _fileBase;
      const fileRevision=_spaceIdx>0 ? _fileBase.slice(_spaceIdx+1).trim() : '';
      extractedRows.forEach(r=>{
        if(!r.drawing_number) r.drawing_number=effectiveDwgName;
        if(!r.drawing_name) r.drawing_name=effectiveDwgName;
        if(!r.revision) r.revision=fileRevision;
        _normalizeExtractedRow(r);
      });

      // Sales-Desk-only: analyze the actual manufacturing steps this cable
      // assembly needs (cut/strip, crimp, heat-shrink, label, test…) and their
      // time, assuming series/batch production. Each step's minutes get
      // attributed to whichever BOM row it belongs to (bridged via
      // _sdPendingLaborByKey, consumed when the rows are added to sdItems
      // below) — steps not tied to one row are kept as this breakdown's own
      // generalMinutes so the assembly's total labor cost still accounts for
      // them (only while a row from this drawing remains — see
      // _sdActiveGeneralLaborMinutes). The full
      // breakdown (+ a single-unit reference time) is kept in
      // _sdLaborBreakdowns for the Cost Summary breakdown modal.
      if(extractedRows.length && (anthKey||geminiKey)){
        try{
          setM('Analyzing cable manufacturing process…',95);
          const rowsList=extractedRows.map((r,idx)=>`${idx}: ${r.description||r.part_number||''} (qty=${r.qty||''}${r.unit?' '+r.unit:''})`).join('\n');
          const proc = await aiAnalyzeCableProcess(_procIsImage?'':_pdfText, _procIsImage, _procImgData, rowsList);
          if(proc && proc.steps.length){
            let generalMinutes=0, rowTiedMinutes=0;
            const displaySteps=[]; // per-assembly totals (already multiplied) — for the breakdown modal
            for(const step of proc.steps){
              const perUnitMins=parseFloat(step.minutes)||0;
              if(!perUnitMins) continue;
              const row = (step.row_idx!=null) ? extractedRows[step.row_idx] : null;
              if(row){
                // _sdPendingLaborByKey stores the PER-UNIT rate — _sdRecalcRow
                // multiplies it by this row's own quantity when the row lands
                // in sdItems (same model as a routing keyword match), so this
                // must stay per-unit, not pre-multiplied.
                const key=`${effectiveDwgName}|${row.part_number||row.description||step.row_idx}`;
                _sdPendingLaborByKey[key]=(_sdPendingLaborByKey[key]||0)+perUnitMins;
                const rowUnit=String(row.unit||'').trim().toLowerCase();
                const rowQty=parseFloat(row.qty)||1;
                // Mirror _sdRecalcLaborTotal's rules for what the breakdown
                // modal displays, so it matches what Cost Summary will
                // actually add up: mm/gr rows are flat 1 min regardless of
                // qty; pc rows multiply the per-unit rate by qty.
                const contribution = (rowUnit==='mm'||rowUnit==='gr') ? 1 : perUnitMins*rowQty;
                rowTiedMinutes+=contribution;
                displaySteps.push({operation:step.operation, minutes:contribution});
              } else {
                generalMinutes+=perUnitMins;
                displaySteps.push({operation:step.operation, minutes:perUnitMins});
              }
            }
            _sdLaborBreakdowns.push({
              drawingName: effectiveDwgName,
              steps: displaySteps,
              // Always the row-tied sum + general (both already reflecting
              // real per-assembly quantities) — this keeps "Total (series,
              // per unit)" exactly equal to what Cost Summary's Labor Time
              // actually adds up, so the two numbers can never disagree.
              seriesTotal: rowTiedMinutes + generalMinutes,
              singleUnitMinutes: parseFloat(proc.single_unit_minutes)||0,
              generalMinutes,
            });
          }
        }catch(e){ console.warn('[SD] cable-process analysis failed:', e.message); }
      }

      if(!extractedRows.length){
        errors.push(`"${file.name}" — no BOM rows detected`);
      } else {
        allRows.push(...extractedRows);
      }
    } catch(e){
      errors.push(`"${file.name}" — ${e.message}`);
    }
  }

  if(errors.length) errors.forEach(msg=>toast(msg,'error'));

  const _ringEl=body.querySelector('.ring');
  if(_ringEl){_ringEl.style.cssText='width:16px;height:16px;border-radius:50%;background:#1B6B3A;border:none;animation:none;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;line-height:1';
    _ringEl.textContent='✓';}

  if(!allRows.length){
    body.innerHTML=`<p style="color:var(--muted);margin-top:10px">No BOM rows were detected in ${files.length>1?`any of the ${files.length} files`:'this file'}.</p>`;
    foot.innerHTML=`<button class="btn btn-ghost" onclick="closeModal()">Close</button>`;
    return;
  }

  // Show editable preview — on Save: save to Part Stock + add to Sales Desk
  showBOMPreview(allRows, body, foot,
    `💾 Save to Database + Sales Desk (${allRows.length} rows${files.length>1?` from ${files.length} files`:''})`,
    async(updatedRows)=>{
      await saveBOMToPartStock(updatedRows);
      await loadRoutings();
      let added=0;
      for(const r of updatedRows){
        const pn=(r.part_number||'').trim().toLowerCase();
        const match=pn?allParts.find(p=>String(p.part_number||'').toLowerCase()===pn):null;
        const qty=parseFloat(r.qty)||1;
        const item={
          part_number:r.part_number||r.item||'', description:r.description||'',
          drawing_number:r.drawing_number||match?.drawing_number||match?.drawing_name||'',
          qty, unit:r.unit||match?.unit||match?.units||'pcs',
          price:match?parseFloat(match.price)||0:0, priority_price:match?parseFloat(match.priority_price)||0:0, total:0,
          labor_time:'', labor_total:0
        };
        // Cable-process-analysis time (see handleSDFiles) wins over the generic
        // keyword-based routing match, since it's derived from this specific
        // drawing rather than a keyword guess. It's a per-unit rate (per one
        // occurrence of the operation), same as a routing match — _sdRecalcRow
        // below multiplies it by this row's own quantity as usual.
        const dwgKey=`${item.drawing_number}|${item.part_number||item.description}`;
        if(_sdPendingLaborByKey[dwgKey]!=null){
          item.labor_time = String(_sdPendingLaborByKey[dwgKey]);
        } else {
          const m=_matchLaborTime(item.description,_routings);
          if(m) item.labor_time=m;
        }
        _sdRecalcRow(item);
        sdItems.push(item);
        added++;
      }
      _sdPendingLaborByKey={};
      toast(`Added ${added} parts to Sales Desk`,'success');
      closeModal();
      document.getElementById('sd-tbody')&&renderSalesDesk();
      await _sdAutoMatchLabor();
      document.getElementById('sd-tbody')&&renderSalesDesk();
    }
  );
}

// ── Part Stock → Excel export (client-side via SheetJS) ───────────────────────
// `rows` are the rows to actually write out (selected rows, or every filtered row
// across all pages if nothing was selected); `totalCount` is always the full
// filtered-row count, used only to report "exported X of Y" in the toast.
function exportPartStockExcel(rows, totalCount, cols){
  if(!window.XLSX){ toast('Excel library not loaded — please reload the page','error'); return; }
  if(!rows.length){ toast('No rows to export','error'); return; }
  const exportCols=cols.filter(c=>c.k!=='_fc');
  const headers=exportCols.map(c=>c.l);
  const aoa=[headers];
  rows.forEach(p=>{
    aoa.push(exportCols.map(c=>{
      if(c.k==='updatedAt') return fmtDate(p.updatedAt);
      if(c.k==='price') return parseFloat(p.price)||'';
      if(c.k==='priority_price') return parseFloat(p.priority_price)||'';
      if(c.k==='unit') return p.unit||p.units||'';
      if(c.k==='rfq_names') return (p.rfq_names||[]).join(', ');
      return p[c.k]||'';
    }));
  });
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols']=exportCols.map(()=>({wch:16}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Database');
  const fname=`Database_Export_${new Date().toISOString().slice(0,10)}.xlsx`;
  XLSX.writeFile(wb,fname);
  toast(`Exported ${rows.length} of ${totalCount} rows`,'success');
}

// ── RFQ Detail (BOM) → Excel export (client-side via SheetJS) ─────────────────
function exportBOMExcel(rows, totalCount, cols, projectName){
  if(!window.XLSX){ toast('Excel library not loaded — please reload the page','error'); return; }
  if(!rows.length){ toast('No rows to export','error'); return; }
  const headers=cols.map(c=>c.l);
  const aoa=[headers];
  rows.forEach(r=>{
    aoa.push(cols.map(c=>{
      let val=r[c.k]||'';
      if(c.k==='drawing_number'&&!val) val=r._dwgName||'';
      return val;
    }));
  });
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols']=cols.map(()=>({wch:16}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'BOM');
  const safeName=(projectName||'RFQ').replace(/[^\w\-]+/g,'_');
  const fname=`${safeName}_BOM_${new Date().toISOString().slice(0,10)}.xlsx`;
  XLSX.writeFile(wb,fname);
  toast(`Exported ${rows.length} of ${totalCount} rows`,'success');
}

// ── Sales Desk → Excel quote export (client-side via SheetJS) ─────────────────
// Replaces the old Print/Save-PDF button. Mirrors the layout/columns/summary rows
// of the Windows app's ui/sales_desk_dialog.py _generate_quote_xlsx (item, drawing#,
// part#, drawing name, customer PN, description, qty, unit, manufacturer, FC price,
// priority price, part cost, labor time, labor total, then a summary block).
function exportSalesDeskExcel(){
  if(!sdItems.length){ toast('No items to export','error'); return; }
  if(!window.XLSX){ toast('Excel library not loaded — please reload the page','error'); return; }

  const {partsTotal,laborCost,subtotal,final}=_sdComputeSummary();
  const headers=['Item','Drawing #','MNF P/N','Description','QTY','Units',
    'FC Price','Priority Price','Part Cost','Labor Time (min)','Labor Total (min)'];
  const aoa=[['SALES DESK — PRICE QUOTATION'],
    ['Generated', new Date().toLocaleString()],
    [],
    headers];
  sdItems.forEach((r,i)=>{
    aoa.push([i+1, r.drawing_number||'', r.part_number||'', r.description||'',
      parseFloat(r.qty)||0, r.unit||'',
      parseFloat(r.price)||'', parseFloat(r.priority_price)||'',
      +(r.total||0).toFixed(2), r.labor_time||'', +(r.labor_total||0).toFixed(2)]);
  });
  aoa.push([]);
  aoa.push(['','','','','','','','','Parts Total', +partsTotal.toFixed(2)]);
  aoa.push(['','','','','','','','','Labor Cost', +laborCost.toFixed(2)]);
  aoa.push(['','','','','','','','','Subtotal', +subtotal.toFixed(2)]);
  aoa.push(['','','','','','','','',`Profit (${_sdProfitPct}%)`, +(final-subtotal).toFixed(2)]);
  aoa.push(['','','','','','','','','FINAL PRICE', +final.toFixed(2)]);

  const ws=XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols']=[{wch:6},{wch:16},{wch:20},{wch:38},{wch:8},{wch:8},{wch:12},{wch:14},{wch:12},{wch:14},{wch:14}];
  ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:10}}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Quote');
  const fname=`SalesDesk_Quote_${new Date().toISOString().slice(0,10)}.xlsx`;
  XLSX.writeFile(wb,fname);
  toast('Excel quote downloaded','success');
}

function openCustomerModal(cust={}){
  const isEdit=!!cust._id;
  const contacts=(cust.contacts||[{name:'',email:'',phone:''}]);

  function contactRow(c={},i){
    return `<tr>
      <td><input class="form-input" style="padding:4px 7px;font-size:12px" placeholder="Full name" value="${esc(c.name||'')}" data-f="name" data-ci="${i}"></td>
      <td><input class="form-input" style="padding:4px 7px;font-size:12px" placeholder="email@…" value="${esc(c.email||'')}" data-f="email" data-ci="${i}"></td>
      <td><input class="form-input" style="padding:4px 7px;font-size:12px" placeholder="+972…" value="${esc(c.phone||'')}" data-f="phone" data-ci="${i}"></td>
      <td><button class="btn btn-red btn-sm del-contact" style="padding:3px 6px">✕</button></td>
    </tr>`;
  }

  showModal(`<div class="modal">
    <div class="modal-head"><h3>${isEdit?'Edit':'New'} Customer</h3><button class="close-modal" id="modal-close">✕</button></div>
    <div class="modal-body">
      <div class="form-field">
        <label>Customer Name</label>
        <input class="form-input" id="cust-name-inp" placeholder="e.g. Elbit Systems" value="${esc(cust.name||'')}">

      </div>
      <div class="form-field">
        <label>Customer Icon</label>
        <div style="display:flex;align-items:center;gap:10px">
          <div id="cust-icon-preview" style="width:48px;height:48px;border-radius:8px;background:var(--blue-light);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0">
            ${cust.icon_b64?`<img src="${cust.icon_b64}" style="width:100%;height:100%;object-fit:cover">`:`<span style="font-size:22px">🏢</span>`}
          </div>
          <input type="file" id="cust-icon-inp" accept="image/*" style="font-size:12px">
          ${cust.icon_b64?`<button type="button" class="btn btn-ghost btn-sm" id="cust-icon-clear">Remove</button>`:''}
        </div>
      </div>
      <div style="margin-top:16px">
        <label style="font-size:12px;font-weight:600;color:var(--blue-dark)">Contacts</label>
        <table style="width:100%;margin-top:8px;font-size:12px">
          <thead><tr style="color:var(--muted)">
            <th style="padding:4px 6px;text-align:left">Name</th>
            <th style="padding:4px 6px;text-align:left">Email</th>
            <th style="padding:4px 6px;text-align:left">Phone</th>
            <th style="width:30px"></th>
          </tr></thead>
          <tbody id="contacts-tbody">
            ${contacts.map((c,i)=>contactRow(c,i)).join('')}
          </tbody>
        </table>
        <button class="btn btn-ghost btn-sm" id="btn-add-contact" style="margin-top:8px">＋ Add Contact</button>
      </div>
    </div>
    <div class="modal-foot" id="modal-foot-cust">
      <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
      ${isEdit?`<button class="btn btn-red btn-sm" id="btn-del-cust">Delete</button>`:''}
      <button class="btn btn-green" id="btn-save-cust">${isEdit?'Save Changes':'Create Customer'}</button>
    </div>
  </div>`);

  document.getElementById('modal-close').addEventListener('click',closeModal);
  document.getElementById('modal-cancel').addEventListener('click',closeModal);

  let contactCount=contacts.length;
  let _custIconB64=cust.icon_b64||'';

  document.getElementById('cust-icon-inp').addEventListener('change',()=>{
    const f=document.getElementById('cust-icon-inp').files[0];
    if(!f) return;
    const reader=new FileReader();
    reader.onload=e=>{
      _custIconB64=e.target.result;
      const prev=document.getElementById('cust-icon-preview');
      if(prev) prev.innerHTML=`<img src="${_custIconB64}" style="width:100%;height:100%;object-fit:cover">`;
    };
    reader.readAsDataURL(f);
  });
  document.getElementById('cust-icon-clear')?.addEventListener('click',()=>{
    _custIconB64='';
    const prev=document.getElementById('cust-icon-preview');
    if(prev) prev.innerHTML=`<span style="font-size:22px">🏢</span>`;
  });

  document.getElementById('btn-add-contact').addEventListener('click',()=>{
    const tb=document.getElementById('contacts-tbody');
    const row=document.createElement('tr');
    row.innerHTML=contactRow({},contactCount++).replace(/^<tr>/,'').replace(/<\/tr>$/,'');
    const tr=document.createElement('tr');
    tr.innerHTML=contactRow({name:'',email:'',phone:''},contactCount-1);
    tb.appendChild(tr);
    tr.querySelector('.del-contact').addEventListener('click',()=>tr.remove());
  });

  document.querySelectorAll('.del-contact').forEach(btn=>
    btn.addEventListener('click',()=>btn.closest('tr').remove()));

  document.getElementById('btn-save-cust').addEventListener('click',async()=>{
    const name=document.getElementById('cust-name-inp').value.trim();
    if(!name){ toast('Customer name is required','error'); return; }
    const rows=[...document.querySelectorAll('#contacts-tbody tr')];
    const custContacts=rows.map(tr=>({
      name:(tr.querySelector('[data-f="name"]')?.value||'').trim(),
      email:(tr.querySelector('[data-f="email"]')?.value||'').trim(),
      phone:(tr.querySelector('[data-f="phone"]')?.value||'').trim()
    })).filter(c=>c.name||c.email||c.phone);
    const btn=document.getElementById('btn-save-cust');
    btn.disabled=true; btn.textContent='Saving…';
    try{
      const col=collection(db,'companies',companyId,'customers');
      if(isEdit){
        await updateDoc(doc(col,cust._id),{name,contacts:custContacts,icon_b64:_custIconB64,updatedAt:serverTimestamp()});
      } else {
        await addDoc(col,{name,contacts:custContacts,icon_b64:_custIconB64,createdAt:serverTimestamp(),updatedAt:serverTimestamp()});
      }
      toast(isEdit?`Updated "${name}"`:`Customer "${name}" created`,'success');
      closeModal(); renderCustomers();
    }catch(e){ toast('Error: '+e.message,'error'); btn.disabled=false; btn.textContent=isEdit?'Save Changes':'Create Customer'; }
  });

  if(isEdit){
    document.getElementById('btn-del-cust')?.addEventListener('click',()=>{
      closeModal(); deleteCustomer(cust._id,cust.name);
    });
  }
}

async function deleteCustomer(id,name){
  if(!confirm(`Delete customer "${name}"?`)) return;
  try{
    await deleteDoc(doc(db,'companies',companyId,'customers',id));
    toast(`Deleted "${name}"`,'success'); renderCustomers();
  }catch(e){ toast('Error: '+e.message,'error'); }
}

// Creates a new Firebase Auth account via the raw Identity Toolkit REST endpoint
// (NOT the client SDK's createUserWithEmailAndPassword, which would sign the
// currently-signed-in admin OUT of their own session and INTO the new account).
// A plain fetch() call never touches the SDK's in-memory auth state, so the
// admin's session stays untouched. The new user's Firestore profile doc is then
// written using the admin's own, still-active session/permissions.
async function adminCreateUser(email,password,displayName,companyIdVal,role){
  const resp=await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${FB.options.apiKey}`,{
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email,password,returnSecureToken:true})
  });
  const data=await resp.json();
  if(data.error) throw new Error(data.error.message==='EMAIL_EXISTS'?'A user with this email already exists':(data.error.message||'Failed to create user'));
  const uid=data.localId;
  await setDoc(doc(db,'users',uid),{
    email, displayName, company_id:companyIdVal, role,
    createdAt:serverTimestamp(), updatedAt:serverTimestamp()
  });
  return uid;
}

    <div class="modal-head"><h3>New Company</h3><button class="close-modal" id="modal-close">✕</button></div>
    <div class="modal-body">
      <div class="form-field"><label>Company Name</label><input class="form-input" id="nc-name-inp" placeholder="e.g. Acme Ltd."></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
      <button class="btn btn-green" id="btn-nc-save">＋ Create</button>
    </div>
  </div>`);
  document.getElementById('modal-close').addEventListener('click',closeModal);
  document.getElementById('modal-cancel').addEventListener('click',closeModal);
  document.getElementById('btn-nc-save').addEventListener('click',async()=>{
    const name=document.getElementById('nc-name-inp').value.trim();
    if(!name){ toast('Company name is required','error'); return; }
    const btn=document.getElementById('btn-nc-save');
    btn.disabled=true; btn.textContent='Creating…';
    try{
      await addDoc(collection(db,'companies'),{name,logo_b64:'',createdAt:serverTimestamp()});
      toast(`Company "${name}" created`,'success');
      closeModal(); renderSettingsCompaniesSection();
    }catch(e){ toast('Error: '+e.message,'error'); btn.disabled=false; btn.textContent='＋ Create'; }
  });
}

// Deletes legacy pre-company-namespace root-level collections (customers/projects
// [+nested drawings]/parts_cache) — mirrors the Windows app's delete_root_data().
async function cleanLegacyData(){
  if(!confirm('Delete all legacy root-level data (pre-company customers/projects/drawings/parts_cache)? This cannot be undone.')) return;
  try{
    const results={customers:0,projects:0,drawings:0,parts_cache:0,errors:[]};
    for(const coll of ['customers','projects','parts_cache']){
      const snap=await getDocs(collection(db,coll));
      for(const d of snap.docs){
        try{
          if(coll==='projects'){
            const drSnap=await getDocs(collection(db,'projects',d.id,'drawings'));
            for(const dr of drSnap.docs){ await deleteDoc(doc(db,'projects',d.id,'drawings',dr.id)); results.drawings++; }
          }
          await deleteDoc(doc(db,coll,d.id)); results[coll]++;
        }catch(e){ results.errors.push(e.message); }
      }
    }
    toast(`Cleaned: ${results.customers} customers, ${results.projects} projects, ${results.drawings} drawings, ${results.parts_cache} parts`,'success');
    renderSettingsCompaniesSection();
  }catch(e){ toast('Error: '+e.message,'error'); }
}

// One-time maintenance for the current company's Database (parts_cache): force
// every row's QTY to 1 (it's a master catalog, not a per-order tally — see
// saveBOMToPartStock/savePriorityImport, which now do this on every save) and
// fold any leftover M→mm / EA→PC units (see _dbNormalizeUnit). This only needs
// to be run once to catch rows that were saved before those functions were
// updated — everything saved going forward already gets this automatically.
async function normalizeDatabaseData(){
  if(!confirm('Set QTY to 1, normalize units (M/cm→mm, EA→pc, GM→gr), and backfill Drawing Name (= Drawing # where missing) for every part in the Database? This cannot be undone.')) return;
  try{
    const snap=await getDocs(collection(db,'companies',companyId,'parts_cache'));
    let count=0;
    for(const d of snap.docs){
      const data=d.data();
      const patch={qty:1};
      const normUnit=_dbNormalizeUnit(data.unit);
      if(normUnit && normUnit!==data.unit) patch.unit=normUnit;
      // drawing_name was never written by older versions of saveBOMToPartStock
      // (fixed going forward) — backfill it here for existing rows so the
      // common case (no distinct title, same as Drawing #) shows in both columns.
      if(!data.drawing_name && data.drawing_number) patch.drawing_name=data.drawing_number;
      await updateDoc(doc(db,'companies',companyId,'parts_cache',d.id),patch);
      count++;
    }
    allParts=[];
    toast(`Updated ${count} part(s) in the Database`,'success');
  }catch(e){ toast('Error: '+e.message,'error'); }
}

// ── Companies section (list + New Company + Clean Legacy Data + Branding) ─────
async function renderSettingsCompaniesSection(){
  const body=document.getElementById('stg-companies-body');
  if(!body) return;
  body.innerHTML=`<div style="text-align:center;padding:40px;color:var(--muted)"><div class="ring" style="margin:0 auto"></div></div>`;
  let companies=[];
  try{
    const cSnap=await getDocs(collection(db,'companies'));
    companies=cSnap.docs.map(d=>({_id:d.id,...d.data()})).sort((a,b)=>String(a.name||'').localeCompare(String(b.name||'')));
  }catch(e){ body.innerHTML=`<p style="color:red;padding:20px">${e.message}</p>`; return; }
  body.innerHTML=`
    <div class="toolbar"><span class="count-badge">${companies.length} companies</span>
      <button class="btn btn-green btn-sm" id="btn-new-company" style="margin-left:auto">＋ New Company</button>
      <button class="btn btn-red btn-sm" id="btn-normalize-db">🔧 Normalize Database (QTY=1, Units)</button>
      <button class="btn btn-red btn-sm" id="btn-clean-legacy">🗑 Clean Legacy Data</button></div>
    <div class="table-wrap"><table id="stg-companies-table">
      <thead><tr><th>Name</th><th>ID</th></tr></thead>
      <tbody>${companies.map(c=>`<tr><td>${esc(c.name||'')}</td><td style="font-family:monospace;font-size:11px;color:var(--muted)">${esc(c._id)}</td></tr>`).join('')}</tbody>
    </table></div>
    <div style="border-top:1px solid var(--border);margin:18px 0 14px"></div>
    <h4 style="font-size:12px;font-weight:700;color:var(--blue-dark);margin-bottom:10px;text-transform:uppercase;letter-spacing:.4px">Branding</h4>
    <div class="form-field" style="max-width:320px">
      <label>Company</label>
      <select class="form-input" id="brd-company-sel">${companies.map(c=>`<option value="${esc(c._id)}" ${c._id===companyId?'selected':''}>${esc(c.name||c._id)}</option>`).join('')}</select>
    </div>
    <div style="display:flex;align-items:center;gap:14px;margin-top:12px">
      <div id="brd-logo-preview" style="width:80px;height:80px;border-radius:8px;background:var(--blue-light);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0"></div>
      <div>
        <input type="file" id="brd-logo-inp" accept="image/*" style="font-size:12px">
        <button type="button" class="btn btn-ghost btn-sm" id="brd-logo-clear" style="margin-top:8px">Remove Logo</button>
      </div>
    </div>
    <button class="btn btn-green" id="btn-brd-save" style="margin-top:16px">💾 Save Branding</button>`;

  document.getElementById('btn-new-company').addEventListener('click',()=>openNewCompanyModal());
  document.getElementById('btn-clean-legacy').addEventListener('click',()=>cleanLegacyData());
  document.getElementById('btn-normalize-db').addEventListener('click',()=>normalizeDatabaseData());

  let _brdLogoB64='';
  const sel=document.getElementById('brd-company-sel');
  const loadPreview=()=>{
    const c=companies.find(x=>x._id===sel.value);
    _brdLogoB64=c?.logo_b64||'';
    const prev=document.getElementById('brd-logo-preview');
    prev.innerHTML=_brdLogoB64?`<img src="${_brdLogoB64}" style="width:100%;height:100%;object-fit:contain">`:`<span style="font-size:28px">🏢</span>`;
  };
  loadPreview();
  sel.addEventListener('change',loadPreview);

  document.getElementById('brd-logo-inp').addEventListener('change',()=>{
    const f=document.getElementById('brd-logo-inp').files[0];
    if(!f) return;
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const maxDim=256;
        const scale=Math.min(1,maxDim/Math.max(img.width,img.height));
        const w=Math.round(img.width*scale), h=Math.round(img.height*scale);
        const canvas=document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        _brdLogoB64=canvas.toDataURL('image/png');
        document.getElementById('brd-logo-preview').innerHTML=`<img src="${_brdLogoB64}" style="width:100%;height:100%;object-fit:contain">`;
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(f);
  });
  document.getElementById('brd-logo-clear').addEventListener('click',()=>{
    _brdLogoB64='';
    document.getElementById('brd-logo-preview').innerHTML=`<span style="font-size:28px">🏢</span>`;
  });

  document.getElementById('btn-brd-save').addEventListener('click',async()=>{
    const btn=document.getElementById('btn-brd-save');
    btn.disabled=true; btn.textContent='Saving…';
    try{
      await setDoc(doc(db,'companies',sel.value),{logo_b64:_brdLogoB64},{merge:true});
      // Keep the in-memory logo state in sync so the Home screen (which reads
      // companyLogoB64 via _logoHTML()) reflects the change immediately,
      // without needing a full reload.
      if(sel.value===companyId) companyLogoB64=_brdLogoB64;
      toast('Branding saved','success');
      const c=companies.find(x=>x._id===sel.value); if(c) c.logo_b64=_brdLogoB64;
    }catch(e){ toast('Error: '+e.message,'error'); }
    btn.disabled=false; btn.textContent='💾 Save Branding';
  });
}

// ── Roles section ────────────────────────────────────────────────────────────
// Admin-configurable role → button-visibility matrix. Persisted to the
// Firestore 'roles' collection (doc id = role key), read into roleViewsMap by
// loadRoles() at boot (see near the top of the script). If the collection is
// still empty (nobody has saved via this UI yet), the 4 built-in roles are
// shown pre-filled from DEFAULT_ROLE_VIEWS so an admin can review and save
// them for real with one click per row.
async function renderSettingsRolesSection(){
  const body=document.getElementById('stg-roles-body');
  if(!body) return;
  body.innerHTML=`<div style="text-align:center;padding:40px;color:var(--muted)"><div class="ring" style="margin:0 auto"></div></div>`;
  let roles=[];
  try{
    const snap=await getDocs(collection(db,'roles'));
    roles=snap.docs.map(d=>({_id:d.id,...d.data()}));
  }catch(e){ body.innerHTML=`<p style="color:red;padding:20px">${e.message}</p>`; return; }
  if(!roles.length){
    roles=Object.keys(DEFAULT_ROLE_VIEWS).map(k=>({_id:k,name:k.charAt(0).toUpperCase()+k.slice(1),views:DEFAULT_ROLE_VIEWS[k]}));
  }
  const viewKeys=Object.keys(HOME_BUTTONS);
  body.innerHTML=`
    <div class="toolbar"><span class="count-badge">${roles.length} roles</span>
      <button class="btn btn-green btn-sm" id="btn-new-role" style="margin-left:auto">＋ New Role</button></div>
    <div class="table-wrap"><table id="stg-roles-table">
      <thead><tr><th>Role Name</th><th>Key</th>${viewKeys.map(v=>`<th style="text-align:center">${HOME_BUTTONS[v][0]} ${HOME_BUTTONS[v][1]}</th>`).join('')}<th></th></tr></thead>
      <tbody>${roles.map(r=>`<tr data-key="${esc(r._id)}">
        <td><input class="form-input role-name-inp" data-key="${esc(r._id)}" value="${esc(r.name||r._id)}" style="padding:4px 7px;font-size:12px;min-width:100px"></td>
        <td style="font-family:monospace;font-size:11px;color:var(--muted)">${esc(r._id)}</td>
        ${viewKeys.map(v=>`<td style="text-align:center"><input type="checkbox" class="role-view-chk" data-key="${esc(r._id)}" data-view="${v}" ${(r.views||[]).includes(v)?'checked':''}></td>`).join('')}
        <td style="text-align:right"><button class="btn btn-green btn-sm role-save" data-key="${esc(r._id)}">💾 Save</button></td>
      </tr>`).join('')}</tbody>
    </table></div>`;

  document.getElementById('btn-new-role').addEventListener('click',()=>openNewRoleModal());
  body.querySelectorAll('.role-save').forEach(btn=>btn.addEventListener('click',async()=>{
    const key=btn.dataset.key;
    const name=(body.querySelector(`.role-name-inp[data-key="${key}"]`).value||'').trim()||key;
    const views=[...body.querySelectorAll(`.role-view-chk[data-key="${key}"]:checked`)].map(c=>c.dataset.view);
    btn.disabled=true; btn.textContent='Saving…';
    try{
      await setDoc(doc(db,'roles',key),{name,views,updatedAt:serverTimestamp()},{merge:true});
      roleViewsMap[key]={name,views};
      toast(`Role "${name}" saved`,'success');
    }catch(e){ toast('Error: '+e.message,'error'); }
    btn.disabled=false; btn.textContent='💾 Save';
  }));
}

function openNewRoleModal(){
  const viewKeys=Object.keys(HOME_BUTTONS);
  showModal(`<div class="modal modal-sm">
    <div class="modal-head"><h3>New Role</h3><button class="close-modal" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="form-field">
        <label>Role Name</label>
        <input class="form-input" id="nr-name-inp" placeholder="e.g. Manager">
      </div>
      <div class="form-field" style="margin-top:12px">
        <label>Role Key (internal, lowercase, no spaces)</label>
        <input class="form-input" id="nr-key-inp" placeholder="e.g. manager">
      </div>
      <div class="form-field" style="margin-top:12px">
        <label>Visible Buttons</label>
        ${viewKeys.map(v=>`<label style="display:flex;align-items:center;gap:7px;margin-top:8px;cursor:pointer;font-weight:400;font-size:13px">
          <input type="checkbox" class="nr-view-chk" value="${v}" style="width:auto"><span>${HOME_BUTTONS[v][0]} ${HOME_BUTTONS[v][1]}</span>
        </label>`).join('')}
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-green" id="btn-nr-save">＋ Create</button>
    </div>
  </div>`);
  document.getElementById('btn-nr-save').addEventListener('click',async()=>{
    const name=document.getElementById('nr-name-inp').value.trim();
    const key=document.getElementById('nr-key-inp').value.trim().toLowerCase().replace(/[^a-z0-9_]+/g,'_');
    const views=[...document.querySelectorAll('.nr-view-chk:checked')].map(c=>c.value);
    if(!name||!key){ toast('Name and key are required','error'); return; }
    const btn=document.getElementById('btn-nr-save');
    btn.disabled=true; btn.textContent='Creating…';
    try{
      await setDoc(doc(db,'roles',key),{name,views,createdAt:serverTimestamp(),updatedAt:serverTimestamp()});
      roleViewsMap[key]={name,views};
      toast(`Role "${name}" created`,'success');
      closeModal();
      renderSettingsRolesSection();
    }catch(e){ toast('Error: '+e.message,'error'); btn.disabled=false; btn.textContent='＋ Create'; }
  });
}

</script>
