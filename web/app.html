// ══════════════════════════════════════════════════════════════════════════════
// ── FindChips price checker ───────────────────────────────────────────────────
// JS port of core/findchips_scraper.py — same price-break logic

const FC_PROXY = 'https://corsproxy.io/?url=';

// ══════════════════════════════════════════════════════════════════════════════
// ── Currency conversion → USD (via coinmill.com, same CORS proxy as FindChips) ─
const _COINMILL_URLS = {
  CHF: 'https://iw.coinmill.com/CHF_USD.html',
  JPY: 'https://iw.coinmill.com/JPY_USD.html',
  EUR: 'https://iw.coinmill.com/EUR_USD.html',
  ILS: 'https://iw.coinmill.com/ILS_USD.html',
  GBP: 'https://iw.coinmill.com/GBP_USD.html',
};
const _currencyRateCache = {};

// Detect a 3-letter currency code (or symbol) from a raw price string; defaults to USD
function _detectCurrency(raw){
  const s=String(raw||'').trim();
  if(/₪|\bILS\b|\bNIS\b|שקל|^ש"?ח?$/i.test(s)) return 'ILS';
  if(/€|\bEUR\b/i.test(s)) return 'EUR';
  if(/£|\bGBP\b/i.test(s)) return 'GBP';
  if(/¥|\bJPY\b/i.test(s)) return 'JPY';
  if(/\bCHF\b/i.test(s)) return 'CHF';
  return 'USD';
}
// Maps a short currency-column value (e.g. Priority ERP's "מטבע שורה" column, which uses
// values like "ש" for shekel, or plain "EUR"/"GBP"/"USD") to our 3-letter codes.
function _normalizeCurrencyCode(raw){
  const s=String(raw||'').trim();
  if(!s) return '';
  if(/^ש"?ח?$/.test(s) || /^(ILS|NIS)$/i.test(s)) return 'ILS';
  if(/^EUR$/i.test(s)) return 'EUR';
  if(/^GBP$/i.test(s)) return 'GBP';
  if(/^JPY$/i.test(s)) return 'JPY';
  if(/^CHF$/i.test(s)) return 'CHF';
  if(/^USD$/i.test(s)) return 'USD';
  return _detectCurrency(s);
}

async function _fetchCurrencyRate(code){
  if(code==='USD') return 1;
  if(_currencyRateCache[code]) return _currencyRateCache[code];
  const url=_COINMILL_URLS[code];
  if(!url) return null;
  try{
    const resp=await fetch(FC_PROXY+encodeURIComponent(url),{signal:AbortSignal.timeout(15000)});
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const html=await resp.text();
    // coinmill pages phrase the rate as "1 XXX = Y.YYYYY USD" somewhere in the text
    let m = html.match(new RegExp('1\\s*'+code+'\\s*=\\s*([\\d,]+\\.?\\d*)\\s*USD','i'));
    if(!m) m = html.match(/=\s*([\d,]+\.\d+)\s*USD/i);
    if(m){
      const rate=parseFloat(m[1].replace(/,/g,''));
      if(rate>0){ _currencyRateCache[code]=rate; return rate; }
    }
  }catch(e){ console.warn('[Currency] rate fetch error:',code,e.message); }
  return null;
}

// Parses a raw price (may include a currency symbol/code) and converts to a plain USD number.
// If currencyOverride is given (e.g. from a separate "Currency" column, common in Priority ERP
// exports where the amount itself is a bare number and the currency lives in its own column),
// that takes precedence over symbol-sniffing the price string.
// Returns null if the value can't be parsed at all. Falls back to the raw number (unconverted)
// if a live rate can't be fetched, so an import never blocks on network issues.
async function _convertToUSD(raw, currencyOverride=''){
  const s=String(raw||'').trim();
  if(!s) return null;
  const num=parseFloat(s.replace(/[^\d.\-]/g,''));
  if(isNaN(num)) return null;
  const cur=currencyOverride ? (_normalizeCurrencyCode(currencyOverride)||_detectCurrency(s)) : _detectCurrency(s);
  if(cur==='USD') return num;
  const rate=await _fetchCurrencyRate(cur);
  if(!rate){ console.warn('[Currency] no rate for',cur,'- keeping original value'); return num; }
  return Math.round(num*rate*10000)/10000;
}

function _fcParsePriceBreaks(texts){
  const breaks=[];
  // Strategy A: "N+ $X.XX" pairs inline
  for(const t of texts){
    const re=/([\d,]+)\s*\+?\s*\$\s*([\d,]+\.\d+)/g; let m;
    while((m=re.exec(t))!==null){
      const qty=parseInt(m[1].replace(/,/g,''));
      const price=parseFloat(m[2].replace(/,/g,''));
      if(qty>0&&price>0) breaks.push([qty,price]);
    }
  }
  // Strategy B: adjacent qty/price cells
  if(!breaks.length){
    for(let i=0;i<texts.length-1;i++){
      const qm=texts[i].trim().match(/^([\d,]+)$/);
      if(qm){
        const nxt=texts[i+1];
        const pm=nxt.match(/\$\s*([\d,]+\.\d+)/)||nxt.trim().match(/^(\d+\.\d{2,4})$/);
        if(pm){
          const qty=parseInt(qm[1].replace(/,/g,''));
          const price=parseFloat(pm[1].replace(/,/g,''));
          if(qty>0&&price>0){breaks.push([qty,price]);i++;}
        }
      }
    }
  }
  // Strategy C: first dollar amount = unit price
  if(!breaks.length){
    for(const t of texts){
      const m=t.match(/\$\s*([\d,]+\.\d+)/);
      if(m){breaks.push([1,parseFloat(m[1].replace(/,/g,''))]);break;}
      const m2=t.trim().match(/^(\d+\.\d{2,4})$/);
      if(m2){breaks.push([1,parseFloat(m2[1])]);break;}
    }
  }
  breaks.sort((a,b)=>a[0]-b[0]);
  const seen=new Set(),result=[];
  for(const [qty,price] of breaks){if(!seen.has(qty)){seen.add(qty);result.push([qty,price]);}}
  return result;
}

// FindChips lists length-based parts (cables, wire, etc.) in FEET, but our BOMs
// store length quantities in mm (the system's sole canonical length unit —
// see _normalizeUnitQty). Before searching FindChips for a length-unit part,
// convert the local qty to feet so the nearest price-break match is against
// the right scale — otherwise e.g. a 2500mm cable would be searched as "2500"
// and match a price break meant for 2500 feet, not 2500mm (~8.2 ft).
// gr (grams) is treated the same as mm here per business rule — it's a bulk-
// material quantity, not a per-piece count, so it gets the same non-"pc"
// lookup treatment. "pc" (and anything unrecognized) passes through unchanged.
function _fcTargetQty(qty, unit){
  const u=String(unit||'').trim().toLowerCase();
  const n=parseFloat(qty)||0;
  if(u==='mm'||u==='gr') return Math.max(1, Math.round(n*0.00328084));
  return Math.max(1, Math.round(n)||1);
}

function _fcNearestBreakPrice(breaks,targetQty){
  if(!breaks.length) return '';
  let [bestQty,bestPrice]=breaks[0];
  let bestDist=Math.abs(targetQty-bestQty);
  for(const [qty,price] of breaks.slice(1)){
    const dist=Math.abs(targetQty-qty);
    if(dist<bestDist||(dist===bestDist&&qty<bestQty)){bestDist=dist;bestQty=qty;bestPrice=price;}
  }
  return '$'+bestPrice.toFixed(4).replace(/\.?0+$/,'');
}

async function _fcFetchPart(partNumber, qty=0){
  const pn=partNumber.trim();
  if(!pn) return null;
  const fcUrl=`https://www.findchips.com/search/${encodeURIComponent(pn)}`;
  const resp=await fetch(FC_PROXY+encodeURIComponent(fcUrl),{signal:AbortSignal.timeout(22000)});
  if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const html=await resp.text();
  if(/no results were found|0 results|no parts found/i.test(html))
    return{price:'Not found',distributor:'',stock:'',url:fcUrl};
  const doc=new DOMParser().parseFromString(html,'text/html');
  // Collect every individual (qty,price) price-break across ALL distributor rows,
  // then pick the single break whose quantity is closest to the target qty — not
  // just whichever distributor happens to be cheapest overall (that can pick a
  // price meant for a completely different order size).
  //
  // FindChips' search results page is fuzzy: searching "LM358N" also lists rows for
  // related-but-different parts like "LM358N/NOPB", "LM358N-NOPB", "LM358NG", etc.
  // Each result row's first (Part #) cell contains that row's own manufacturer part
  // number, normally as a link (e.g. "Details <a>LM358N/NOPB</a> DISTI # 34AH0959").
  // Only rows whose Part # matches the searched part number EXACTLY (case-insensitive)
  // are used — anything else is a different part and must not contribute pricing.
  const pnNorm=pn.toUpperCase();
  const candidates=[];
  for(const sec of doc.querySelectorAll('[class*="distributor-results"]')){
    let dist='';
    for(const sel of ['[class*="distributor-name"]','[class*="distributor-title"]','h2','h3','h4']){
      const tag=sec.querySelector(sel);
      if(tag){const t=tag.textContent.trim().replace(/\s+/g,' ');if(t.length>1&&t.length<60){dist=t;break;}}
    }
    for(const row of sec.querySelectorAll('tr')){
      const cells=[...row.querySelectorAll('td')];
      if(cells.length<3) continue;
      // Row's own part number = first non-"Details" link text in the Part # (first) cell,
      // falling back to the raw cell text if no such link is found.
      const linkEls=[...cells[0].querySelectorAll('a')];
      const mpnLink=linkEls.find(a=>{const t=a.textContent.trim();return t&&!/^details$/i.test(t);});
      const rowPn=(mpnLink?mpnLink.textContent:cells[0].textContent).trim().toUpperCase();
      if(rowPn!==pnNorm) continue;
      const texts=cells.map(c=>c.textContent.trim().replace(/\s+/g,' '));
      const brks=_fcParsePriceBreaks(texts);
      if(!brks.length) continue;
      let stock='';
      for(const t of texts){
        if(!t.includes('$')&&t.length<20){const m=t.match(/^([\d,]+)$/);if(m){stock=m[1];break;}}
      }
      for(const [bqty,bprice] of brks){
        candidates.push({qty:bqty, price:bprice, distributor:dist, stock});
      }
    }
  }
  if(!candidates.length) return{price:'Not found',distributor:'',stock:'',url:fcUrl};
  const target=qty>0?qty:1;
  let best=candidates[0];
  let bestDist=Math.abs(target-best.qty);
  for(const c of candidates.slice(1)){
    const d=Math.abs(target-c.qty);
    if(d<bestDist || (d===bestDist && c.price<best.price)){ best=c; bestDist=d; }
  }
  return {
    price: '$'+best.price.toFixed(4).replace(/\.?0+$/,''),
    distributor: best.distributor,
    stock: best.stock,
    url: fcUrl
  };
}

    const setStatus=(txt,color='var(--muted)')=>{
      const el=document.getElementById(`fc-st-${i}`);
      if(el) el.innerHTML=`<span style="color:${color};font-size:11px">${txt}</span>`;
    };
    const prog=document.getElementById('fc-prog');
    if(prog) prog.style.width=Math.round(100*i/total)+'%';
    const stEl=document.getElementById('fc-status');
    if(stEl) stEl.textContent=`Checking ${i+1}/${total}: ${it.part_number}`;
    setStatus('⏳');
    try{
      // Labels/markers aren't real electronic components — FindChips has
      // nothing useful to say about them, so skip the network lookup
      // entirely and use a fixed nominal price instead.
      const res = /\b(label|marker)\b/i.test(it.description||'')
        ? {price:'$0.2', distributor:'', stock:'', url:''}
        : await _fcFetchPart(it.part_number, _fcTargetQty(it.qty, it.unit));
      if(!res||res.price==='Not found'){
        setStatus('Not found','var(--muted)');
        const pd=document.getElementById(`fc-p-${i}`); if(pd) pd.textContent='—';
      } else {
        found++;
        const priceNum=parseFloat(res.price.replace(/[^0-9.]/g,''))||0;
        const pd=document.getElementById(`fc-p-${i}`); if(pd){pd.textContent=res.price;pd.style.color='var(--green)';}
        const dd=document.getElementById(`fc-d-${i}`); if(dd){dd.textContent=res.distributor||'';dd.style.color='var(--text)';}
        const sd=document.getElementById(`fc-s-${i}`); if(sd){sd.textContent=res.stock||'';sd.style.color='var(--text)';}
        setStatus('✓','var(--green)');
        // Update data
        if(mode==='parts'){
          const partId=it._id;
          if(partId){
            try{
              await updateDoc(doc(db,'companies',companyId,'parts_cache',partId),{
                price:priceNum, distributor:res.distributor||'',
                stock:res.stock||'', findchips_url:res.url||'',

              });
              const ap=allParts.find(p=>p._id===partId);
              if(ap){ap.price=priceNum;ap.distributor=res.distributor||'';ap.stock=res.stock||'';ap.findchips_url=res.url||'';}
            }catch(e){console.warn('FC save error:',e.message);}
          }
        } else if(mode==='sd'){
          const sdIdx=it._sdIdx;
          if(sdIdx!==undefined&&sdItems[sdIdx]){
            sdItems[sdIdx].price=priceNum;
            _sdRecalcTotal(sdItems[sdIdx]);
          }
          // Also save the result to Part Stock (parts_cache) — upsert by part_number
          try{
            const pn=(it.part_number||'').trim();
            if(pn){
              const existing=allParts.find(p=>String(p.part_number||'').toLowerCase()===pn.toLowerCase());
              if(existing){
                await updateDoc(doc(db,'companies',companyId,'parts_cache',existing._id),{
                  price:priceNum, distributor:res.distributor||'',
                  stock:res.stock||'', findchips_url:res.url||'',
                  updatedAt:serverTimestamp(), qty:1
                });
                existing.price=priceNum; existing.distributor=res.distributor||'';
                existing.stock=res.stock||''; existing.findchips_url=res.url||'';
              } else {
                const key=pn.replace(/[\/\\#\[\]*?]/g,'_').slice(0,500);
                const ref=doc(db,'companies',companyId,'parts_cache',key);
                await setDoc(ref,{
                  part_number:pn, description:'', drawing_number:'', manufacturer:'',
                  unit:'', atlantium_pn:'', qty:1,
                  price:priceNum, distributor:res.distributor||'', stock:res.stock||'',
                  price_description:'', findchips_url:res.url||'',
                  updatedAt:serverTimestamp()
                },{merge:true});
                allParts.push({_id:key, part_number:pn, price:priceNum, qty:1,
                  distributor:res.distributor||'', stock:res.stock||'', findchips_url:res.url||''});
              }
            }
          }catch(e){ console.warn('FC->PartStock save error:',e.message); }
        }
      }
    }catch(e){
      setStatus('Error','var(--red)');
      console.warn('FC error',it.part_number,e.message);
    }
    done++;
    const sumEl=document.getElementById('fc-summary');
    if(sumEl) sumEl.textContent=`${done}/${total} checked, ${found} prices found`;
    // Small delay to avoid hammering FindChips
    if(i<items.length-1&&!stopped) await new Promise(r=>setTimeout(r,400));
  }

  const prog=document.getElementById('fc-prog'); if(prog) prog.style.width='100%';
  const stEl=document.getElementById('fc-status');
  if(stEl) stEl.textContent=`Done — ${found}/${total} prices found`;
  const stopBtn=document.getElementById('btn-fc-stop');
  if(stopBtn){stopBtn.textContent='Close';stopBtn.className='btn btn-green';
    stopBtn.onclick=()=>{closeModal();_fcRefresh();};
  }
  const ringEl=document.querySelector('#fc-modal-body .ring');
  if(ringEl){ringEl.style.cssText='width:16px;height:16px;border-radius:50%;background:#1B6B3A;border:none;animation:none;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;line-height:1';ringEl.textContent='✓';}
}

// ══════════════════════════════════════════════════════════════════════════════
// ── PRIORITY IMPORT — Excel (part_number + price) → Part Stock priority_price ─
// ══════════════════════════════════════════════════════════════════════════════
const _PN_HEADER_HINTS=['part number','part_number','partnumber','pn','p/n','מק"ט','מקט','catalog','item number','item no','cat no','cat#'];
const _PRICE_HEADER_HINTS=['price','unit price','מחיר','cost','rate'];
const _CURRENCY_HEADER_HINTS=['currency','curr','מטבע'];
const _UNIT_HEADER_HINTS=['unit','units','uom','u/m','יחידה','יחידות',"יח'",'יח'];

// Priority ERP exports label their units column ("יח'") with these Hebrew/
// English tokens rather than pc/mm/gr directly — map them to our 3 canonical
// units. This is a straight label mapping (not a qty rescale): Priority
// import rows carry a per-part unit-of-measure label, not a quantity value.
//   יח' / יח / K / טר  → pc
//   מטר (meter)        → mm
//   רגל (foot)         → mm
//   מל                 → gr
// Anything else falls back to the general system-wide canonical fold (covers
// the case where Priority already exported pc/mm/gr/M/EA/cm/etc. directly).
function _priorityMapUnit(raw){
  const s=String(raw||'').trim();
  if(!s) return '';
  if(s==="יח'"||s==='יח'||s.toLowerCase()==='k'||s==='טר') return 'pc';
  if(s==='מטר') return 'mm';
  if(s==='רגל') return 'mm';
  if(s==='מל') return 'gr';
  return _normalizeUnitQty(1, s).unit;
}

function _priorityFindCol(headers, hints){
  const norm=headers.map(h=>String(h||'').trim().toLowerCase());
  for(const hint of hints){
    const idx=norm.findIndex(h=>h===hint);
    if(idx>=0) return idx;
  }
  for(const hint of hints){
    const idx=norm.findIndex(h=>h.includes(hint));
    if(idx>=0) return idx;
  }
  return -1;
}

// Parses one worksheet into {rows, headers}. Header list is padded out to the widest row in
// the sheet (Excel pivot-table exports, trailing unlabeled columns, etc. can make row 0
// shorter than later data rows) so every real data column gets its own selectable option in
// the mapping dropdowns.
function _priorityParseSheet(sheet){
  const rows=XLSX.utils.sheet_to_json(sheet,{header:1,raw:false,defval:''});
  const maxCols = rows.reduce((m,r)=>Math.max(m, r.length), 0);
  const headers = Array.from({length:maxCols}, (_,i)=>rows[0][i] ?? '');
  return {rows, headers};
}
// Higher score = more likely to be the real Part Number / Price data table, as opposed to
// e.g. a PivotTable summary sheet (common in Priority ERP exports) that only has a single
// "Row Labels" column and none of our real data.
function _priorityScoreSheet(headers){
  let score=0;
  if(_priorityFindCol(headers,_PN_HEADER_HINTS)>=0) score+=10;
  if(_priorityFindCol(headers,_PRICE_HEADER_HINTS)>=0) score+=10;
  if(_priorityFindCol(headers,_CURRENCY_HEADER_HINTS)>=0) score+=2;
  score += Math.min(headers.length,20)*0.1;
  return score;
}

async function handlePriorityFile(file){
  const body=document.getElementById('pi-modal-body');
  const foot=document.querySelector('#modal-bg .modal-foot');
  body.innerHTML=`<div class="ai-status"><div class="ring"></div><span id="pi-msg">Reading file…</span></div>`;
  foot.innerHTML='';

  try{
    if(!window.XLSX) throw new Error('Excel library not loaded — please reload the page and try again.');
    const ab=await file.arrayBuffer();
    const wb=XLSX.read(ab,{type:'array'});
    if(!wb.SheetNames.length) throw new Error('No sheets found in this file.');

    // Parse EVERY sheet and score it, so multi-sheet workbooks (Priority ERP exports commonly
    // bundle a PivotTable summary sheet — useless here, just "Row Labels" — alongside a
    // "DataSheet" with the real Part Number / Price / Currency columns) default to whichever
    // sheet actually looks like tabular data, instead of blindly using the first sheet.
    const sheetsData = wb.SheetNames.map(name=>{
      const {rows, headers} = _priorityParseSheet(wb.Sheets[name]);
      return {name, rows, headers, score:_priorityScoreSheet(headers)};
    }).filter(s=>s.rows.length>0);
    if(!sheetsData.length) throw new Error('The file appears to be empty.');
    sheetsData.sort((a,b)=>b.score-a.score);

    renderPrioritySheetMapping(sheetsData, sheetsData[0].name, body, foot);
  }catch(e){
    body.innerHTML+=`<p style="color:red;margin-top:12px">Error: ${e.message}</p>`;
    foot.innerHTML=`<button class="btn btn-ghost" onclick="closeModal()">Close</button>`;
  }
}

// Suggest which column is Part Number (מק"ט), which is Priority Price (מחיר ליחידה), and
// (optionally) which column holds the currency code — Priority ERP exports often keep the
// amount as a bare number with the currency in its own column (e.g. "מטבע שורה": EUR/GBP/ש).
// Also lets the user switch sheets when the workbook has more than one. All pre-selected from
// header detection, but always confirmed by the user before parsing.
function renderPrioritySheetMapping(sheetsData, activeSheetName, body, foot){
  const active = sheetsData.find(s=>s.name===activeSheetName) || sheetsData[0];
  const {rows, headers} = active;

  let pnCol=_priorityFindCol(headers,_PN_HEADER_HINTS);
  let prCol=_priorityFindCol(headers,_PRICE_HEADER_HINTS);
  let curCol=_priorityFindCol(headers,_CURRENCY_HEADER_HINTS);
  let unitCol=_priorityFindCol(headers,_UNIT_HEADER_HINTS);
  const headerDetected = pnCol>=0 || prCol>=0;
  if(pnCol<0) pnCol=0;
  if(prCol<0) prCol=(pnCol===1?0:1);
  if(prCol===pnCol) prCol=(pnCol===0 && headers.length>1)?1:(pnCol>0?0:1);

  const colLabel=(h,i)=>{ const t=String(h||'').trim(); return t?esc(t):`(Column ${i+1})`; };
  const colOpts=(selected)=>headers.map((h,i)=>`<option value="${i}" ${i===selected?'selected':''}>${colLabel(h,i)}</option>`).join('');
  const noneOpts=(selected,label)=>`<option value="-1" ${selected<0?'selected':''}>${label}</option>`+
    headers.map((h,i)=>`<option value="${i}" ${i===selected?'selected':''}>${colLabel(h,i)}</option>`).join('');
  const curOpts=(selected)=>noneOpts(selected,'— None (detect from price text, default USD) —');
  const unitOpts=(selected)=>noneOpts(selected,'— None —');
  const sampleRows=(headerDetected?rows.slice(1):rows).slice(0,3);

  body.innerHTML=`
    <p style="font-size:12px;color:var(--muted);margin-bottom:12px">We suggest the following column mapping — confirm or change before importing:</p>
    ${sheetsData.length>1?`<div class="form-field">
      <label>Sheet</label>
      <select class="form-input" id="pi-sheet-sel">
        ${sheetsData.map(s=>`<option value="${esc(s.name)}" ${s.name===active.name?'selected':''}>${esc(s.name)} (${s.rows.length} rows, ${s.headers.length} cols)</option>`).join('')}
      </select>
    </div>`:''}
    <div class="form-field" style="margin-top:10px">
      <label>MNF P/N column (מק"ט)</label>
      <select class="form-input" id="pi-pn-col">${colOpts(pnCol)}</select>
    </div>
    <div class="form-field" style="margin-top:10px">
      <label>Priority Price column (מחיר ליחידה)</label>
      <select class="form-input" id="pi-price-col">${colOpts(prCol)}</select>
    </div>
    <div class="form-field" style="margin-top:10px">
      <label>Currency column (optional)</label>
      <select class="form-input" id="pi-cur-col">${curOpts(curCol)}</select>
    </div>
    <div class="form-field" style="margin-top:10px">
      <label>Units column (optional)</label>
      <select class="form-input" id="pi-unit-col">${unitOpts(unitCol)}</select>
    </div>
    <div class="form-field" style="margin-top:10px">
      <label style="display:flex;align-items:center;gap:6px;text-transform:none;font-weight:400;font-size:12px">
        <input type="checkbox" id="pi-has-header" ${headerDetected?'checked':''} style="width:auto">
        First row is a header row (skip it)
      </label>
    </div>
    ${sampleRows.length?`<div style="margin-top:12px">
      <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Preview:</div>
      <div class="table-wrap"><table style="font-size:11px">
        <tbody>${sampleRows.map(r=>`<tr>${headers.map((_,i)=>`<td>${esc(String(r[i]??''))}</td>`).join('')}</tr>`).join('')}</tbody>
      </table></div>
    </div>`:''}`;

  foot.innerHTML=`
    <button class="btn btn-ghost" id="pi-map-cancel">Cancel</button>
    <button class="btn btn-green" id="pi-map-continue">Continue →</button>`;

  document.getElementById('pi-sheet-sel')?.addEventListener('change',e=>{
    renderPrioritySheetMapping(sheetsData, e.target.value, body, foot);
  });
  document.getElementById('pi-map-cancel').addEventListener('click',closeModal);
  document.getElementById('pi-map-continue').addEventListener('click', async()=>{
    const pnColSel=parseInt(document.getElementById('pi-pn-col').value);
    const prColSel=parseInt(document.getElementById('pi-price-col').value);
    const curColSel=parseInt(document.getElementById('pi-cur-col').value);
    const unitColSel=parseInt(document.getElementById('pi-unit-col').value);
    const skipHeader=document.getElementById('pi-has-header').checked;
    if(pnColSel===prColSel){ toast('MNF P/N and Price columns must be different','error'); return; }

    const btn=document.getElementById('pi-map-continue');
    btn.disabled=true; btn.textContent='Converting…';

    const dataRows=skipHeader?rows.slice(1):rows;
    const parsed=[];
    for(const r of dataRows){
      const pn=String(r[pnColSel]||'').trim();
      const rawPrice=r[prColSel];
      if(!pn || rawPrice===''||rawPrice===undefined||rawPrice===null) continue;
      const rawCur = curColSel>=0 ? r[curColSel] : '';
      const usd=await _convertToUSD(rawPrice, rawCur);
      if(usd===null) continue;
      const unit = unitColSel>=0 ? _priorityMapUnit(r[unitColSel]) : '';
      parsed.push({part_number:pn, priority_price:usd, unit, _raw:String(rawPrice)});
    }

    if(!parsed.length){
      body.innerHTML=`<p style="color:var(--muted);margin-top:10px">No valid MNF P/N + Price rows were detected with this mapping.</p>`;
      foot.innerHTML=`<button class="btn btn-ghost" onclick="closeModal()">Close</button>`;
      return;
    }

    showPriorityPreview(parsed, body, foot);
  });
}

function showPriorityPreview(rows, body, foot){
  const modalEl=body.closest('.modal');

  body.innerHTML=`
    <div class="ai-status" style="margin-bottom:10px">
      <div style="width:16px;height:16px;border-radius:50%;background:#1B6B3A;border:none;animation:none;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;line-height:1">✓</div>
      <span>${rows.length} rows parsed (prices converted to $) — click any cell to edit before saving</span>
    </div>
    <div class="table-wrap" style="max-height:calc(85vh - 175px);overflow:auto"><table>
      <thead><tr><th>MNF P/N</th><th>Priority Price ($)</th><th>Units</th><th></th></tr></thead>
      <tbody id="pi-preview-tbody">${tBody}</tbody>
    </table></div>`;

  foot.innerHTML=`
    <button class="btn btn-ghost" id="pi-cancel">Cancel</button>

  document.getElementById('pi-cancel').addEventListener('click',closeModal);
  document.getElementById('pi-save').addEventListener('click', async()=>{
    const finalRows=[];
    document.querySelectorAll('#pi-preview-tbody tr').forEach(tr=>{
      const pn=tr.querySelector('[data-k="part_number"]')?.textContent.trim()||'';

      allParts=[]; renderPartStock();
    }catch(e){ toast('Save error: '+e.message,'error'); btn.disabled=false; btn.textContent=`💾 Save to Database (${finalRows.length} rows)`; }
  });
}

// Upsert priority prices into parts_cache. Existing part_number → update priority_price;
// unknown part_number → create a new row with just part_number + priority_price.
async function savePriorityImport(rows){
  await loadParts();
  let updated=0, created=0;
  for(const r of rows){
    const pn=r.part_number.trim();
    if(!pn) continue;
    const existing=allParts.find(p=>String(p.part_number||'').toLowerCase()===pn.toLowerCase());
    const unit=_dbNormalizeUnit(r.unit);
    try{
      if(existing){
        const patch={priority_price:r.priority_price, updatedAt:serverTimestamp(), qty:1};
        if(unit) patch.unit=unit;
        await updateDoc(doc(db,'companies',companyId,'parts_cache',existing._id), patch);
        existing.priority_price=r.priority_price; if(unit) existing.unit=unit;
        updated++;
      } else {
        const key=pn.replace(/[\/\\#\[\]*?]/g,'_').slice(0,500);
        await setDoc(doc(db,'companies',companyId,'parts_cache',key),{
          part_number:pn, description:'', drawing_number:'', manufacturer:'',
          unit, atlantium_pn:'', price:'', distributor:'', stock:'', price_description:'', qty:1,
          priority_price:r.priority_price, updatedAt:serverTimestamp()
        },{merge:true});
        allParts.push({_id:key, part_number:pn, priority_price:r.priority_price, unit, qty:1});
        created++;
      }
    }catch(e){ console.warn('[PriorityImport] save error:',pn,e.message); }
  }
  return {updated, created};
}

let _routings=[];
let _routingsLoaded=false;
async function loadRoutings(force=false){
  if(_routingsLoaded && !force) return _routings;
  try{
    const snap=await getDocs(collection(db,'companies',companyId,'routings'));
    _routings=snap.docs.map(d=>({_id:d.id,...d.data()}));
  }catch(e){ console.warn('[Routings] load error:',e.message); _routings=[]; }
  _routingsLoaded=true;
  return _routings;
}
// Replaces the whole routings collection with `rows` (mirrors the Windows app's
// delete-all-then-rewrite _save_firebase behavior).
async function saveRoutingsAll(rows){
  try{
    const snap=await getDocs(collection(db,'companies',companyId,'routings'));
    await Promise.all(snap.docs.map(d=>deleteDoc(d.ref)));
  }catch(e){ console.warn('[Routings] delete error:',e.message); }
  let i=0;
  for(const row of rows){
    const key=(String(row.operation_code||'').trim()||`row_${i}`).replace(/[\/\\#\[\]*?]/g,'_').slice(0,300)||`row_${i}`;
    try{
      await setDoc(doc(db,'companies',companyId,'routings',key),{
        operation_code: row.operation_code||'',
        operation_name: row.operation_name||'',
        operation_duration: row.operation_duration||'',
        description_options: row.description_options||'',
      });
    }catch(e){ console.warn('[Routings] save error:',key,e.message); }
    i++;
  }
  _routings=rows.map((r,idx)=>({_id:String(r.operation_code||`row_${idx}`),...r}));
  _routingsLoaded=true;
}
// Auto-fills an empty description_options on routing rows whose operation_name matches
// one of the known Hebrew/English substrings above (first match wins per row).
function _autoFillRoutingDescriptions(rows){
  let filled=0;
  for(const [kwStr,opSubs] of _ROUTING_AUTO_FILL_MAP){
    for(const r of rows){
      if(String(r.description_options||'').trim()) continue;
      const opLower=String(r.operation_name||'').toLowerCase();
      if(opSubs.some(s=>opLower.includes(s.toLowerCase()))){ r.description_options=kwStr; filled++; }
    }
  }
  return filled;
}

// Given a BOM description, returns a labor-time string in minutes (or '' if no match).
function _matchLaborTime(description, routings){
  if(!description || !routings || !routings.length) return '';
  const descLower=String(description).toLowerCase();

  // 0. User-defined Description Options on routing rows — sum ALL matches (multi-step)
  const matchedDurations=[];
  for(const rt of routings){
    const opts=String(rt.description_options||'').trim();
    if(!opts) continue;
    const keywords=opts.split(',').map(k=>k.trim().toLowerCase()).filter(Boolean);
    if(keywords.some(kw=>descLower.includes(kw))){
      const dur=parseFloat(String(rt.operation_duration||'').trim());
      if(!isNaN(dur)) matchedDurations.push(dur);
    }
  }
  if(matchedDurations.length){
    const total=matchedDurations.reduce((a,b)=>a+b,0);
    return Number.isInteger(total)?String(total):total.toFixed(1);
  }

  // 1. Rule-based pass
  for(const [descKws,opKws] of _LABOR_RULES){
    if(descKws.some(kw=>descLower.includes(kw))){
      for(const rt of routings){
        const op=String(rt.operation_name||'').toLowerCase();
        if(opKws.some(ok=>op.includes(ok.toLowerCase()))){
          const dur=String(rt.operation_duration||'').trim();
          if(dur) return dur;
        }
      }
      break; // matched a description category but no routing covers it — stop here
    }
  }

  // 2. Word-overlap fallback
  let best=null, bestScore=0;
  const descWords=new Set(descLower.split(/\s+/).filter(Boolean));
  for(const rt of routings){
    const op=String(rt.operation_name||'').toLowerCase();
    if(!op) continue;
    const opWords=op.split(/\s+/).filter(Boolean);
    let score=0;
    for(const w of opWords) if(descWords.has(w)) score++;
    if(score===0 && (descLower.includes(op)||op.includes(descLower))) score=1;
    if(score>bestScore){ bestScore=score; best=rt; }
  }
  if(best && bestScore>0) return String(best.operation_duration||'').trim();
  return '';
}

// One batched AI call to match whatever rows steps 0-2 above couldn't resolve.
// rowsToMatch: [{idx, description}]. Returns {idx: durationString}.
async function _aiMatchLaborBatch(rowsToMatch, routings){
  if(!rowsToMatch.length || !routings.length || (!anthKey && !geminiKey)) return {};
  const routingsList=routings.filter(r=>r.operation_name).slice(0,150)
    .map(r=>`- "${r.operation_name}" (${r.operation_duration||'?'} min)`).join('\n');
  const rowsList=rowsToMatch.map(r=>`${r.idx}: ${r.description}`).join('\n');
  const prompt=`You are matching cable/connector BOM line-item descriptions to the closest manufacturing routing operation.

Available operations (name, duration in minutes):
${routingsList}

For each numbered BOM description below, pick the SINGLE best-matching operation from the list above and return its duration in minutes. If nothing plausibly matches, use "".

BOM descriptions:
${rowsList}

Return ONLY a valid JSON object mapping the row number (as a string) to the duration (as a string), e.g. {"0":"5","1":"","2":"12.5"}`;
  try{
    let raw='';
    if(anthKey){
      const resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'x-api-key':anthKey,'anthropic-version':'2023-06-01',
                 'anthropic-dangerous-allow-browser':'true','content-type':'application/json'},
        body:JSON.stringify({model:'claude-haiku-4-5-20251001', max_tokens:1024,
          messages:[{role:'user',content:prompt}]})
      });
      if(resp.ok){ const data=await resp.json(); raw=data.content[0].text.trim(); }
    } else if(geminiKey){
      const resp=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiKey}`,
        {method:'POST',headers:{'content-type':'application/json'},
         body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{thinkingConfig:{thinkingBudget:0}}})});
      if(resp.ok){ const data=await resp.json();
        raw=(data.candidates?.[0]?.content?.parts||[]).filter(p=>!p.thought).map(p=>p.text||'').join(''); }
    }
    const m=raw.match(/\{[\s\S]*\}/);
    if(!m) return {};
    return JSON.parse(m[0]);
  }catch(e){ console.warn('[Labor AI] match error:',e.message); return {}; }
}

        const row=data[ri]; const rd={};

      rows=imported;
      renderRows();
      toast(`Imported ${imported.length} rows from Excel`,'success');
    }catch(err){ toast('Import error: '+err.message,'error'); }
    e.target.value='';
  });
  document.getElementById('rt-save').addEventListener('click',async()=>{
    document.querySelectorAll('#rt-tbody td[contenteditable]').forEach(td=>{

      toast(`Saved ${rows.length} routings`,'success');
      closeModal();
    }catch(e){ toast('Save error: '+e.message,'error'); btn.disabled=false; btn.textContent='💾 Save'; }
  });
}

// ══════════════════════════════════════════════════════════════════════════════
const _SD_DEFAULT_COLS=[
  {k:'part_number',    l:'MNF P/N',          w:'110px'},
  {k:'drawing_number', l:'Drawing #',       w:'100px'},
  {k:'description',    l:'Description',     w:'190px',wrap:true},
  {k:'qty',            l:'QTY',             w:'75px'},
  {k:'unit',           l:'Units',           w:'55px'},
  {k:'price',          l:'FC Price',        w:'85px'},
  {k:'priority_price', l:'Priority Price',  w:'95px'},
  {k:'total',          l:'Part Cost',       w:'85px'},
  {k:'labor_time',     l:'Labor Time',      w:'85px'},
  {k:'labor_total',    l:'Labor Total',     w:'90px'},
];
// Part Cost uses the LOWER of FC/Priority price when both exist (mirrors the
// Windows app's _update_row_total), not just "whichever is present".
function _sdEffectivePrice(r){
  const fc=parseFloat(r.price)||0, pr=parseFloat(r.priority_price)||0;
  if(fc>0 && pr>0) return Math.min(fc,pr);
  return fc||pr||0;
}
// Part Cost is directly editable in the table (see _sdCellHTML 'total' case) —
// r.manual_total, when set, is a straight user-typed override of the whole
// line's cost (not a per-unit price), useful when there's no FC/Priority price
// at all or when the user has a better number (e.g. a vendor quote). Clearing
// the field goes back to the normal price×qty auto-calculation.
function _sdRecalcTotal(r){
  r.total = (r.manual_total!=null && r.manual_total!=='')
    ? (parseFloat(r.manual_total)||0)
    : _sdEffectivePrice(r)*(parseFloat(r.qty)||1);
  return r.total;
}
// Labor Total = labor_time(min) × qty_for_labor, for "pc"-counted rows only —
// mm/gr rows take the flat-1-minute path below instead, so this only ever
// runs for a per-piece count.
function _sdLaborQtyMultiplier(r){
  const qtyNum=parseFloat(r.qty)||0;
  return qtyNum>0 ? qtyNum : 1;
}
function _sdRecalcLaborTotal(r){
  // Labor Time (whether from a routing keyword match or the AI cable-process
  // analysis — see handleSDFiles) is always a PER-UNIT rate that scales with
  // the row's own quantity (e.g. "crimp one contact" × 8 contacts) — the
  // analysis is expected to report per-occurrence time, not an already-
  // multiplied total, precisely so this multiplication is correct rather than
  // double-counting.
  // Length rows (mm — the system's sole canonical length unit) and bulk-weight
  // rows (gr, treated the same as mm per business rule) always take a flat 1
  // minute of labor, regardless of length/weight or whatever labor_time a
  // routing match found — prepping this kind of material takes roughly the
  // same setup time no matter the quantity, so labor doesn't scale here.
  const unit=String(r.unit||'').trim().toLowerCase();
  if(unit==='mm'||unit==='gr'){
    r.labor_total = 1;
    return r.labor_total;
  }
  const lt=parseFloat(r.labor_time)||0;
  r.labor_total = lt>0 ? lt*_sdLaborQtyMultiplier(r) : 0;
  return r.labor_total;
}
function _sdRecalcRow(r){ _sdRecalcTotal(r); _sdRecalcLaborTotal(r); return r; }
const _SD_UNIT_OPTIONS=['','pc','mm','gr'];
function _sdCellHTML(k,r,i){
  const fcPrice=parseFloat(r.price)||0, prPrice=parseFloat(r.priority_price)||0;
  let fcC='',prC='';
  if(fcPrice&&prPrice){fcC=fcPrice<=prPrice?'price-green':'price-red';prC=prPrice<=fcPrice?'price-green':'price-red';}
  switch(k){
    // part_number/drawing_number/description/unit are editable text fields
    // (not just for manually-added blank rows — any row can be corrected
    // by hand) so a user can add a row and type its data in directly.
    case 'part_number': return `<input type="text" class="sd-part-number" data-i="${i}" value="${esc(r.part_number||'')}"
           placeholder="Part #" style="width:100%;min-width:80px;padding:2px 5px;border:1px solid var(--border);border-radius:4px;font-size:12px">`;
    case 'drawing_number': return `<input type="text" class="sd-drawing-number" data-i="${i}" value="${esc(r.drawing_number||'')}"
           style="width:100%;min-width:70px;padding:2px 5px;border:1px solid var(--border);border-radius:4px;font-size:12px">`;
    case 'description': return `<input type="text" class="sd-description" data-i="${i}" value="${esc(r.description||'')}"
           style="width:100%;min-width:140px;padding:2px 5px;border:1px solid var(--border);border-radius:4px;font-size:12px">`;
    case 'qty': return `<input type="number" class="sd-qty" data-i="${i}" value="${r.qty??''}" min="0.001" step="any"
           style="width:60px;padding:2px 5px;border:1px solid var(--border);border-radius:4px;font-size:12px">`;
    case 'unit': return `<select class="sd-unit" data-i="${i}" style="padding:2px 4px;border:1px solid var(--border);border-radius:4px;font-size:12px">
           ${_SD_UNIT_OPTIONS.map(u=>`<option value="${u}" ${String(r.unit||'')===u?'selected':''}>${u||'—'}</option>`).join('')}
         </select>`;
    case 'price': return fcPrice?`<span class="${fcC}">${fmtPrice(fcPrice)}</span>`:'';
    case 'priority_price': return prPrice?`<span class="${prC}">${fmtPrice(prPrice)}</span>`:'';
    // Part Cost is always editable — type a number to set/correct it directly
    // (see _sdRecalcTotal). Highlighted cyan when there's no FC/Priority price
    // and no manual override yet, so missing-price rows are easy to spot.
    case 'total': {
      const hasManual = r.manual_total!=null && r.manual_total!=='';
      const noSourcePrice = !(fcPrice>0) && !(prPrice>0) && !hasManual;
      return `<input type="number" class="sd-manual-total" data-i="${i}" value="${r.total?+r.total.toFixed(2):''}"
             min="0" step="any" placeholder="0.00" title="${hasManual?'Manual price override — clear to go back to FC/Priority price':'No FC/Priority price — type one in manually'}"
             style="width:78px;padding:2px 5px;border:1px solid ${noSourcePrice?'#06b6d4':'var(--border)'};border-radius:4px;font-size:12px;font-weight:700;text-align:right;${noSourcePrice?'background:#ecfeff;color:#0e7490':''}">`;
    }
    case 'labor_time': return `<input type="number" class="sd-labor-time" data-i="${i}" value="${r.labor_time??''}" min="0" step="any"
           placeholder="min" style="width:60px;padding:2px 5px;border:1px solid var(--border);border-radius:4px;font-size:12px">`;
    case 'labor_total': return r.labor_total?`${r.labor_total.toFixed(2)} min`:'';
    default: return esc(r[k]);
  }
}
// Fills labor_time on any sdItems rows missing it: rules-based match first (offline,
// instant), then a single batched AI call for whatever is still unresolved.
async function _sdAutoMatchLabor(){
  await loadRoutings();
  if(!_routings.length) return;
  const stillUnmatched=[];
  sdItems.forEach((r,i)=>{
    if(String(r.labor_time||'').trim()) return;
    const desc=String(r.description||'').trim();
    if(!desc) return;
    const dur=_matchLaborTime(desc,_routings);
    if(dur){ r.labor_time=dur; _sdRecalcLaborTotal(r); }
    else stillUnmatched.push({idx:i,description:desc});
  });
  if(stillUnmatched.length){
    const mapping=await _aiMatchLaborBatch(stillUnmatched,_routings);
    for(const idxStr in mapping){
      const idx=parseInt(idxStr), dur=mapping[idxStr];
      if(dur && sdItems[idx]){ sdItems[idx].labor_time=dur; _sdRecalcLaborTotal(sdItems[idx]); }
    }
  }
}

// Shows the manufacturing-step breakdown behind the Labor Time number — one
// section per drawing analyzed by aiAnalyzeCableProcess (see handleSDFiles),
// each listing every step + its minutes, the drawing's series (per-unit,
// batch-production) total, and a separate reference figure for what a single
// stand-alone cable would take. Also shows any general/unattributed step time
// and a grand total across everything currently counted in the auto Labor Time.
function openLaborBreakdownModal(){
  const {autoLaborMinutes}=_sdComputeSummary();
  // Only show drawings that still have at least one row in Sales Desk —
  // once every row from a drawing is deleted, its breakdown no longer
  // contributes to the total, so it's dropped from this view too (see
  // _sdActiveGeneralLaborMinutes for the same rule applied to the total).
  const activeBreakdowns = _sdLaborBreakdowns.filter(b=>sdItems.some(r=>String(r.drawing_number||'')===b.drawingName));
  if(!activeBreakdowns.length){
    showModal(`<div class="modal modal-sm">
      <div class="modal-head"><h3>📋 Labor Time Breakdown</h3><button class="close-modal" onclick="closeModal()">✕</button></div>
      <div class="modal-body">
        <p style="color:var(--muted);font-size:13px">No AI cable-process analysis for the parts currently in Sales Desk — import a drawing via "📎 New Drawing" to get a step-by-step manufacturing breakdown here.</p>
      </div>
      <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Close</button></div>
    </div>`);
    return;
  }
  const sections = activeBreakdowns.map(b=>`
    <div style="margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)">
      <div style="font-weight:700;margin-bottom:6px">${esc(b.drawingName||'(drawing)')}</div>
      <table style="width:100%;font-size:12px;border-collapse:collapse">
        <thead><tr style="text-align:left;color:var(--muted)">
          <th style="padding:2px 4px">Operation</th><th style="padding:2px 4px;text-align:right;width:70px">Minutes</th>
        </tr></thead>
        <tbody>
          ${b.steps.map(s=>`<tr><td style="padding:2px 4px">${esc(s.operation||'')}</td><td style="padding:2px 4px;text-align:right">${(parseFloat(s.minutes)||0).toFixed(1)}</td></tr>`).join('')}
        </tbody>
      </table>
      ${b.generalMinutes ? `<div style="display:flex;justify-content:space-between;color:var(--muted);font-size:11px;margin-top:2px"><span>— of which general assembly/inspection (not tied to one part)</span><span>${b.generalMinutes.toFixed(1)} min</span></div>` : ''}
      <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:12px">
        <strong>Total (series, per unit)</strong><strong>${b.seriesTotal.toFixed(1)} min</strong>
      </div>
      <div style="display:flex;justify-content:space-between;color:var(--muted);font-size:12px">
        <span>Reference: single stand-alone cable</span><span>≈ ${b.singleUnitMinutes.toFixed(1)} min</span>
      </div>
    </div>`).join('');
  showModal(`<div class="modal" style="width:min(94vw,650px)">
    <div class="modal-head"><h3>📋 Labor Time Breakdown</h3><button class="close-modal" onclick="closeModal()">✕</button></div>
    <div class="modal-body" style="max-height:70vh;overflow:auto">
      ${sections}
      <div style="display:flex;justify-content:space-between;font-size:14px;font-weight:700;padding-top:8px;border-top:2px solid var(--border)">
        <span>Total Labor Time (auto)</span><span>${autoLaborMinutes.toFixed(1)} min</span>
      </div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Close</button></div>
  </div>`);
}
let _sdFilterQ='';
let _sdProfitPct=40;
let _sdLaborRateMin=0.5; // USD/minute — user-editable in Settings; mirrors Windows' $0.50/min default
function _sdLaborRatePerMin(){ return parseFloat(_sdLaborRateMin)||0; }
// Cost Summary's Labor Time (min) field normally just mirrors the auto-summed
// total of every row's Labor Total — but the user can type their own total
// directly into that field, which "locks" it as an override so Labor Cost is
// calculated from their number instead. Clearing the field goes back to auto.
let _sdLaborMinutesOverride=null;

// AI cable-manufacturing-process analysis (Sales Desk "New Drawing" import only —
// see handleSDFiles/aiAnalyzeCableProcess). _sdLaborBreakdowns holds one entry per
// analyzed drawing ({drawingName, steps:[{operation,minutes,row_idx}], seriesTotal,
// singleUnitMinutes, generalMinutes}) for the Cost Summary breakdown modal.
// generalMinutes is step time that wasn't attributed to any specific BOM row
// (general assembly/inspection) — it only counts toward the total labor time
// while at least one row from THAT drawing is still present in sdItems (see
// _sdActiveGeneralLaborMinutes), so deleting every row of a drawing correctly
// drops its un-attributed time too, same as deleting a normal row drops its
// own labor_total. _sdPendingLaborByKey is a short-lived
// `${drawingName}|${part_number}` → minutes map bridging handleSDFiles' per-
// file AI analysis to the row objects actually created when the user confirms
// the BOM preview and the rows land in sdItems.
let _sdLaborBreakdowns=[];
let _sdPendingLaborByKey={};

// Sums generalMinutes from every analyzed drawing that still has at least one
// row present in sdItems — once every row belonging to a drawing is deleted
// (individually, or via Clear All), that drawing's un-attributed step time
// drops out of the total too.
function _sdActiveGeneralLaborMinutes(){
  let total=0;
  for(const b of _sdLaborBreakdowns){
    if(!b.generalMinutes) continue;
    if(sdItems.some(r=>String(r.drawing_number||'')===b.drawingName)) total+=b.generalMinutes;
  }
  return total;
}

// A row is a crimp/insertion TOOL line (synthesized by the AI during drawing
// extraction — see _BOM_TEXT_PROMPT/_BOM_VISION_PROMPT rule 5) if its
// description contains the word "TOOL". These get broken out into their own
// "Tools" line in Cost Summary instead of being folded silently into Parts
// Total, since a tool is a one-time purchase for the job, not a per-cable part.
function _sdIsToolRow(r){ return /\btool\b/i.test(String(r.description||'')); }

function _sdComputeSummary(){
  let partsTotal=0, toolsTotal=0, autoLaborMinutes=0;
  for(const r of sdItems){
    if(_sdIsToolRow(r)) toolsTotal+=r.total||0; else partsTotal+=r.total||0;
    autoLaborMinutes+=r.labor_total||0;
  }
  autoLaborMinutes += _sdActiveGeneralLaborMinutes();
  const laborMinutes = _sdLaborMinutesOverride!=null ? _sdLaborMinutesOverride : autoLaborMinutes;
  const laborCost=laborMinutes*_sdLaborRatePerMin();
  const subtotal=partsTotal+toolsTotal+laborCost;
  const final=subtotal*(1+_sdProfitPct/100);
  return {partsTotal, toolsTotal, laborMinutes, autoLaborMinutes, laborCost, subtotal, final};
}

async function renderSalesDesk(){
  await loadParts();
  await loadRoutings();
  setActions('');
  const SD_COLS=loadColOrder('salesdesk',_SD_DEFAULT_COLS);

  const _sdUpdateSummaryUI=()=>{
    const {partsTotal,toolsTotal,laborMinutes,laborCost,subtotal,final}=_sdComputeSummary();
    const set=(id,v)=>{ const el=document.getElementById(id); if(el) el.textContent='$'+v.toFixed(2); };
    set('sd-parts-total',partsTotal);
    set('sd-tools-total',toolsTotal);
    set('sd-labor-total',laborCost);
    set('sd-subtotal',subtotal);
    set('sd-final',final);
    // Only sync the Labor Time input while it's tracking the auto-sum — once
    // the user has typed their own value (_sdLaborMinutesOverride set), leave
    // the field alone so it doesn't get overwritten mid-edit or reset by an
    // unrelated row change elsewhere in the BOM.
    const ltInp=document.getElementById('sd-labor-minutes');
    if(ltInp && _sdLaborMinutesOverride==null) ltInp.value = laborMinutes ? +laborMinutes.toFixed(2) : '';
  };

  const renderSD=()=>{
    const predicate=parseBoolQuery(_sdFilterQ);
    const visibleIdx=sdItems.map((r,i)=>i).filter(i=>{
      if(!_sdFilterQ.trim()) return true;
      const r=sdItems[i];
      return predicate(_SD_DEFAULT_COLS.map(c=>String(r[c.k]||'')).join(' | ').toLowerCase());
    });
    const tbody=visibleIdx.map(i=>{
      const r=sdItems[i];
      return `<tr data-i="${i}">
      <td style="text-align:center"><input type="checkbox" class="sd-check" data-i="${i}"></td>
      ${SD_COLS.map(c=>`<td${c.wrap?' class="wrap"':''}>${_sdCellHTML(c.k,r,i)}</td>`).join('')}
      <td><button class="btn btn-red btn-sm" data-i="${i}">✕</button></td>
    </tr>`;
    }).join('');

    document.getElementById('sd-tbody').innerHTML=tbody||
      `<tr class="empty-row"><td colspan="${SD_COLS.length+2}">No parts added yet</td></tr>`;
    const cEl=document.getElementById('sd-count'); if(cEl) cEl.textContent=sdItems.length;
    const fEl=document.getElementById('sd-flt-count');
    if(fEl) fEl.textContent = _sdFilterQ.trim() ? `${visibleIdx.length}/${sdItems.length} parts` : `${sdItems.length} parts`;
    _sdUpdateSummaryUI();

    document.querySelectorAll('.sd-qty').forEach(inp=>inp.addEventListener('change',()=>{
      const i=+inp.dataset.i, qty=parseFloat(inp.value)||1;
      sdItems[i].qty=qty; _sdRecalcRow(sdItems[i]); renderSD();
    }));
    document.querySelectorAll('.sd-labor-time').forEach(inp=>inp.addEventListener('change',()=>{
      const i=+inp.dataset.i, lt=parseFloat(inp.value)||0;
      sdItems[i].labor_time=lt; _sdRecalcLaborTotal(sdItems[i]); renderSD();
    }));
    document.querySelectorAll('.sd-part-number').forEach(inp=>inp.addEventListener('change',()=>{
      sdItems[+inp.dataset.i].part_number=inp.value.trim();
    }));
    document.querySelectorAll('.sd-drawing-number').forEach(inp=>inp.addEventListener('change',()=>{
      sdItems[+inp.dataset.i].drawing_number=inp.value.trim();
    }));
    document.querySelectorAll('.sd-description').forEach(inp=>inp.addEventListener('change',()=>{
      sdItems[+inp.dataset.i].description=inp.value.trim();
    }));
    document.querySelectorAll('.sd-unit').forEach(sel=>sel.addEventListener('change',()=>{
      const i=+sel.dataset.i;
      sdItems[i].unit=sel.value;
      _sdRecalcRow(sdItems[i]); renderSD();
    }));
    document.querySelectorAll('.sd-manual-total').forEach(inp=>inp.addEventListener('change',()=>{
      const i=+inp.dataset.i, v=inp.value.trim();
      sdItems[i].manual_total = v===''?null:v;
      _sdRecalcRow(sdItems[i]); renderSD();
    }));
    document.querySelectorAll('#sd-tbody .btn-red').forEach(btn=>btn.addEventListener('click',()=>{
      sdItems.splice(+btn.dataset.i,1); renderSD();
    }));
  };

  setContent(`
    <div class="sd-split">
      <div class="sd-panel">
        <div class="sd-panel-title">BOM Items</div>
        <div style="padding:9px 11px;border-bottom:1px solid var(--border);display:flex;gap:7px;flex-wrap:wrap">
          <button class="btn btn-blue" id="btn-sd-addpick">📦 Add from Database</button>
          <button class="btn btn-blue" id="btn-sd-file">📎 New Drawing</button>
          <button class="btn btn-blue" id="btn-sd-newrow">➕ New Row</button>
          <button class="btn btn-green" id="btn-sd-fc" style="white-space:nowrap">🔍 FindChips</button>
          <button class="btn btn-red" id="btn-sd-clear">Clear All</button>
        </div>
        <div style="padding:9px 11px;border-bottom:1px solid var(--border);display:flex;gap:7px;flex-wrap:wrap;align-items:center;justify-content:flex-end">
          <button class="tbl-scroll-btn" id="sd-scroll-left" title="Scroll left">◀</button>
          <button class="tbl-scroll-btn" id="sd-scroll-right" title="Scroll right">▶</button>
          <span class="count-badge" id="sd-flt-count" style="white-space:nowrap">${sdItems.length} parts</span>
        </div>
        <div class="sd-scroll table-wrap" id="sd-table-wrap">
          <table style="width:100%" id="sd-table">
            <thead><tr>
              <th style="width:28px"><input type="checkbox" id="sd-check-all" title="Select all"></th>
              ${SD_COLS.map(c=>`<th data-col="${c.k}" style="min-width:${c.w}" title="Drag to reorder">${c.l}</th>`).join('')}
              <th style="width:40px"></th>
            </tr></thead>
            <tbody id="sd-tbody"></tbody>
          </table>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:12px">
        <div class="sd-panel">
          <div class="sd-panel-title">Cost Summary</div>
          <div style="padding:6px 0">
            <div class="summary-row"><span>Parts Total</span><span id="sd-parts-total">$0.00</span></div>
            <div class="summary-row"><span title="Crimp/insertion tool rows added automatically from drawing analysis (description contains TOOL) — a one-time purchase for the job, kept separate from per-cable Parts Total">Tools</span><span id="sd-tools-total">$0.00</span></div>
            <div class="summary-row">
              <span title="Defaults to the sum of every row's Labor Total — type your own number to override it" style="display:flex;align-items:center;gap:5px">
                Labor Time (min)
                <button type="button" class="btn btn-ghost btn-sm" id="btn-sd-labor-breakdown" title="Show the manufacturing-step breakdown behind this number" style="padding:1px 6px;font-size:11px">📋</button>
              </span>
              <input type="number" id="sd-labor-minutes" min="0" step="any"
                style="width:70px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px;text-align:right">
            </div>
            <div class="summary-row"><span id="sd-labor-cost-label" title="Labor Time (min) above × rate per minute — set the rate in Settings">Labor Cost</span><span id="sd-labor-total">$0.00</span></div>
            <div class="summary-row"><span>Subtotal</span><span id="sd-subtotal">$0.00</span></div>
            <div class="summary-row">
              <span>Profit %</span>
              <input type="number" id="sd-profit-pct" value="${_sdProfitPct}" min="0" step="any"
                style="width:70px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px;text-align:right">
            </div>
          </div>
          <div class="summary-total">
            <span>FINAL PRICE</span>
            <span id="sd-final">$0.00</span>
          </div>
        </div>
        <button class="btn btn-green" style="width:100%;padding:10px;justify-content:center" id="btn-sd-export">📊 Export to Excel</button>
      </div>
    </div>`);

  renderSD();
  makeColumnsReorderable(document.getElementById('sd-table'),'salesdesk',SD_COLS,()=>renderSalesDesk());
  wireScrollButtons('#sd-table-wrap','sd-scroll-left','sd-scroll-right');
  wireShiftCheck(document.getElementById('sd-table'),'.sd-check');

  document.getElementById('sd-labor-minutes').addEventListener('input',debounce(e=>{
    const v=e.target.value.trim();
    _sdLaborMinutesOverride = v==='' ? null : (parseFloat(v)||0);
    _sdUpdateSummaryUI();
  },150));

  document.getElementById('btn-sd-labor-breakdown')?.addEventListener('click',openLaborBreakdownModal);

  document.getElementById('sd-profit-pct').addEventListener('input',debounce(e=>{
    _sdProfitPct=parseFloat(e.target.value)||0;
    _sdUpdateSummaryUI();
  },150));

  document.getElementById('btn-sd-addpick').addEventListener('click',()=>{
    openPartPickerModal(async(parts,qtyOverride,hadSelection)=>{
      let added=0;
      for(const p of parts){
        const origQty=String(p.qty||'').trim();
        const qty = hadSelection ? ((qtyOverride!==1||!origQty) ? qtyOverride : (parseFloat(origQty)||1)) : (parseFloat(p.qty)||1);
        const item={part_number:p.part_number||'',description:p.description||'',
          drawing_number:p.drawing_number||p.drawing_name||'',
          qty, unit:p.unit||p.units||'pcs',price:parseFloat(p.price)||0,priority_price:parseFloat(p.priority_price)||0,
          total:0, labor_time:'', labor_total:0};
        const m=_matchLaborTime(item.description,_routings);
        if(m) item.labor_time=m;
        _sdRecalcRow(item);
        sdItems.push(item);
        added++;
      }
      renderSalesDesk();
      toast(`Added ${added} part(s) to Sales Desk`,'success');
      await _sdAutoMatchLabor();
      renderSalesDesk();
    });
  });

  document.getElementById('btn-sd-clear').addEventListener('click',()=>{
    sdItems=[];_sdFilterQ='';_sdLaborMinutesOverride=null;
    _sdLaborBreakdowns=[];_sdPendingLaborByKey={};
    renderSD();
  });
  document.getElementById('btn-sd-newrow').addEventListener('click',()=>{
    sdItems.push({part_number:'',description:'',drawing_number:'',qty:1,unit:'',
      price:0,priority_price:0,total:0,labor_time:'',labor_total:0});
    renderSD();
  });
  document.getElementById('btn-sd-export').addEventListener('click',()=>exportSalesDeskExcel());

  // SD check-all toggle
  document.addEventListener('change',e=>{
    if(e.target.id==='sd-check-all'){
      document.querySelectorAll('.sd-check').forEach(cb=>cb.checked=e.target.checked);
    }
  });

  // SD FindChips button
  document.getElementById('btn-sd-fc').addEventListener('click',()=>{
    const checked=[...document.querySelectorAll('.sd-check:checked')].map(cb=>Number(cb.dataset.i));
    const targets = checked.length
      ? sdItems.filter((_,i)=>checked.includes(i))
      : sdItems;
    const items=targets.filter(r=>r.part_number).map(r=>{
      const sdIdx=sdItems.indexOf(r);
      return{part_number:r.part_number, qty:parseFloat(r.qty)||1, unit:r.unit||'',
        description:r.description||'', _sdIdx:sdIdx};
    });
    if(!items.length){toast('No parts to check','error');return;}
    runFCCheckModal(items,'sd');
  });

  // From File (BOM extraction for Sales Desk)
  document.getElementById('btn-sd-file').addEventListener('click',()=>{
    if(!anthKey && !geminiKey){ showSettingsModal(()=>document.getElementById('btn-sd-file')?.click()); return; }
    openSDFileModal();
  });
}

// Full-featured Part Stock picker for Sales Desk — mirrors the Windows app's
// ui/sales_desk_dialog.py _PartPickerDialog: filter by Drawing Number / Drawing

// checked, every currently-visible row is added — same as Windows).
// onAdd(parts, qtyOverride, hadSelection) is called once, after the modal closes.
function openPartPickerModal(onAdd){
  showModal(`<div class="modal" style="width:min(96vw,1100px)">

        <select id="pp-value" class="search-box" style="flex:0 0 auto;min-width:220px">
          <option value="">All</option>
        </select>
        <div class="search-wrap">
          <input class="search-box" id="pp-search" placeholder='Search part number / description — AND/OR/NOT/"phrase"'>
          <button type="button" class="search-clear" id="pp-search-clear" title="Clear">✕</button>
        </div>
      </div>
      <div class="table-wrap" style="max-height:50vh" id="pp-table-wrap">
        <table id="pp-table">
          <thead><tr>
            <th style="width:28px"><input type="checkbox" id="pp-check-all"></th>
            <th>MNF P/N</th><th>Drawing #</th><th>Drawing Name</th><th>Description</th>
            <th>QTY</th><th>Units</th><th>FC Price</th><th>Priority Price</th>
          </tr></thead>
          <tbody id="pp-tbody"></tbody>
        </table>
      </div>
      <div style="margin-top:10px;display:flex;align-items:center;gap:8px">
        <label style="font-size:12px;color:var(--muted)">QTY per selected part:</label>
        <input type="number" id="pp-qty" class="form-input" style="width:90px" value="1" min="0.001" step="any">
        <span style="font-size:11px;color:var(--muted)">(only used for rows you check — unchecked "Add All" keeps each part's own QTY)</span>
        <span class="count-badge" id="pp-count" style="margin-left:auto"></span>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-green" id="pp-add">＋ Add Selected</button>
    </div>
  </div>`);

  let visibleParts=[];
  const fieldSel=document.getElementById('pp-field');
  const valueSel=document.getElementById('pp-value');
  const searchInp=document.getElementById('pp-search');
  wireSearchClear('pp-search','pp-search-clear');

  const reloadValueOptions=()=>{
    const field=fieldSel.value;
    const values=[...new Set(allParts.map(p=>p[field]).filter(Boolean).map(v=>String(v).trim()).filter(Boolean))]
      .sort((a,b)=>a.localeCompare(b));
    valueSel.innerHTML=`<option value="">All (${values.length})</option>`+
      values.map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join('');
    filterRows();
  };

  const filterRows=()=>{
    const field=fieldSel.value;
    const val=valueSel.value;
    const predicate=parseBoolQuery(searchInp.value);
    visibleParts=allParts.filter(p=>{
      if(val && String(p[field]||'').trim()!==val) return false;
      if(searchInp.value.trim()){
        const haystack=[p.part_number,p.description,p.manufacturer,p.drawing_number,p.drawing_name]
          .map(v=>String(v||'')).join(' | ').toLowerCase();
        if(!predicate(haystack)) return false;
      }
      return true;
    });
    const tb=document.getElementById('pp-tbody');
    tb.innerHTML=visibleParts.map(p=>{
      const fc=parseFloat(p.price)||0, pr=parseFloat(p.priority_price)||0;
      let fcC='',prC='';
      if(fc&&pr){fcC=fc<=pr?'price-green':'price-red';prC=pr<=fc?'price-green':'price-red';}
      return `<tr data-id="${esc(p._id)}">
        <td style="text-align:center"><input type="checkbox" class="pp-check" data-id="${esc(p._id)}"></td>
        <td>${esc(p.part_number)}</td><td>${esc(p.drawing_number)}</td><td>${esc(p.drawing_name)}</td>
        <td class="wrap">${esc(p.description)}</td><td>${esc(p.qty)}</td><td>${esc(p.unit||p.units)}</td>
        <td>${fc?`<span class="${fcC}">${fmtPrice(fc)}</span>`:''}</td>
        <td>${pr?`<span class="${prC}">${fmtPrice(pr)}</span>`:''}</td>
      </tr>`;
    }).join('')||`<tr class="empty-row"><td colspan="9">No parts match this filter</td></tr>`;
    document.getElementById('pp-count').textContent=`${visibleParts.length} parts`;
  };

  fieldSel.addEventListener('change',reloadValueOptions);
  valueSel.addEventListener('change',filterRows);
  searchInp.addEventListener('input',debounce(filterRows,220));
  document.getElementById('pp-check-all').addEventListener('change',e=>{
    document.querySelectorAll('.pp-check').forEach(cb=>cb.checked=e.target.checked);
  });
  wireShiftCheck(document.getElementById('pp-table'),'.pp-check');
  reloadValueOptions();

  document.getElementById('pp-add').addEventListener('click',()=>{
    const checked=[...document.querySelectorAll('.pp-check:checked')].map(cb=>cb.dataset.id);
    const qtyOverride=parseFloat(document.getElementById('pp-qty').value)||1;
    const hadSelection=checked.length>0;
    const selected = hadSelection ? allParts.filter(p=>checked.includes(p._id)) : visibleParts;
    if(!selected.length){ toast('No parts to add','error'); return; }
    closeModal();
    onAdd(selected, qtyOverride, hadSelection);
  });
}

function openSDFileModal(){

    <div class="modal-body" id="sd-modal-body">
      <div class="drop-zone" id="sd-drop-zone" tabindex="0">
        <span class="icon-big">📄</span>
        <strong>Drop PDF or Image here</strong>
        <p>Parts will be added to Sales Desk — you can select multiple files, extracted together into one review</p>
